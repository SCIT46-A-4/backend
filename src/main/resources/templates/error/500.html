<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>서버 오류 - iLog</title>
    <link
      rel="stylesheet"
      href="../../static/css/bulma.min.css"
      th:href="@{/css/bulma.min.css}"
    />
    <!-- <link
      rel="stylesheet"
      th:href="@{/css/all.min.css}"
      href="../../static/css/all.min.css"
    /> -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --background-yellow: #fff8dc;
        --button-mint: #98d8d8;
        --button-pink: #ffb6c1;
        --text-dark: #333333;
      }

      body {
        background-color: var(--background-yellow);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          Helvetica, Arial, sans-serif;
      }

      .error-container {
        max-width: 600px;
        text-align: center;
        padding: 2rem;
      }

      .error-code {
        font-size: 6rem;
        font-weight: bold;
        color: var(--button-pink);
        margin-bottom: 0;
        line-height: 1;
      }

      .error-title {
        font-size: 2rem;
        color: var(--text-dark);
        margin-bottom: 1.5rem;
      }

      .error-message {
        color: #666;
        margin-bottom: 2rem;
      }

      .error-icon {
        font-size: 5rem;
        color: var(--button-mint);
        margin-bottom: 1.5rem;
      }

      .button.is-mint {
        background-color: var(--button-mint);
        color: var(--text-dark);
        border: none;
      }

      .button.is-pink {
        background-color: var(--button-pink);
        color: var(--text-dark);
        border: none;
      }

      .button.is-outlined {
        background-color: transparent;
        border: 2px solid var(--button-mint);
        color: var(--text-dark);
      }

      .button-group {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 1rem;
        margin-top: 2rem;
      }

      .server-status {
        display: inline-block;
        margin-top: 2rem;
        padding: 0.5rem 1rem;
        background-color: rgba(255, 255, 255, 0.5);
        border-radius: 20px;
        font-size: 0.9rem;
      }

      .pulsating-dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        background-color: #f14668;
        border-radius: 50%;
        margin-right: 8px;
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0% {
          transform: scale(0.95);
          opacity: 1;
        }
        50% {
          transform: scale(1.1);
          opacity: 0.7;
        }
        100% {
          transform: scale(0.95);
          opacity: 1;
        }
      }

      @media screen and (max-width: 768px) {
        .error-code {
          font-size: 4rem;
        }
        .error-title {
          font-size: 1.5rem;
        }
        .button-group {
          flex-direction: column;
          align-items: center;
        }
        .button-group .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="error-container">
      <i class="fas fa-server error-icon"></i>
      <h1 class="error-code">500</h1>
      <h2 class="error-title">서버 오류가 발생했습니다</h2>
      <p class="error-message">
        서버에 일시적인 문제가 발생했습니다.<br />
        잠시 후 다시 시도해주세요. 불편을 드려 죄송합니다.
      </p>

      <div class="server-status">
        <span class="pulsating-dot"></span>
        <span>기술팀이 문제를 확인하고 있습니다</span>
      </div>

      <div class="button-group">
        <a href="/dashboard" class="button is-mint">
          <i class="fas fa-home mr-2"></i>홈으로 돌아가기
        </a>
        <!-- <button onclick="window.location.reload()" class="button is-pink">
          <i class="fas fa-redo-alt mr-2"></i>새로고침
        </button> -->
        <a href="/claims" class="button is-outlined">
          <i class="fas fa-headset mr-2"></i>문의하기
        </a>
        <button onclick="window.history.back()" class="button is-outlined">
          <i class="fas fa-arrow-left mr-2"></i>이전 페이지
        </button>
      </div>
    </div>

    <script>
      // 페이지 로드 시 자동으로 5초마다 새로고침 시도 (선택적)
      let attempts = 0;
      const maxAttempts = 3;

      /*
        // 자동 새로고침 기능 (필요한 경우 주석 해제)
        const refreshInterval = setInterval(() => {
            attempts++;
            if (attempts >= maxAttempts) {
                clearInterval(refreshInterval);
                document.querySelector('.server-status span:last-child').textContent = 
                    '자동 새로고침을 중단했습니다. 수동으로 새로고침 해주세요.';
            } else {
                window.location.reload();
            }
        }, 5000);
        */
    </script>
  </body>
</html>
