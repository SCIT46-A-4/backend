<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>페이지를 찾을 수 없습니다 - iLog</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --background-yellow: #fff8dc;
        --button-mint: #98d8d8;
        --button-pink: #ffb6c1;
        --text-dark: #333333;
      }

      body {
        background-color: var(--background-yellow);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          Helvetica, Arial, sans-serif;
      }

      .error-container {
        max-width: 600px;
        text-align: center;
        padding: 2rem;
      }

      .error-code {
        font-size: 6rem;
        font-weight: bold;
        color: var(--button-mint);
        margin-bottom: 0;
        line-height: 1;
      }

      .error-title {
        font-size: 2rem;
        color: var(--text-dark);
        margin-bottom: 1.5rem;
      }

      .error-message {
        color: #666;
        margin-bottom: 2rem;
      }

      .error-image {
        max-width: 250px;
        margin: 0 auto 2rem;
        opacity: 0.8;
      }

      .button.is-mint {
        background-color: var(--button-mint);
        color: var(--text-dark);
        border: none;
      }

      .button.is-pink {
        background-color: var(--button-pink);
        color: var(--text-dark);
        border: none;
      }

      .button.is-outlined {
        background-color: transparent;
        border: 2px solid var(--button-mint);
        color: var(--text-dark);
      }

      .button-group {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 1rem;
        margin-top: 2rem;
      }

      .search-box {
        max-width: 400px;
        margin: 2rem auto;
      }

      @media screen and (max-width: 768px) {
        .error-code {
          font-size: 4rem;
        }
        .error-title {
          font-size: 1.5rem;
        }
        .button-group {
          flex-direction: column;
          align-items: center;
        }
        .button-group .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="error-container">
      <div class="error-image">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <path
            fill="#98D8D8"
            d="M48.1,-60.4C62.2,-53.6,73.5,-38.5,78.2,-21.7C82.9,-4.9,81.1,13.6,72.8,27.2C64.5,40.8,49.7,49.5,35,54.5C20.3,59.5,5.8,60.7,-10.7,62.4C-27.2,64.1,-45.7,66.1,-55.8,57.6C-66,49,-67.8,29.8,-69.7,10.7C-71.5,-8.4,-73.2,-27.4,-64.9,-39.9C-56.5,-52.5,-38.1,-58.6,-21.9,-64.4C-5.7,-70.2,8.3,-75.8,22.9,-74.2C37.5,-72.7,53.7,-64,69.7,-51.5C85.8,-39,101.8,-22.7,104.5,-4.8C107.3,13.1,96.8,32.6,83.2,46.7C69.5,60.8,52.7,69.5,35.6,71.3C18.5,73.1,1.1,68,-13.3,61.2C-27.7,54.4,-39.2,46,-53.3,36.1C-67.4,26.2,-84.2,14.9,-87.1,0.9C-90,-13.1,-78.9,-29.9,-65.5,-40.3C-52.1,-50.8,-36.2,-55,-22.5,-61.2C-8.9,-67.4,2.5,-75.6,15.9,-75.3C29.2,-75,44.5,-66.1,48.1,-60.4Z"
            transform="translate(100 100)"
          />
        </svg>
      </div>
      <h1 class="error-code">404</h1>
      <h2 class="error-title">페이지를 찾을 수 없습니다</h2>
      <p class="error-message">
        찾으시는 페이지가 존재하지 않거나, 이동되었거나, 주소가 잘못 입력되었을
        수 있습니다.<br />
        URL을 다시 확인해주세요.
      </p>
      <!-- 
      <div class="search-box">
        <div class="field has-addons">
          <div class="control is-expanded">
            <input
              class="input"
              type="text"
              placeholder="검색어를 입력하세요"
            />
          </div>
          <div class="control">
            <button class="button is-mint">
              <i class="fas fa-search"></i>
            </button>
          </div>
        </div>
      </div> -->

      <div class="button-group">
        <a href="/dashboard" class="button is-mint">
          <i class="fas fa-home mr-2"></i>홈으로 돌아가기
        </a>
        <button onclick="window.history.back()" class="button is-pink">
          <i class="fas fa-arrow-left mr-2"></i>이전 페이지
        </button>
        <a href="/claims" class="button is-outlined">
          <i class="fas fa-headset mr-2"></i>문의하기
        </a>
      </div>
    </div>

    <script>
      // 검색 기능
      document
        .querySelector('.search-box button')
        .addEventListener('click', function () {
          const searchTerm = document
            .querySelector('.search-box input')
            .value.trim();
          if (searchTerm) {
            window.location.href = `/search?q=${encodeURIComponent(
              searchTerm
            )}`;
          }
        });

      // 엔터키 검색
      document
        .querySelector('.search-box input')
        .addEventListener('keypress', function (e) {
          if (e.key === 'Enter') {
            document.querySelector('.search-box button').click();
          }
        });
    </script>
  </body>
</html>
