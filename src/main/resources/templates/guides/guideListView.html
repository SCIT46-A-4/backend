<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>게시판 목록</title>
    <link href="/css/bulma.min.css" rel="stylesheet" />
    <link href="/css/customColors.css" rel="stylesheet" />
    <link href="/css/footer.css" rel="stylesheet" />

    <script th:src="@{/js/jquery-3.7.1.min.js}"></script>
    <script th:src="@{/js/sweetalert2.js}"></script>

    <!-- 폰트어썸 -->
    <script
      crossorigin="anonymous"
      src="https://kit.fontawesome.com/def97ee41b.js"
    ></script>

    <style>
      /* ✅ 디테일뷰 배경색 적용 */
      html {
        background-color: var(--primary);
        /* #FDF5BF */
      }

      /* ✅ 제목과 검색창 사이 간격 증가 */
      .title.is-3 {
        margin-bottom: 20px;
        /* 기존보다 여유롭게 간격 조정 */
      }
    </style>

    <script>
      $(function () {
        init();
        // ページロード時に初期データを取得（初期検索: isInitialLoad=true）
        performSearch(true);
      });

      function init() {
        $('#searchBtn').on('click', function () {
          performSearch(false);
        });

        // リセットボタン：検索語をクリアし、初期データを再読み込み
        $('#resetBtn').on('click', function () {
          $('#searchWord').val('');
          performSearch(true);
        });

        // Enterキーで検索
        $('#searchWord').on('keypress', function (e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            performSearch(false);
          }
        });
      }

      // 検索ロジック：isInitialLoad が true の場合、検索語チェックなしで基本データ取得
      function performSearch(isInitialLoad) {
        let searchItem = $('#searchItem').val();
        let searchWord = $('#searchWord').val().trim();

        if (!isInitialLoad && searchWord === '') {
          Swal.fire('検索キーワードを入力してください。');
          return;
        }

        $.ajax({
          url: '/guides',
          method: 'POST',
          data: { searchItem: searchItem, searchWord: searchWord },
          success: function (response) {
            updateSearchResults(response);
          },
          error: function () {
            Swal.fire('検索中にエラーが発生しました。');
          },
        });
      }

      function updateSearchResults(results) {
        let outputHtml = '';
        if (results.length === 0) {
          outputHtml = `<p class="has-text-centered">検索結果がありません。</p>`;
        } else {
          $.each(results, function (index, item) {
            outputHtml += `
          <div class="box" style="margin-bottom: 10px;">
            <div class="level" style="display: flex; justify-content: space-between; align-items: center;">
              <p class="title is-5">${item.title}</p>
              <button type="button" class="button is-white contentBtn">
                <span class="icon"><i class="fas fa-caret-down"></i></span>
              </button>
            </div>
            <div class="content-section" style="display: none; padding: 10px; border-top: 1px solid #ddd;">
              <p>${item.content}</p>
            </div>
          </div>
        `;
          });
        }
        $('#searchResults').html(outputHtml);
        bindContentToggle();
      }

      function bindContentToggle() {
        $('.contentBtn')
          .off('click')
          .on('click', function () {
            let contentDiv = $(this).closest('.box').find('.content-section');
            contentDiv.toggle();
            let icon = $(this).find('i');
            if (icon.hasClass('fa-caret-down')) {
              icon.removeClass('fa-caret-down').addClass('fa-caret-up');
            } else {
              icon.removeClass('fa-caret-up').addClass('fa-caret-down');
            }
          });
      }
    </script>
  </head>

  <body>
    <section class="section">
      <!-- ロゴ + ダッシュボードへのリンク -->
      <div class="logo">
        <a th:href="@{/dashboard}">
          <img
            alt="ロゴ"
            class="image"
            src="../../static/images/wilog.png"
            style="width: 100px; height: auto"
            th:src="@{/images/wilog.png}"
          />
        </a>
      </div>

      <div class="container">
        <div class="has-text-centered">
          <h1 class="title is-3">ご利用案内</h1>
          <h2 class="title is-3">どのようなサポートが必要ですか？</h2>
        </div>

        <!-- 検索ボックス -->
        <div class="box">
          <form id="searchForm">
            <div class="field is-grouped">
              <!-- 検索対象の選択 -->
              <div class="control">
                <div class="select">
                  <select id="searchItem" name="searchItem">
                    <option value="title">タイトル</option>
                    <option value="content">本文</option>
                  </select>
                </div>
              </div>

              <!-- キーワード入力 -->
              <div class="control is-expanded">
                <input
                  class="input"
                  id="searchWord"
                  name="searchWord"
                  placeholder="検索キーワードを入力してください"
                  type="text"
                />
              </div>

              <!-- 検索ボタン -->
              <div class="control">
                <button class="button is-primary" id="searchBtn" type="button">
                  <span class="icon"><i class="fas fa-search"></i></span>
                </button>
              </div>

              <!-- リセットボタン -->
              <div class="control">
                <button class="button is-light" id="resetBtn" type="button">
                  リセット
                </button>
              </div>
            </div>
          </form>
        </div>

        <!-- 検索結果リスト -->
        <div id="searchResults">
          <!-- AJAXにより結果がここに追加されます -->
        </div>
      </div>
    </section>
    <div th:replace="fragments/footer :: ilogFooter"></div>
  </body>
</html>
