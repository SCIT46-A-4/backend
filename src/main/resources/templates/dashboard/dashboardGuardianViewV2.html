<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>보호자 대시보드 - iLog</title>
    <script
      src="../../static/js/jquery-3.7.1.min.js"
      th:src="@{/js/Jquery-3.7.1.min.js}"
    ></script>
    <link
      href="../../static/css/bulma.min.css"
      rel="stylesheet"
      th:href="@{/css/bulma.min.css}"
    />
    <link
      href="../../static/css/footer.css"
      rel="stylesheet"
      th:href="@{/css/footer.css}"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>
    <script src="https://code.highcharts.com/modules/offline-exporting.js"></script>
    <script src="https://code.highcharts.com/modules/exporting-csv.js"></script>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        var emotionColorMap = {
          喜び: '#FFD700',        // ゴールド（暖かい印象）
          悲しみ: '#4169E1',      // ロイヤルブルー（深い悲しみ）
          怒り: '#DC143C',        // クリムゾン（強い怒り）
          恐れ: '#483D8B',        // ダークスレートブルー（重たい印象）
          驚き: '#FFEC8B',        // 淡いオレンジ（軽快な驚き）
          中立: '#A9A9A9',        // ダークグレー（中立的な印象）
          混乱: '#FF69B4',        // ホットピンク（混乱した印象）
          不安: '#8B0000',        // ダークレッド（不安）
          退屈: '#2F4F4F',        // ダークスレートグレー（重い退屈さ）
          興奮: '#FF1493',        // ディープピンク（エネルギッシュな興奮）
          恥ずかしさ: '#FFDAB9', // ピーチパフ（柔らかな恥ずかしさ）
        };

        var emotionTypeMap = new Map([
          ['HAPPY', '喜び'],
          ['SAD', '悲しみ'],
          ['ANGRY', '怒り'],
          ['FEAR', '恐れ'],
          ['SURPRISED', '驚き'],
          ['NEUTRAL', '中立'],
          ['CONFUSED', '混乱'],
          ['ANXIOUS', '不安'],
          ['BORED', '退屈'],
          ['EXCITED', '興奮'],
          ['SHY', '恥ずかしさ'],
        ]);

        var emotionToColorMap = new Map();

        for (const [englishKey, koreanName] of emotionTypeMap.entries()) {
          const color = emotionColorMap[koreanName];
          if (color) {
            emotionToColorMap.set(englishKey, color);
          }
        }
        // 전역 차트 변수
        let mentalSurveyScoreLineChart, childEmotionScorePieChart;
        Highcharts.setOptions({
          lang: {
            contextButtonTitle: 'チャートメニュー',
            downloadPNG: 'PNG画像をダウンロード',
            downloadJPEG: 'JPEG画像をダウンロード',
            downloadPDF: 'PDFをダウンロード',
            downloadSVG: 'SVGをダウンロード',
            printChart: 'チャートを印刷',
            viewFullscreen: '全画面表示',
            exitFullscreen: '全画面を閉じる',
            downloadCSV: 'CSVをダウンロード',
            downloadXLS: 'Excelをダウンロード',
            openInCloud: 'Highchartsクラウドで開く',
            noData: '表示するデータがありません',
          },
          exporting: {
            enabled: true,
            fallbackToExportServer: false, // 서버 없이 내보내기
            libURL: 'https://code.highcharts.com/modules/', // 필요한 라이브러리 경로 설정
            buttons: {
              contextButton: {
                menuItems: [
                  'viewFullscreen',
                  'downloadPNG',
                  'downloadJPEG',
                  'downloadPDF',
                  'downloadCSV',
                  'downloadXLS',
                  'printChart',
                ],
              },
            },
          },
        });
        // 아동 선택에 따른 대시보드 업데이트 함수
        // 아동 선택에 따른 대시보드 업데이트 함수 (jQuery ajax 버전)
        function updateDashboard(childId) {
          // 로딩 인디케이터 표시
          $('#childInfoLoading').show();
          $('#childInfoContainer').hide();

          // 아동 정보 업데이트
          updateChildInfo(childId);

          const now = new Date();
          const endDate = new Date(
            now.getFullYear(),
            now.getMonth(),
            now.getDate(),
            23,
            59,
            59
          ).toISOString();
          const startDateObj = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000);
          startDateObj.setHours(0, 0, 0, 0);
          const aMonthAgo = startDateObj.toISOString();

          // 심리 설문 데이터 업데이트
          $.ajax({
            url: `/children/${childId}/mentalSurveys/responses/stats/data`,
            method: 'GET',
            data: {
              startDate: aMonthAgo,
              endDate: endDate,
            },
            dataType: 'json',
            success: function (mentalSurveyScores) {
              renderMentalStatsChart(childId, mentalSurveyScores);
            },
            error: function (xhr, status, error) {
              console.error(
                '대시보드 업데이트 중 심리 설문 데이터 에러 アプデート中エラーが発生しました。:',
                error
              );
            },
          });

          // 감정 분석 데이터 업데이트
          $.ajax({
            url: `/children/${childId}/analysis/results/stats/emotion/data`,
            method: 'GET',
            data: {
              startDate: aMonthAgo,
              endDate: endDate,
            },
            dataType: 'json',
            success: function (emotionRatioData) {
              renderEmotionRatioChart(childId, emotionRatioData);
            },
            error: function (xhr, status, error) {
              console.error(
                '대시보드 업데이트 중 감정 분석 데이터 에러:',
                error
              );
            },
          });
        }

        // 아동 정보 업데이트: 이름, 생년월일, 사진 등
        function updateChildInfo(childId) {
          const childOption = document.getElementById(`child-${childId}`);
          document.getElementById('childName').textContent =
            childOption.textContent;
          document.getElementById('childBirthdate').textContent =
            '生年月日: ' +
            new Date(
              childOption.getAttribute('data-birthDate')
            ).toLocaleDateString();
          document.getElementById('childAge').textContent =
            '年齢: 満 ' +
            calculateAge(childOption.getAttribute('data-birthDate')) +
            '歳';
          document.getElementById('childBirthLocation').textContent =
            '出生地: ' + childOption.getAttribute('data-birthLocation');
          document.getElementById('childGender').textContent =
            '性別: ' + childOption.getAttribute('data-gender');
          document.getElementById('childCallName').textContent =
            '呼称: ' + childOption.getAttribute('data-callName');

          const profileImgSrc = childOption.getAttribute('data-profileImgSrc');
          if (profileImgSrc) {
            document.querySelector('.child-photo').src = profileImgSrc;
          }
          // 데이터 로드 완료 후 로딩 인디케이터 숨기고 정보 표시
          document.getElementById('childInfoLoading').style.display = 'none';
          document.getElementById('childInfoContainer').style.display = 'block';
          document.getElementById(
            'childDetailLink'
          ).href = `/children/${childId}/basicInfo`;
          document.getElementById(
            'childRecordListLink'
          ).href = `/children/${childId}/recordList`;
          //diary로의 링크 넣어야함.
          document.getElementById(
            'childDiaryLink'
          ).href = `/children/${childId}/diaries/new`;
          document.getElementById(
            'childDiaryListLink'
          ).href = `/children/${childId}/diaries/diaryList`;

          document.getElementById(
            'childPermissionLink'
          ).href = `/auth/permissionGuardian/${childId}`;
        }

        function calculateAge(birthDateString) {
          const birthDate = new Date(birthDateString);
          const today = new Date();
          let age = today.getFullYear() - birthDate.getFullYear();
          const monthDiff = today.getMonth() - birthDate.getMonth();

          // 생일이 지나지 않았으면 1세 차감
          if (
            monthDiff < 0 ||
            (monthDiff === 0 && today.getDate() < birthDate.getDate())
          ) {
            age--;
          }
          return age;
        }

        // 감정 통계 차트 렌더링
        function renderEmotionRatioChart(childId, data) {
          // data 예시: [ { name: '인지발달', y: 30, color: '#BEE6D9' }, ... ]

          console.log('data:', data);
          const emotionData = data.seriesData.map((statPointData) => ({
            name: statPointData.label,
            y: statPointData.emotionRatio,
            percentage: statPointData.emotionRatio,
            color: emotionToColorMap.get(statPointData.emotionType),
          }));

          // 데이터가 없으면 컨테이너 중앙에 메시지 표시
          if (!emotionData || emotionData.length === 0) {
            document.getElementById('childEmotionScorePieChart').innerHTML =
              '<div style="text-align: center;">' +
              '<h1 style="font-size: 36px; color: #FDF5BF;">実施した分析がありません。</h1>' +
              `<button id="newAnalysisBtn" onclick="location.href='/children/${childId}/analysis/new'">分析する</button>` +
              '</div>';
            return;
          }

          childEmotionScorePieChart = Highcharts.chart(
            'childEmotionScorePieChart',
            {
              chart: {
                type: 'pie',
                events: {
                  load: function () {
                    const chart = this;
                    // 화면 리사이즈 시 차트 크기 재조정
                    window.addEventListener('resize', function () {
                      chart.reflow();
                    });
                  },
                },
              },
              title: { text: '最近1ヶ月間の児童感情分析結果' },
              plotOptions: {
                pie: {
                  innerSize: '50%',
                  dataLabels: {
                    enabled: true,
                    format: '<b>{point.name}</b>: {point.percentage:.1f} %',
                  },
                },
              },
              series: [{ name: '最近感情分析結果', data: emotionData }],
            }
          );
        }

        // 아동 목록이 있을 경우, 페이지 로드시 첫 번째 아동으로 대시보드 업데이트
        const childSelector = document.getElementById('childSelector');
        if (childSelector && childSelector.options.length > 0) {
          updateDashboard(childSelector.value);
        }

        // 아동 선택 변경 이벤트 처리
        if (childSelector) {
          // 초기 링크 업데이트
          updateChildLinks(childSelector.value);

          // 선택 변경 시 업데이트
          childSelector.addEventListener('change', function (e) {
            const childId = e.target.value;
            updateChildLinks(childId);
            // 대시보드 업데이트 함수 호출 (이미 구현되어 있다면)
            updateDashboard(childId);
          });
        }
      });

      function updateChildLinks(childId) {
        document.getElementById(
          'surveySelectLink'
        ).href = `/children/${childId}/mentalSurveys/selects`;
        document.getElementById(
          'surveyStatsLink'
        ).href = `/children/${childId}/mentalSurveys/responses/stats`;
        document.getElementById(
          'analysisInsertLink'
        ).href = `/children/${childId}/analysis/new`;
        document.getElementById(
          'analysisResultListLink'
        ).href = `/children/${childId}/analysis/resultList`;
      }

      function getRandomColor() {
        // 0부터 16777215(=0xFFFFFF) 사이의 랜덤 정수를 생성하고, 16진수 문자열로 변환
        const randomColor = Math.floor(Math.random() * 16777215).toString(16);
        // 6자리 숫자로 맞추기 위해 앞에 '0'을 붙임 (padStart)
        return '#' + randomColor.padStart(6, '0');
      }

      function calculateAverageResultScore(data) {
        if (!Array.isArray(data) || data.length === 0) {
          return 0;
        }
        const total = data.reduce((sum, item) => {
          const score = parseFloat(item.resultScore);
          return sum + (isNaN(score) ? 0 : score);
        }, 0);
        return total / data.length;
      }

      function renderMentalStatsChart(childId, mentalStats) {
        // seriesData가 없거나 길이가 0인 경우 메시지와 버튼 표시.
        if (
          (!mentalStats.parentSeriesData ||
            mentalStats.parentSeriesData.length === 0) &&
          (!mentalStats.teacherSeriesData ||
            mentalStats.teacherSeriesData.length === 0)
        ) {
          document.getElementById('mentalSurveyScoreLineChart').innerHTML =
            '<div style="text-align: center;">' +
            '<h1 style="font-size: 36px; color: #FDF5BF;">実施した設問がありません。</h1>' +
            `<button id="newMentalSurveyBtn" onclick="location.href='/children/${childId}/mentalSurveys/selects'">設問を作成</button>` +
            '</div>';
          return;
        }

        // data: [{ date, resultScore, detailUrl }, ...] 형식의 배열이라 가정.
        // Highcharts에서 사용하는 밀리초 단위의 타임스탬프로 변환 후 데이터 배열 생성.
        let parentSeriesData = mentalStats.parentSeriesData.map(
          (statPointData) => {
            return [
              new Date(statPointData.date).getTime(),
              statPointData.resultScore,
              statPointData.detailUrl,
            ];
          }
        );

        const parentSeriesDataAvg = calculateAverageResultScore(
          mentalStats.parentSeriesData
        );

        let teacherSeriesData = mentalStats.teacherSeriesData.map(
          (statPointData) => {
            return [
              new Date(statPointData.date).getTime(),
              statPointData.resultScore,
              statPointData.detailUrl,
            ];
          }
        );

        const teacherSeriesDataAvg = calculateAverageResultScore(
          mentalStats.teacherSeriesData
        );

        const totalSeriesDataAvg =
          (parentSeriesDataAvg + teacherSeriesDataAvg) / 2;

        console.log('parentSeriesData:', parentSeriesData);
        console.log('teacherSeriesData:', teacherSeriesData);

        // 데이터가 시간순으로 정렬되어 있지 않을 경우, 정렬
        parentSeriesData.sort((a, b) => a[0] - b[0]);
        teacherSeriesData.sort((a, b) => a[0] - b[0]);

        // Highcharts 차트 초기화 (일반 line 차트로 변경)
        Highcharts.chart('mentalSurveyScoreLineChart', {
          chart: {
            type: 'line',
            events: {
              load: function () {
                const chart = this;
                // 화면 리사이즈 시 차트 크기 재조정
                window.addEventListener('resize', function () {
                  chart.reflow();
                });
              },
            },
          },
          title: {
            text: '最近1ヶ月間の児童心理設問トレンド',
          },
          xAxis: {
            type: 'datetime',
            title: { text: '時間' },
          },
          yAxis: {
            max: 60,
            title: { text: '心理設問総点' },
            // ✅ 수평선 (기준선) 추가
            plotLines: [
              {
                color: '#B73C28',
                width: 2,
                dashStyle: 'shortdash',
                value: totalSeriesDataAvg,
                animation: {
                  duration: 1000,
                  defer: 4000,
                },
                label: {
                  text: '平均',
                  align: 'left',
                  x: -20,
                },
              },
            ],
          },
          tooltip: {
            formatter: function () {
              return `<b>${Highcharts.dateFormat('%Y-%m-%d', this.x)}</b>: ${
                this.y
              }`;
            },
          },
          series: [
            {
              name: '保護者心理設問結果',
              data: parentSeriesData.map((d) => [d[0], d[1]]),
              marker: {
                enabled: true,
                radius: 5,
              },
              cursor: 'pointer',
              point: {
                events: {
                  click: function () {
                    // 클릭한 포인트에 해당하는 링크를 찾아 새 탭에서 엽니다.
                    let pointData = parentSeriesData.find(
                      (item) => item[0] === this.x
                    );
                    if (pointData && pointData[2]) {
                      window.open(pointData[2], '_blank');
                    }
                  },
                },
              },
            },
            {
              name: '教師心理設問結果',
              data: teacherSeriesData.map((d) => [d[0], d[1]]),
              marker: {
                enabled: true,
                radius: 5,
              },
              cursor: 'pointer',
              point: {
                events: {
                  click: function () {
                    // 클릭한 포인트에 해당하는 링크를 찾아 새 탭에서 엽니다.
                    let pointData = teacherSeriesData.find(
                      (item) => item[0] === this.x
                    );
                    if (pointData && pointData[2]) {
                      window.open(pointData[2], '_blank');
                    }
                  },
                },
              },
            },
          ],
        });
      }
    </script>
    <style>
      /* ==========================
               전역 변수 (Root Variables)
           ========================== */
      :root {
        --primary-color: #fdf5bf;
        --secondary-color: #bee6d9;
        --bulma-navbar-item-img-max-height: 100px;
      }

      /* ==========================
                   네비게이션 스타일
           ========================== */
      .navbar {
        background-color: var(--primary-color);
      }

      @media screen and (min-width: 1024px) {
        .navbar,
        .navbar-end,
        .navbar-menu,
        .navbar-start {
          align-items: stretch;
          display: flex;
        }
      }

      @media screen and (max-width: 1023px) {
        .navbar {
          align-items: stretch;
          display: flex;
          justify-content: space-between;
        }
        .navbar-end {
          align-items: center;
          display: flex;
        }
      }

      /* ==========================
                   전체 레이아웃 컨테이너
           ========================== */
      .dashboard-wrapper {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
      }

      #dashboardContainer {
        max-width: 1400px;
        height: 1105px;
        margin: 0 auto;
        padding: 20px;
        display: flex;
        justify-content: space-between;
        gap: 50px;
        flex-wrap: wrap;
        overflow: hidden;
      }

      /* ==========================
                   좌측 패널 (아동 정보)
           ========================== */
      #childProfileContainer {
        flex: 1;
        max-width: 30%;
        min-width: 250px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: stretch;
        position: sticky;
      }

      #childLinkContainer {
        display: grid;
        grid-template-columns: repeat(3, 1fr); /* 3열 정렬 */
        gap: 10px;
        justify-items: center;
        align-items: center;
      }

      /* ==========================
               중간 패널 (설문 & 감정 분석)
           ========================== */
      #statsContainer {
        flex: 3;
        display: flex;
        flex-direction: column;
        gap: 20px;
        height: 1075px;
        overflow: visible !important;
      }

      /* 설문 통계 */
      #mentalSurveyStatsCard {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex: 1;
        min-height: 350px;
        max-height: 45%;
        overflow: hidden;
        position: relative;
      }

      #mentalSurveyScoreLineChart {
        width: 98%;
        height: auto;
        transform: scale(0.95);
        transform-origin: center;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.95);
        min-height: 80%;
        display: grid;
        place-items: center;
      }

      /* 감정 분석 */
      #sentAnalysisStatsCard {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex: 1;
        min-height: 350px;
        max-height: 50%;
        box-shadow: 0px 8px 8px rgba(0, 0, 0, 0.1) !important;
        overflow: visible !important;
      }

      #childEmotionScorePieChart {
        width: 88%;
        height: auto;
        transform: scale(1.05);
        transform-origin: center;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(1.05);
        min-height: 80%;
        display: grid;
        place-items: center;
      }

      /* ==========================
                   개별 요소 스타일
           ========================== */
      .card {
        height: 1065px;
        border-radius: 8px;
        padding: 15px;
      }

      .card.stats-card {
        background-color: var(--primary-color);
      }

      .stats-container {
        background-color: white;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1rem;
        overflow: hidden;
      }

      .child-photo {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        margin: 0 auto;
        display: block;
      }

      #logo {
        max-height: 80px;
        width: 70px;
        height: auto;
      }

      .has-background-color-primary {
        background-color: var(--primary-color);
      }

      .has-background-color-secondary {
        background-color: var(--secondary-color);
      }

      /* ==========================
                       버튼 스타일
           ========================== */
      #childPermissionLink .button.is-info {
        background-color: #fbed85 !important;
        color: black !important;
      }

      .right-align {
        display: flex;
        justify-content: flex-end;
      }

      .clickable-image {
        width: 30px;
        height: auto;
        cursor: pointer;
        transition: transform 0.2s ease-in-out;
      }

      .clickable-image:hover {
        transform: scale(1.1);
      }

      /* 3x3 버튼 레이아웃 */
      .grid-container {
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .grid-container a {
        display: flex;
        width: 80px;
        height: 100px;
      }

      /* 버튼 카드 스타일 */
      .info-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        background: white;
        border-radius: 12px;
        padding: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        transition: transform 0.2s, box-shadow 0.2s;
        width: 80px;
        height: 100px;
      }

      .info-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 2px 2px rgba(0, 0, 0, 0.15);
      }

      .info-card img {
        width: 40px;
        height: 40px;
        margin-bottom: 5px;
      }

      .info-card p {
        font-size: 10px;
        font-weight: bold;
        color: #333;
        margin: 0;
      }

      /* ==========================
                       반응형 디자인
           ========================== */
      @media screen and (max-width: 1024px) {
        .dashboard-wrapper {
          padding: 10px;
        }

        #dashboardContainer {
          flex-direction: column;
          align-items: center;
          gap: 20px;
          height: auto !important;
          overflow: visible !important;
        }

        .card {
          min-height: 1000px !important;
          height: auto !important;
        }

        #childProfileContainer {
          max-width: 100%;
          height: auto !important;
          min-height: 500px;
          display: flex;
          flex-direction: column;
          justify-content: flex-start;
        }

        #statsContainer {
          display: flex;
          flex-direction: column;
          align-items: center;
          width: 100%;
          height: auto !important;
          overflow: visible !important;
          order: 2;
        }

        #mentalSurveyStatsCard,
        #sentAnalysisStatsCard {
          width: 100% !important;
          height: auto !important;
          min-height: 400px !important;
          display: flex;
          justify-content: center;
          align-items: center;
        }

        #mentalSurveyScoreLineChart,
        #childEmotionScorePieChart {
          width: 100% !important;
          height: 350px !important;
          transform: none !important;
          position: static !important;
        }

        #childLinkContainer {
          grid-template-columns: repeat(3, 1fr);
        }

        #childPermissionLink {
          margin-bottom: 20px;
        }
      }

      @media screen and (max-width: 768px) {
        #childProfileContainer {
          min-height: 700px;
          padding-bottom: 40px;
        }

        .info-card {
          width: 100%;
          height: auto;
          padding: 15px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Navigation -->
    <nav aria-label="main navigation" class="navbar" role="navigation">
      <div class="navbar-brand">
        <a class="navbar-item" href="/">
          <img
            alt="iLog ロゴ"
            id="logo"
            src="../../static/images/wilog.png"
            th:src="@{/images/wilog.png}"
          />
        </a>
      </div>
      <div class="navbar-end">
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/guides"
              ><span>ご利用案内</span></a
            >
          </div>
        </div>
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/claims"
              ><span>カスタマーサポート</span></a
            >
          </div>
        </div>
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/auth/logout"
              ><span>ログアウト</span></a
            >
          </div>
        </div>
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" th:href="@{/members/myDetails}">
              <span class="icon"><i class="fas fa-user"></i></span>
              <span th:text="|${memberName}(${relationType})|"
                >김미영(保護者)</span
              >
            </a>
          </div>
        </div>
      </div>
    </nav>

    <!-- 子どもが未登録の場合 -->
    <th:block th:if="${#lists.isEmpty(childProfiles.childProfiles)}">
      <section class="section">
        <div class="container">
          <div
            class="notification has-text-centered has-background-color-primary"
            style="
              min-height: 60vh;
              display: flex;
              align-items: center;
              justify-content: center;
              flex-direction: column;
            "
          >
            <p class="title is-1 is-black has-text-primary-00">
              登録されたお子様がいません。
            </p>
            <a href="/children/new">
              <button
                class="
                  button
                  has-background-color-secondary
                  is-large
                  has-text-primary-00
                "
                id="addChildButton"
              >
                + 新しいお子様を登録する
              </button>
            </a>
          </div>
        </div>
      </section>
    </th:block>

    <!-- 子どもが登録されている場合 -->
    <th:block th:unless="${#lists.isEmpty(childProfiles.childProfiles)}">
      <div class="dashboard-wrapper">
        <div id="dashboardContainer">
          <!-- 子どもプロフィール -->
          <div id="childProfileContainer">
            <div class="card">
              <div class="card-content">
                <div class="field">
                  <div class="right-align" id="childLinkContainer2">
                    <a href="/children/new" id="childInfoInsertLink">
                      <img
                        alt="新しいお子様を登録する"
                        class="clickable-image"
                        src="../../static/images/btn.png"
                        th:src="@{/images/btn.png}"
                      />
                    </a>
                  </div>
                  <div class="control">
                    <div class="select is-fullwidth">
                      <select id="childSelector">
                        <th:block
                          th:each="child : ${childProfiles.childProfiles}"
                        >
                          <option
                            th:attr="data-birthDate=${child.birthDate}, data-profileImgSrc=${child.profileImgSrc},
                                   data-birthLocation=${child.birthLocation}, data-gender=${child.gender},
                                   data-callName=${child.callName}"
                            th:id="|child-${child.childId}|"
                            th:text="${child.name}"
                            th:value="${child.childId}"
                          ></option>
                        </th:block>
                      </select>
                    </div>
                  </div>
                </div>

                <!-- 로딩 -->
                <div id="childInfoLoading" style="display: none">
                  <div class="skeleton">
                    <p style="padding: 10px; text-align: center">
                      お子様の情報を読み込み中です...
                    </p>
                  </div>
                </div>

                <!-- 子ども情報 -->
                <div id="childInfoContainer">
                  <figure class="image is-square mb-2">
                    <img
                      alt="お子様の写真"
                      class="child-photo"
                      id="child-profile-photo"
                      src="../../static/images/ilog.png"
                      th:src="@{/images/ilog.png}"
                    />
                  </figure>
                  <div class="content">
                    <p class="title is-4 has-text-centered mb-4" id="childName">
                      お子様の名前
                    </p>
                    <p class="subtitle is-6" id="childBirthdate">生年月日</p>
                    <p class="subtitle is-6" id="childAge">年齢</p>
                    <p class="subtitle is-6" id="childGender">性別</p>
                    <p class="subtitle is-6" id="childBirthLocation">出生地</p>
                    <p class="subtitle is-6" id="childCallName">呼び名</p>
                    <hr />
                    <div class="grid-container" id="childLinkContainer">
                      <a
                        href="/children/{childId}/basicInfo"
                        id="childDetailLink"
                      >
                        <div class="info-card">
                          <img
                            alt="詳細"
                            src="../../static/images/btn2.png"
                            th:src="@{/images/btn2.png}"
                          />
                          <p>詳細情報</p>
                        </div>
                      </a>
                      <a
                        href="/children/{childId}/recordList"
                        id="childRecordListLink"
                      >
                        <div class="info-card">
                          <img
                            alt="成長情報"
                            src="../../static/images/btn5.png"
                            th:src="@{/images/btn5.png}"
                          />
                          <p>成長情報</p>
                        </div>
                      </a>
                      <a
                        href="/children/{childId}/mentalSurveys/selects"
                        id="surveySelectLink"
                      >
                        <div class="info-card">
                          <img
                            alt="アンケート作成"
                            src="../../static/images/btn4.png"
                            th:src="@{/images/btn4.png}"
                          />
                          <p>アンケート</p>
                        </div>
                      </a>
                      <a
                        href="/children/{childId}/mentalSurveys/responses/stats"
                        id="surveyStatsLink"
                      >
                        <div class="info-card">
                          <img
                            alt="アンケート結果"
                            src="../../static/images/btn3.png"
                            th:src="@{/images/btn3.png}"
                          />
                          <p>アンケート結果</p>
                        </div>
                      </a>
                      <a
                        href="/children/{childId}/analysis/new"
                        id="analysisInsertLink"
                      >
                        <div class="info-card">
                          <img
                            alt="分析"
                            src="../../static/images/btn12.png"
                            th:src="@{/images/btn12.png}"
                          />
                          <p>分析する</p>
                        </div>
                      </a>
                      <a
                        href="/children/{childId}/analysis/resultList"
                        id="analysisResultListLink"
                      >
                        <div class="info-card">
                          <img
                            alt="分析結果"
                            src="../../static/images/btn11.png"
                            th:src="@{/images/btn11.png}"
                          />
                          <p>分析一覧</p>
                        </div>
                      </a>
                      <a
                        href="/children/{childId}/diaries/new"
                        id="childDiaryLink"
                      >
                        <div class="info-card">
                          <img
                            alt="日記作成"
                            src="../../static/images/btn7.png"
                            th:src="@{/images/btn7.png}"
                          />
                          <p>日記を書く</p>
                        </div>
                      </a>
                      <a
                        href="/children/{childId}/diaries/diaryList"
                        id="childDiaryListLink"
                      >
                        <div class="info-card">
                          <img
                            alt="日記一覧"
                            src="../../static/images/btn8.png"
                            th:src="@{/images/btn8.png}"
                          />
                          <p>日記一覧</p>
                        </div>
                      </a>
                    </div>
                    <hr />
                    <div id="childLinkContainer2">
                      <a
                        href="/auth/permissionGuardian/{memberId}/{childId}"
                        id="childPermissionLink"
                      >
                        <button
                          class="button is-fullwidth is-info is-light mb-1"
                        >
                          お子様の権限を管理する
                        </button>
                      </a>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- 統計グラフ -->
          <div id="statsContainer">
            <div class="card stats-card" id="mentalSurveyStatsCard">
              <div class="card-content">
                <div
                  class="stats-container"
                  id="mentalSurveyScoreLineChart"
                ></div>
              </div>
            </div>
            <div class="card stats-card" id="sentAnalysisStatsCard">
              <div class="card-content">
                <div
                  class="stats-container"
                  id="childEmotionScorePieChart"
                ></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </th:block>

    <!-- フッター -->
    <div th:replace="fragments/footer :: ilogFooter"></div>
  </body>
</html>
