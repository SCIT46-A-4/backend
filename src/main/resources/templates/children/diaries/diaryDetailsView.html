<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>일기 상세 페이지</title>
    <!-- Bulma CSS -->
    <link
      rel="stylesheet"
      th:href="@{/css/bulma.min.css}"
      href="../../../static/css/bulma.min.css"
    />
    <style>
      body {
        background-color: #fdf5bf; /* 프라이머리 컬러 */
      }
      .secondary-bg {
        background-color: #bee6d9; /* 세컨더리 컬러 */
        border: none;
        color: #333;
      }
    </style>
    <script src="/js/jquery-3.7.1.min.js"></script>
    <script>
      // 모바일 대응을 위한 navbar burger 토글
      document.addEventListener('DOMContentLoaded', () => {
        const $navbarBurgers = Array.prototype.slice.call(
          document.querySelectorAll('.navbar-burger'),
          0
        );
        if ($navbarBurgers.length > 0) {
          $navbarBurgers.forEach((el) => {
            el.addEventListener('click', () => {
              const target = el.dataset.target;
              const $target = document.getElementById(target);
              el.classList.toggle('is-active');
              $target.classList.toggle('is-active');
            });
          });
        }
      });
    </script>
  </head>
  <body>
    <!-- 네비게이션 바 -->
    <nav class="navbar" role="navigation" aria-label="main navigation">
      <div class="navbar-brand">
        <a class="navbar-item" href="/dashboard">Dashboard</a>
        <a
          role="button"
          class="navbar-burger"
          aria-label="menu"
          aria-expanded="false"
          data-target="navMenu"
        >
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </a>
      </div>
      <div id="navMenu" class="navbar-menu">
        <div class="navbar-start">
          <!-- 추가 메뉴가 필요하면 이곳에 삽입 -->
        </div>
      </div>
    </nav>

    <section class="section">
      <div class="container">
        <h1 class="title has-text-centered" style="color: #fdf5bf">
          일기 상세 페이지
        </h1>
        <div class="box">
          <div class="content">
            <!-- 일기 제목, 내용, 작성일을 표시 -->
            <h2 class="subtitle" th:text="${diaryDetails.title}">제목</h2>
            <p th:text="${diaryDetails.content}">내용</p>
            <p>
              <strong>작성일:</strong>
              <span
                th:text="${#dates.format(diaryDetails.createdAt, 'yyyy-MM-dd HH:mm:ss')}"
                >작성일</span
              >
            </p>
          </div>
          <div class="has-text-centered">
            <a
              th:href="@{/children/diaries/{diaryId}/edit(diaryId=${diaryDetails.id})}"
            >
              <button class="button secondary-bg">수정하기</button>
            </a>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
