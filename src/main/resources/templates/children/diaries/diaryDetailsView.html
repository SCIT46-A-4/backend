<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>일기 상세 페이지</title>
    <!-- Bulma CSS -->
    <link
            href="../../../static/css/bulma.min.css"
            rel="stylesheet"
            th:href="@{/css/bulma.min.css}"
    />
    <link
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
            rel="stylesheet"
    />
    <link href="/css/customColors.css" rel="stylesheet"/>
    <style>
        body {
          background-color: #fdf5bf;
          /* 프라이머리 컬러 */
        }

        .secondary-bg {
          background-color: #bee6d9;
          /* 세컨더리 컬러 */
          border: none;
          color: #333;
        }

        /* 새로 추가한 CSS 클래스 (인라인 스타일 대체) */
        .logo-image {
          width: 100px;
          height: auto;
        }

        /* 로고 설정 */
        .logo a {
          display: inline-block;
        }

        .logo img {
          cursor: pointer;
        }

        #mainSection {
          min-height: 80vh;
        }

        #linkContainer {
          display: flex;
          justify-content: flex-end;
          align-items: center;
          margin-bottom: 10px;
        }
        #listBtn {
          background-color: var(--secondary);
        }
        #listLink {
          color: #333;
        }
    </style>
    <script src="/js/jquery-3.7.1.min.js"></script>

    <script>
        // 모바일 대응을 위한 navbar burger 토글
        document.addEventListener('DOMContentLoaded', () => {
          const $navbarBurgers = Array.prototype.slice.call(
            document.querySelectorAll('.navbar-burger'),
            0
          );
          if ($navbarBurgers.length > 0) {
            $navbarBurgers.forEach((el) => {
              el.addEventListener('click', () => {
                const target = el.dataset.target;
                const $target = document.getElementById(target);
                el.classList.toggle('is-active');
                $target.classList.toggle('is-active');
              });
            });
          }
        });
    </script>
</head>

<body>
<!-- 네비게이션 바 -->
<nav aria-label="main navigation" class="navbar" role="navigation">
    <div class="navbar-brand">
        <a class="navbar-item" href="/dashboard">
            <img
                    alt="iLog 로고"
                    id="logo"
                    src="../../static/images/wilog.png"
                    th:src="@{/images/wilog.png}"
            />
        </a>
    </div>
    <div class="navbar-end">
        <div class="navbar-item">
            <div class="buttons">
                <a class="button is-light" href="/guides"><span>이용안내</span></a>
            </div>
        </div>
        <div class="navbar-item">
            <div class="buttons">
                <a class="button is-light" href="/claims"><span>고객센터</span></a>
            </div>
        </div>
        <div class="navbar-item">
            <div class="buttons">
                <a class="button is-light" href="/dashboard"
                ><span>대시보드</span></a
                >
            </div>
        </div>
        <div class="navbar-item">
            <div class="buttons">
                <a class="button is-light" href="/auth/logout"
                ><span>로그아웃</span></a
                >
            </div>
        </div>
        <div class="navbar-item">
            <div class="buttons">
                <a class="button is-light" th:href="@{/members/myDetails}">
                    <span class="icon"><i class="fas fa-user"></i></span>
                    <span th:text="|${memberName}(${relationType})|"
                    >김미영(부모)</span
                    >
                </a>
            </div>
        </div>
    </div>
</nav>

<section class="section" id="mainSection">
    <div class="container">
        <h1 class="title has-text-centered">일기 상세 보기</h1>
        <div id="linkContainer">
            <button class="button is-medium" id="listBtn">
                <a
                        id="listLink"
                        th:href="@{/children/{childId}/diaries/diaryList(childId=${diaryDetails.childId})}"
                >목록보기</a
                >
            </button>
        </div>
        <div class="box">
            <div class="content">
                <!-- 일기 제목, 내용, 작성일을 표시 -->
                <h2 class="subtitle" th:text="${diaryDetails.title}">제목</h2>
                <p>
                    <strong>작성일:</strong>
                    <span
                            th:text="${#temporals.format(diaryDetails.createdAt, 'yyyy-MM-dd HH:mm:ss')}"
                    >작성일</span
                    >
                </p>
                <div class="box secondary-bg">
              <pre
                      class="is-size-4 has-text-centered"
                      th:text="${diaryDetails.content}"
              >
              내용</pre
              >
                </div>
            </div>
            <div class="has-text-centered">
                <a
                        th:href="@{/children/{childId}/diaries/{diaryId}/edit(childId=${diaryDetails.childId}, diaryId=${diaryDetails.id})}"
                >
                    <button class="button secondary-bg">수정하기</button>
                </a>
            </div>
        </div>
    </div>
</section>
<div th:replace="fragments/footer :: ilogFooter"></div>
</body>
</html>
