<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>우리 아이 일기장 수정 페이지</title>
  <!-- Bulma CSS -->
  <!-- <link rel="stylesheet" th:href="@{/css/bulma.min.css}" /> -->
  <link rel="stylesheet" th:href="@{/css/bulma.min.css}" href="../../../static/css/bulma.min.css" />
  <script src="/js/jquery-3.7.1.min.js"></script>
  <script src="/js/just-validate.production.min.js"></script>
  <style>
    .primary-color {
      color: #fdf5bf;
    }

    body {
      background-color: #fdf5bf;
    }

    .secondary-bg {
      background-color: #bee6d9;
    }

    /* 새로 추가한 CSS 클래스 (인라인 스타일 대체) */
    .logo-image {
      width: 100px;
      height: auto;
    }

    /* 로고 설정 */
    .logo a {
      display: inline-block;
    }

    .logo img {
      cursor: pointer;
    }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const validation = new JustValidate('#diaryEditForm');
      validation
        .addField('#title', [
          {
            rule: 'required',
            errorMessage: '제목을 입력해주세요.',
          },
          {
            rule: 'minLength',
            value: 3,
            errorMessage: '제목은 최소 3글자 이상이어야 합니다.',
          },
        ])
        .addField('#content', [
          {
            rule: 'required',
            errorMessage: '내용을 입력해주세요.',
          },
          {
            rule: 'minLength',
            value: 5,
            errorMessage: '내용은 최소 5글자 이상이어야 합니다.',
          },
        ])
        .onSuccess(function () {
          // 폼이 유효성 검사를 통과하면 폼을 제출합니다.
          document.getElementById('diaryEditForm').submit();
        });
    });
  </script>
</head>

<body>
  <!-- 네비게이션 바 -->
  <nav class="navbar secondary-bg" role="navigation" aria-label="main navigation">
    <div class="navbar-brand">
      <!-- 로고 + dashboard 바로가기 -->
      <div class="logo">
        <a th:href="@{/dashboard}">
          <img src="../../static/images/wilog.png" th:src="@{/images/wilog.png}" alt="로고" class="image logo-image" />
        </a>
      </div>
      <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navMenu">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </a>
    </div>
    <div id="navMenu" class="navbar-menu">
      <div class="navbar-start">
        <!-- 추가 메뉴가 필요하면 이곳에 삽입 -->
      </div>
    </div>
  </nav>

  <section class="section">
    <div class="container">
      <h1 class="title has-text-centered">
        우리 아이 일기장 수정 페이지
      </h1>
      <div class="box">
        <form id="diaryEditForm" th:action="@{|/children/${childId}/diaries/diaryList/${diary.id}/edit|}" method="post">
          <!-- Hidden 필드: id와 createdAt (수정 불가 값) -->
          <input type="hidden" name="id" th:value="${diary.id}" />
          <input type="hidden" th:value="${#temporals.format(diary.createdAt, 'yyyy-MM-dd HH:mm:ss')}" disabled>

          <!-- 제목 입력 필드 -->
          <div class="field">
            <label class="label" for="title">제목</label>
            <div class="control">
              <input class="input" type="text" id="title" name="title" placeholder="일기 제목을 입력해주세요." required
                th:value="${diary.title}" />
            </div>
          </div>
          <!-- 내용 입력 필드 -->
          <div class="field">
            <label class="label" for="content">내용</label>
            <div class="control">
              <textarea class="textarea" id="content" name="content" rows="10" placeholder="수정할 일기 내용을 입력해주세요." required
                th:text="${diary.content}"></textarea>
            </div>
          </div>
          <!-- 제출 버튼 -->
          <div class="field is-grouped is-grouped-centered">
            <div class="control">
              <button type="submit" class="button secondary-bg">
                수정 완료
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </section>
</body>

</html>
