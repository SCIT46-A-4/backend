<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>우리 아이 일기장 쓰기 페이지</title>
    <!-- Bulma CSS -->
    <link
      href="../../../static/css/bulma.min.css"
      rel="stylesheet"
      th:href="@{/css/bulma.min.css}"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <!-- jQuery and just-validate -->
    <script src="/js/jquery-3.7.1.min.js"></script>
    <script src="/js/just-validate.production.min.js"></script>

    <style>
      /* 프라이머리 컬러: #FDF5BF, 세컨더리 컬러: #BEE6D9 */
      body {
        background-color: #fdf5bf;
      }

      .secondary-bg {
        background-color: #bee6d9;
        border: none;
        color: #333;
      }
    </style>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const validation = new JustValidate('#diaryForm');
        validation
          .addField('#title', [
            {
              rule: 'required',
              errorMessage: 'タイトルを入力してください。',
            },
            {
              rule: 'minLength',
              value: 3,
              errorMessage: 'タイトルは3文字以上で入力してください。',
            },
          ])
          .addField('#content', [
            {
              rule: 'required',
              errorMessage: '内容を入力してください。',
            },
            {
              rule: 'minLength',
              value: 5,
              errorMessage: '内容は5文字以上で入力してください。',
            },
          ])
          .onSuccess(function () {
            // フォームがバリデーションを通過した場合、送信します。
            document.getElementById('diaryForm').submit();
          });
      });
    </script>
  </head>

  <body>
    <nav aria-label="main navigation" class="navbar" role="navigation">
      <div class="navbar-brand">
        <a class="navbar-item" href="/dashboard">
          <img
            alt="iLog ロゴ"
            id="logo"
            src="../../static/images/wilog.png"
            th:src="@{/images/wilog.png}"
          />
        </a>
      </div>
      <div class="navbar-end">
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/guides"
              ><span>ご利用ガイド</span></a
            >
          </div>
        </div>
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/claims"
              ><span>カスタマーサポート</span></a
            >
          </div>
        </div>
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/auth/logout"
              ><span>ログアウト</span></a
            >
          </div>
        </div>
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" th:href="@{/members/myDetails}">
              <span class="icon"><i class="fas fa-user"></i></span>
              <span th:text="|${memberName}(${relationType})|"
                >김미영(保護者)</span
              >
            </a>
          </div>
        </div>
      </div>
    </nav>

    <section class="section">
      <div class="container">
        <h1 class="title has-text-centered" style="color: #fdf5bf">
          お子さまの日記作成ページ
        </h1>
        <div class="box">
          <h2 class="subtitle">新しい日記を作成</h2>
          <form
            id="diaryForm"
            method="post"
            th:action="@{/children/{childId}/diaries/new(childId=${childId})}"
          >
            <input name="childId" th:value="${childId}" type="hidden" />
            <!-- タイトル入力 -->
            <div class="field">
              <label class="label" for="title">タイトル</label>
              <div class="control">
                <input
                  class="input"
                  id="title"
                  name="title"
                  placeholder="日記のタイトルを入力してください。"
                  required
                  type="text"
                />
              </div>
            </div>

            <!-- 内容入力 -->
            <div class="field">
              <label class="label" for="content">日記の内容</label>
              <div class="control">
                <textarea
                  class="textarea"
                  id="content"
                  name="content"
                  placeholder="日記の内容を入力してください。"
                  required
                  rows="4"
                ></textarea>
              </div>
            </div>

            <!-- 提出ボタン -->
            <div class="field is-grouped">
              <div class="control">
                <button class="button secondary-bg" type="submit">
                  作成する
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </section>

    <div th:replace="fragments/footer :: ilogFooter"></div>
  </body>
</html>
