<!DOCTYPE html>
<html
        lang="en"
        xmlns:th="http://thymeleaf.org"
        xmlns:sec="http://thymeleaf.org/extras/spring-security"
>
<head>
    <meta charset="UTF-8">
    <title>우리 아이 일기장 목록 페이지</title>
    <script src="/js/jquery-3.7.1.min.js"></script>
</head>
<body>

<h2>김승현군 일기장 목록 페이지</h2>

<a href="#">일기 쓰기</a>

<div id="list">
    <label>번호</label>&nbsp;
    <label>등록일</label>&nbsp;
    <label>제목</label>&nbsp;
</div>
<hr>
<div id="result">
    <table>
            <th:block th:if="${list.size()} == 0">
                <p style="text-align:center;">게시글이 없습니다.</p>
            </th:block>
    </table>
    <table>
            <th:block th:if="${list.size() != 0}">
    			<tr>
    				<th>번호</th>
    				<th>등록일</th>
    				<th>내용</th>
    				<th></th>
    			</tr>
    			<tr th:each="list, status : ${list}">
    				<td>[[${status.count}]]</td>
    				<td>[[${temporals.format(list.createdAt, 'yyyy/MM/dd')}]]</td>
    				<td>[[${list.content}]]</td>
    				<td><a>삭제</a></td>
    			</tr>
            </th:block>
    </table>
</div>

</body>
</html>
