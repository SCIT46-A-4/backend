<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>우리 아이 일기장 목록 페이지</title>
    <link
      href="../../../static/css/bulma.min.css"
      rel="stylesheet"
      th:href="@{/css/bulma.min.css}"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      /* 프라이머리 컬러: #FDF5BF, 세컨더리 컬러: #BEE6D9 */
      .primary-color {
        color: #fdf5bf;
      }

      body {
        background-color: #fdf5bf;
      }

      .secondary-bg {
        background-color: #bee6d9;
      }

      /* 네비게이션 바 사용자 정의 */
      .navbar {
        background-color: #bee6d9;
      }

      .navbar-item,
      .navbar-link {
        color: #333;
      }

      /* 추가적인 마진 조정 */
      .content-section {
        margin-top: 2rem;
      }

      /* 새로 추가한 CSS 클래스 (인라인 스타일 대체) */
      .logo-image {
        width: 100px;
        height: auto;
      }

      /* 로고 설정 */
      .logo a {
        display: inline-block;
      }

      .logo img {
        cursor: pointer;
      }
    </style>
    <script src="/js/jquery-3.7.1.min.js"></script>
    <script src="/js/sweetalert2.js"></script>

    <script>
      $(document).ready(function () {
        // ナビゲーションバーのバーガーメニュー（モバイル対応）
        $('.navbar-burger').click(function () {
          $('.navbar-burger, .navbar-menu').toggleClass('is-active');
        });

        $('.deleteBtn').click(function () {
          let diaryId = Number($(this).attr('data-diary-id'));
          let childId = Number($(this).attr('data-child-id'));

          // SweetAlert2 確認メッセージ
          Swal.fire({
            title: '削除の確認',
            text: '本当に削除してもよろしいですか？',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: '削除する',
            cancelButtonText: 'キャンセル',
            reverseButtons: true,
          }).then((result) => {
            if (result.isConfirmed) {
              $.ajax({
                type: 'DELETE',
                url: '/children/' + childId + '/diaries/' + diaryId,
                success: function (response) {
                  if (response === 'fail') {
                    Swal.fire('削除対象の日記が存在しません。');
                  } else {
                    Swal.fire('日記が削除されました。').then(() => {
                      window.location.href = response;
                    });
                  }
                },
                error: function () {
                  Swal.fire('削除中にエラーが発生しました。');
                },
              });
            }
          });
        });
      });
    </script>
  </head>

  <body>
    <!-- ナビゲーションバー -->
    <nav aria-label="main navigation" class="navbar" role="navigation">
      <div class="navbar-brand">
        <a class="navbar-item" href="/dashboard">
          <img
            alt="iLog ロゴ"
            src="../../static/images/wilog.png"
            style="max-height: 60px"
            th:src="@{/images/wilog.png}"
          />
        </a>
      </div>
      <div class="navbar-end">
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/dashboard">
              <span class="icon"><i class="fas fa-home"></i></span>
              <span>ダッシュボード</span>
            </a>
            <a class="button is-light" href="/guides">
              <span class="icon"><i class="fas fa-info-circle"></i></span>
              <span>ご利用ガイド</span>
            </a>
            <a class="button is-light" href="/claims">
              <span class="icon"><i class="fas fa-headset"></i></span>
              <span>お問い合わせ</span>
            </a>
          </div>
        </div>
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" th:href="@{/members/myDetails}">
              <span class="icon"><i class="fas fa-user"></i></span>
              <span th:text="|${memberName}(${relationType})|"
                >김미영(保護者)</span
              >
            </a>
          </div>
        </div>
      </div>
    </nav>

    <section class="section content-section">
      <div class="container">
        <h2 class="title is-3">わたしの子どもの日記一覧ページ</h2>
        <hr />
        <div class="level">
          <div class="level-left">
            <div class="level-item">
              <p class="subtitle">お子さまの日記一覧</p>
            </div>
          </div>
          <div class="level-right">
            <div class="level-item">
              <a
                class="button is-medium secondary-bg"
                th:href="@{/children/{childId}/diaries/new(childId=${childId})}"
              >
                日記を書く
              </a>
            </div>
          </div>
        </div>
        <hr />

        <!-- 日記一覧テーブル -->
        <table class="table is-striped is-fullwidth">
          <thead>
            <tr>
              <th>番号</th>
              <th>日記タイトル</th>
              <th>作成日</th>
              <th>削除</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="diary : ${list.content}">
              <td th:text="${diary.id}"></td>
              <td>
                <a
                  th:href="@{/children/{childId}/diaries/{id}/details(childId=${childId},id=${diary.id})}"
                  th:text="${diary.title}"
                >
                  日記タイトル
                </a>
              </td>
              <td
                th:text="${#temporals.format(diary.createdAt, 'yyyy-MM-dd HH:mm:ss')}"
              ></td>
              <td>
                <button
                  class="button is-danger deleteBtn"
                  th:data-child-id="${childId}"
                  th:data-diary-id="${diary.id}"
                  type="button"
                >
                  削除
                </button>
              </td>
            </tr>
          </tbody>
        </table>

        <!-- ページネーション -->
        <nav
          aria-label="pagination"
          class="pagination is-centered"
          role="navigation"
          th:if="${list.totalPages > 1}"
        >
          <a
            class="pagination-previous"
            th:classappend="${list.hasPrevious() ? '' : ' is-disabled'}"
            th:href="@{/children/{childId}/diaries/diaryList(childId=${childId}, page=0)}"
            >&laquo; 最初</a
          >

          <a
            class="pagination-previous"
            th:classappend="${list.hasPrevious() ? '' : ' is-disabled'}"
            th:href="@{/children/{childId}/diaries/diaryList(childId=${childId}, page=${list.number - 1})}"
            >&lt; 前へ</a
          >

          <ul class="pagination-list">
            <li
              th:classappend="${i == list.number ? ' is-current' : ''}"
              th:each="i : ${#numbers.sequence(0, list.totalPages - 1)}"
            >
              <a
                class="pagination-link"
                th:href="@{/children/{childId}/diaries/diaryList(childId=${childId}, page=${i})}"
                th:text="${i + 1}"
              ></a>
            </li>
          </ul>

          <a
            class="pagination-next"
            th:classappend="${list.hasNext() ? '' : ' is-disabled'}"
            th:href="@{/children/{childId}/diaries/diaryList(childId=${childId}, page=${list.number + 1})}"
            >次へ &gt;</a
          >

          <a
            class="pagination-next"
            th:classappend="${list.hasNext() ? '' : ' is-disabled'}"
            th:href="@{/children/{childId}/diaries/diaryList(childId=${childId}, page=${list.totalPages - 1})}"
            >最後 &raquo;</a
          >
        </nav>
      </div>
    </section>
    <div th:replace="fragments/footer :: ilogFooter"></div>
  </body>
</html>
