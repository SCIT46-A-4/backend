<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>아동 신체정보 등록</title>

    <!-- Bulma 스타일 -->
    <link href="/css/bulma.min.css" rel="stylesheet" />
    <link href="/css/customColors.css" rel="stylesheet" />

    <!-- FilePond CSS -->
    <link href="/css/filepond.css" rel="stylesheet" />
    <link href="/css/filepond-plugin-image-preview.css" rel="stylesheet" />

    <!-- jQuery 로드 -->
    <script src="/js/jquery-3.7.1.min.js"></script>

    <!-- FilePond 라이브러리 및 플러그인 -->
    <script src="/js/filepond/filepond.min.js"></script>
    <script src="/js/filepond/filepond.jquery.js"></script>
    <script src="/js/filepond/filepond-plugin-file-validate-size.js"></script>
    <script src="/js/filepond/filepond-plugin-file-validate-type.min.js"></script>
    <script src="/js/filepond/filepond-plugin-file-encode.min.js"></script>
    <script src="/js/filepond/filepond-plugin-image-preview.js"></script>
    <script src="/js/filepond/filepond-plugin-image-exif-orientation.min.js"></script>
    <script src="/js/filepond/filepond-plugin-image-edit.js"></script>

    <script src="/js/sweetalert2.js"></script>

    <style>
      body {
        background-color: #fdf5bf;
      }

      .fixed-size-box {
        width: 100px;
        /* 원하는 크기로 조정 */
        height: 100px;
        /* 정사각형으로 설정 */
        border-radius: 50%;
        /* 원형으로 만듦 */
        overflow: hidden;
        /* 넘치는 부분 제거 */
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: transparent;
        /* 배경 제거 */
      }

      .div-size-cust {
        /* padding: 0; */
        box-shadow: none;
        background-image: url('/images/ilog.png');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      #getChildRecordFromImgBtn {
        margin: 10px auto;
        width: auto;
        display: block;
      }

      #extractloadingIndicator {
        display: none;
        position: fixed;
        width: 100vw;
        height: 100vh;
        top: 0;
        left: 0;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        place-items: center;
      }

      #extractLoader {
        width: 100px;
        height: 75px;
        margin: 0 auto;
        background: #fff;
        position: relative;
        border-radius: 100%;
      }

      #extractLoader:before {
        content: '';
        position: absolute;
        box-sizing: border-box;
        border: 15px solid transparent;
        border-top: 25px solid #fff;
        transform: rotate(45deg);
        top: 50px;
        left: -15px;
      }

      #extractLoader:after {
        content: '';
        width: 12px;
        height: 12px;
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        background-color: #ff3d00;
        box-shadow: 20px 0 #ff3d00, -20px 0 #ff3d00;
        animation: flash 0.5s ease-out infinite alternate;
      }

      @keyframes flash {
        0% {
          background-color: rgba(255, 60, 0, 0.25);
          box-shadow: 20px 0 rgba(255, 60, 0, 0.25), -20px 0 #ff3d00;
        }
        50% {
          background-color: #ff3d00;
          box-shadow: 20px 0 rgba(255, 60, 0, 0.25),
            -20px 0 rgba(255, 60, 0, 0.25);
        }
        100% {
          background-color: rgba(255, 60, 0, 0.25);
          box-shadow: 20px 0 #ff3d00, -20px 0 rgba(255, 60, 0, 0.25);
        }
      }
    </style>

    <script>
      $(document).ready(function () {
        console.log('✅ ドキュメントが読み込まれました');

        // ✅ FilePond プラグイン登録
        if (typeof FilePond !== 'undefined') {
          FilePond.registerPlugin(
            FilePondPluginImagePreview,
            FilePondPluginImageExifOrientation,
            FilePondPluginFileValidateSize,
            FilePondPluginFileEncode,
            FilePondPluginFileValidateType
          );

          // ✅ FilePond 初期化
          $('.filepond').each(function () {
            FilePond.create(this, {
              allowMultiple: false,
              maxFileSize: '30MB',
              acceptedFileTypes: ['image/*'],
              imagePreviewHeight: 300,
              imageCropAspectRatio: '1:1',
              imageResizeTargetWidth: 300,
              imageResizeTargetHeight: 150,
              labelIdle:
                "ファイルをここにドラッグするか、<span class='filepond--label-action'>参照</span>してください",
              stylePanelLayout: 'integrated',
              credits: false,
              styleLoadIndicatorPosition: 'center bottom',
              styleProgressIndicatorPosition: 'right bottom',
              styleButtonProcessItemPosition: 'right bottom',
              styleButtonRemoveItemPosition: 'left bottom',
              stylePanelAspectRatio: '0.5',
              styleItemPanelAspectRatio: '0.5',
              stylePanelBackgroundColor: '#666666',
            });
          });

          $('.filepond').on('FilePond:addfile', function (e) {
            console.log('📌 ファイルが追加されました:', e.detail.file);
          });
        } else {
          console.error('❌ FilePond が読み込まれていません');
        }

        console.log('✅ FilePond 初期化完了');

        // ✅ フォーム送信処理
        $('#childRecordForm').on('submit', function (event) {
          event.preventDefault();
          console.log('📌 フォーム送信イベント発生');

          let formData = new FormData();
          const childId = $(this).data('child-id');

          formData.append('height', $("input[name='height']").val());
          formData.append('weight', $("input[name='weight']").val());

          let leftEye = $("input[name='leftEye']").val();
          let rightEye = $("input[name='rightEye']").val();
          let note = $("textarea[name='note']").val();

          if (leftEye !== '' && leftEye !== null) {
            formData.append('leftEye', leftEye);
          }

          if (rightEye !== '' && rightEye !== null) {
            formData.append('rightEye', rightEye);
          }

          if (note !== '' && note !== null) {
            formData.append('note', note);
          }

          let pondInstance = FilePond.find(document.querySelector('.filepond'));
          let files = pondInstance.getFiles();

          if (files.length > 0) {
            formData.append('healthCheckImg', files[0].file);
            console.log('📌 ファイル追加完了:', files[0].file.name);
          } else {
            console.warn('❌ ファイルがアップロードされていません');
          }

          console.log('📌 FormData 内容:', [...formData.entries()]);

          $.ajax({
            url: `/children/${childId}/records/new`,
            type: 'POST',
            data: formData,
            contentType: false,
            processData: false,
            dataType: 'json',
            success: function (response) {
              console.log('✅ サーバー応答:', response);

              if (response.success) {
                console.log(
                  '✅ アップロード成功! リダイレクト先:',
                  response.redirectUrl
                );
                window.location.href = response.redirectUrl;
              } else {
                Swal.fire({
                  icon: 'error',
                  title: 'アップロードに失敗しました',
                  text: 'もう一度お試しください。',
                });
              }
            },
            error: function (xhr, status, error) {
              console.error('❌ AJAX エラー発生!');
              console.error('🚨 ステータスコード:', status);
              console.error('🚨 エラーメッセージ:', error);
              console.error('🚨 サーバー応答:', xhr.responseText);
              Swal.fire({
                icon: 'error',
                text: '身長と体重を必ず入力してください。',
              });
            },
          });
        });

        $('#getChildRecordFromImgBtn').on('click', function (e) {
          e.preventDefault();
          Swal.fire({
            title: '健康診断票の画像から身体情報を読み込みますか？',
            text: 'アップロードされた健康診断票に身長、体重、視力が明確に記載されているかご確認ください。',
            icon: 'info',
            showCancelButton: true,
            confirmButtonText: 'はい',
            cancelButtonText: 'いいえ',
          }).then((result) => {
            if (result.isConfirmed) {
              $('#extractloadingIndicator').css('display', 'grid');
              let pondInstance = FilePond.find(
                document.querySelector('.filepond')
              );
              let files = pondInstance.getFiles();

              if (files.length > 0) {
                const healthCheckImg = files[0].file;
                const formData = new FormData();
                formData.append('healthCheckImg', healthCheckImg);
                $.ajax({
                  url: '/children/healthCheck/recordData',
                  type: 'POST',
                  data: formData,
                  contentType: false,
                  processData: false,
                  dataType: 'json',
                  success: function (res) {
                    $('#extractloadingIndicator').css('display', 'none');
                    console.log(res);
                    $('#weightInput').val(res.weight);
                    $('#heightInput').val(res.height);
                    $('#leftEyeInput').val(res.leftEye);
                    $('#rightEyeInput').val(res.rightEye);
                    $('#docterComment').val(res.docterComment);
                    Swal.fire('読み込みが完了しました。');
                  },
                  error: function (res) {
                    $('#extractloadingIndicator').css('display', 'none');
                    Swal.fire('健康診断情報の取得に失敗しました！');
                  },
                });
              } else {
                $('#extractloadingIndicator').css('display', 'none');
                Swal.fire('ファイルが正しくアップロードされていません！');
              }
            }
          });
        });
      });
    </script>
  </head>

  <body>
    <section class="section">
      <div class="container">
        <div class="columns is-centered">
          <div class="column is-half">
            <div
              class="
                columns
                is-centered
                is-flex
                is-align-items-center
                is-justify-content-center
              "
            >
              <a th:href="@{/dashboard/guardian}">
                <div
                  bis_skin_checked="1"
                  class="box fixed-size-box div-size-cust"
                ></div>
              </a>
              <div class="ml-4">
                <h1 class="title has-text-centered">お子様の身体情報登録</h1>
              </div>
            </div>

            <form
              enctype="multipart/form-data"
              id="childRecordForm"
              method="post"
              th:data-child-id="${childId}"
            >
              <div class="box">
                <div class="columns is-multiline">
                  <div class="column is-half">
                    <label class="label">身長*</label>
                    <input
                      class="input"
                      id="heightInput"
                      name="height"
                      placeholder="000.0cm 単位"
                      step="0.1"
                      type="number"
                    />
                  </div>

                  <div class="column is-half">
                    <label class="label">体重*</label>
                    <input
                      class="input"
                      id="weightInput"
                      name="weight"
                      placeholder="00.0kg 単位"
                      step="0.1"
                      type="number"
                    />
                  </div>

                  <div class="column is-half">
                    <label class="label">視力（左）</label>
                    <input
                      class="input"
                      id="leftEyeInput"
                      name="leftEye"
                      placeholder="0.0 形式"
                      step="0.1"
                      type="number"
                    />
                  </div>

                  <div class="column is-half">
                    <label class="label">視力（右）</label>
                    <input
                      class="input"
                      id="rightEyeInput"
                      name="rightEye"
                      placeholder="0.0 形式"
                      step="0.1"
                      type="number"
                    />
                  </div>

                  <div class="column is-full">
                    <label class="label">所見</label>
                    <textarea
                      class="textarea"
                      id="docterComment"
                      name="note"
                      placeholder="追加の所見を入力してください"
                    ></textarea>
                  </div>
                </div>
              </div>

              <!-- ファイルアップロード -->
              <input
                class="filepond"
                data-allow-reorder="true"
                data-max-file-size="20MB"
                data-max-files="1"
                name="healthCheckImg"
                type="file"
              />

              <!-- 登録ボタン -->
              <div class="has-text-centered">
                <button class="button is-medium" id="getChildRecordFromImgBtn">
                  アップロードしたファイルから身体情報を取得
                </button>
                <button class="button is-dark is-medium" type="submit">
                  登録する
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>

    <div id="extractloadingIndicator">
      <span id="extractLoader"></span>
    </div>

    <div th:replace="fragments/footer :: ilogFooter"></div>
  </body>
</html>
