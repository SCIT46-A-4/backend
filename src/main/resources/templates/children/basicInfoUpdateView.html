<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org" xmlns:sec="http://thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<title>아동 정보 수정 페이지</title>
<script src="/js/jquery-3.7.1.min.js"></script>
<style>
    /* 미리보기 컨테이너 */
    #previewContainer {
        display: flex;
        gap: 10px; /* 두 이미지 간격 */
    }
    .imagePreview {
        width: 100%;
        height: 100%;
        border: 1px solid #ddd;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background-color: #f8f8f8;
    }
    .imagePreview img {
        max-width: 100px;
        max-height: 200px;
    }
</style>
</head>

<body>
    <h1> 아이 상세 수정 페이지</h1>

    
        <div class="imagePreview">
            <!-- <div>
                <input type="file" id="imageUpload1" name="uploadFile" accept="image/*">
                <div id="previewContainer">
                    <div id="imagePreview1" class="imagePreview">이미지를 선택하세요</div>
                </div>
            </div> -->
            
            <div>
                <form id="childForm" th:action="@{|/children/${child.id}/details/edit|}" method="post" enctype="multipart/form-data"></form>
                <label> 이름 <input type="text" id="name" name="name" th:value="${child.name}"> </label>
                <br>

                <label> 성별 
                    <input type="radio" name="gender" value="MAN" th:checked="${child.gender == 'MAN'}"> 남
                    <input type="radio" name="gender" value="WOMAN" th:checked="${child.gender == 'WOMAN'}"> 여
                </label>
                <br>

                <label> 생년월일 <input type="datetime-local" id="birthDate" name="birthDate"  th:value="${child.birthDate}"> </label> 
                <br>    

                <label> 출생지 <input type="text" id="birthPlace" name="birthPlace" th:value="${child.birthLocation}"> </label>
                <br>

                <label> 특이사항 <input type="text" id="note" name="note" th:value="${child.note}"> </label>
                <br>
                <button type="submit" id="submitBtn"> 수정하기</button>
                <button type="button" th:onclick="|window.location.href='/children/${child.id}/details'|"> 취소하기</button>
                </form>
            </div>
            
            
        </div>
    
</body>

</html>
