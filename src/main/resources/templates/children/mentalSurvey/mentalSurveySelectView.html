<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>설문 목록</title>
    <!-- Bulma CSS -->
    <link
      rel="stylesheet"
      th:href="@{/css/bulma.min.css}"
      href="../../../static/css/bulma.min.css"
    />
    <link
      rel="stylesheet"
      th:href="@{/css/customColors.css}"
      href="../../../static/css/customColors.css"
    />
    <link
      rel="stylesheet"
      th:href="@{/css/footer.css}"
      href="../../../static/css/footer.css"
    />

    <style>
      .primary-color {
        color: #fdf5bf;
      }

      html {
        background-color: #fdf5bf;
      }

      h1 {
        text-align: center;
      }

      .secondary-bg {
        background-color: #bee6d9;
      }

      .media-content {
        margin-top: 10px;
        margin-bottom: 10px;
      }

      /* 설문 목록 간격 조정을 위한 스타일 추가 */
      .survey-list {
        display: flex;
        flex-direction: column;
        gap: 20px;
        /* 설문 항목 사이 간격 */
      }

      .survey-item {
        margin: 0;
        /* 기존 마진 제거 */
      }

      .survey-box {
        padding: 1.5rem;
        /* 박스 내부 여백 */
        transition: transform 0.2s ease;
        /* 호버 효과를 위한 트랜지션 */
      }

      .survey-box:hover {
        transform: translateY(-3px);
        /* 호버 시 살짝 위로 떠오르는 효과 */
      }
    </style>
  </head>
  <!-- 2025-03-13 / 김은진 / 수정 -->

  <body>
    <!-- 네비게이션 바 -->
    <nav class="navbar" role="navigation" aria-label="main navigation">
      <div class="navbar-brand">
        <a class="navbar-item" href="/dashboard">
          <img
            src="../../static/images/wilog.png"
            th:src="@{/images/wilog.png}"
            alt="iLog 로고"
            style="max-height: 60px"
          />
        </a>
      </div>
      <div class="navbar-end">
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/dashboard">
              <span class="icon"><i class="fas fa-home"></i></span>
              <span>대시보드</span>
            </a>
            <a class="button is-light" href="/guides">
              <span class="icon"><i class="fas fa-info-circle"></i></span>
              <span>이용안내</span>
            </a>
            <a class="button is-light" href="/claims">
              <span class="icon"><i class="fas fa-headset"></i></span>
              <span>고객센터</span>
            </a>
          </div>
        </div>
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" th:href="@{/members/myDetails}">
              <span class="icon"><i class="fas fa-user"></i></span>
              <span th:text="|${memberName}(${relationType})|"
                >김미영(부모)</span
              >
            </a>
          </div>
        </div>
      </div>
    </nav>

    <section class="section">
      <div class="container">
        <h1 class="title primary-color">설문 목록</h1>
        <ul class="survey-list">
          <li
            th:each="survey : ${mentalSurveys}"
            th:if="${survey.type == userType}"
            class="survey-item"
          >
            <div class="box survey-box">
              <article class="media">
                <div class="media-content">
                  <div class="content">
                    <p>
                      <strong
                        th:text="${survey.title}"
                        class="survey-title"
                      ></strong>
                      <br />
                      <!-- <span th:text="${survey.description}"></span> -->
                    </p>
                  </div>
                </div>
                <div class="media-right">
                  <a th:href="@{${survey.link}}" class="button secondary-bg"
                    >바로가기</a
                  >
                </div>
              </article>
            </div>
          </li>
        </ul>
      </div>
    </section>
    <div th:replace="fragments/footer :: ilogFooter"></div>
  </body>
</html>
