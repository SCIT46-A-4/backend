<!DOCTYPE html>
<html lang="ko" xmlns:th="http://thymeleaf.org" xmlns:sec="http://thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<title>아이 정보 등록 페이지</title>
<script src="/js/jquery-3.7.1.min.js"></script>
<style>
    /* 미리보기 컨테이너 */
    #previewContainer {
        display: flex;
        gap: 10px; /* 두 이미지 간격 */
    }
    .imagePreview {
        width: 100%;
        height: 100%;
        border: 1px solid #ddd;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background-color: #f8f8f8;
    }
    .imagePreview img {
        max-width: 100px;
        max-height: 200px;
    }
</style>
</head>

<body>

    <h1>아이 정보 등록 페이지</h1>

    <form id="childForm" th:action="@{/children/new}" method="post" enctype="multipart/form-data">
        <div class="imagePreview">
            <div>
                <input type="file" id="imageUpload1" name="uploadFile" accept="image/*">
                <div id="previewContainer">
                    <div id="imagePreview1" class="imagePreview">이미지를 선택하세요</div>
                </div>
            </div>
            <div>
                <label> 이름 <input type="text" id="name" name="name"> </label>
                <br>
                <label> 성별 
                    <input type="radio" name="gender" value="MAN"> 남
                    <input type="radio" name="gender" value="WOMAN"> 여
                </label>
                <br>
                <label> 생년월일 <input type="datetime-local" id="birthDate" name="birthDate"> </label> 
                <br>    
                <label> 출생지 <input type="text" id="birthPlace" name="birthPlace"> </label>
                <br>
                <label> 특이사항 <input type="text" id="notes" name="notes"> </label>
                <br>
                <button type="button" id="submitBtn"> 등록하기</button>
            </div>
        </div>
    </form>

    <script>
        function previewImage(input, previewId) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById(previewId);
                    preview.innerHTML = ''; // 기존 내용을 지우고
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    preview.appendChild(img);
                };
                reader.readAsDataURL(file);
            }
        }

        document.getElementById('imageUpload1').addEventListener('change', function() {
            previewImage(this, 'imagePreview1');
        });

        function checkLimit() {
            let name = document.getElementById("name");
            let birthPlace = document.getElementById("birthPlace");
            let notes = document.getElementById("notes");
            let birthDate = document.getElementById("birthDate");
            let gender = document.querySelector('input[name="gender"]:checked');

            if (name.value.trim() === "") {
                alert("이름을 입력하세요!");
                name.focus();
                return false;
            }

            if (!gender) {
                alert("성별을 선택하세요!");
                return false;
            }

            if (birthDate.value.trim() === "") {
                alert("생년월일을 입력하세요!");
                birthDate.focus();
                return false;
            }

            if (birthPlace.value.trim() === "") {
                alert("출생지를 입력하세요!");
                birthPlace.focus();
                return false;
            }

            if (notes.value.trim() === "") {
                alert("특이사항을 입력하세요!");
                notes.focus();
                return false;
            }

            return true; // 모든 값이 채워졌다면 true 반환
        }

        document.getElementById("submitBtn").addEventListener("click", function() {
            if (checkLimit()) {
                document.getElementById("childForm").submit(); // 폼 제출
            }
        });
    </script>

</body>
</html>
