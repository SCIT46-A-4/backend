<!DOCTYPE html>
<html lang="ko" xmlns:th="http://thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>아동 상세 정보 등록 페이지</title>

    <!-- bulma -->
    <link
      href="../../static/css/bulma.min.css"
      rel="stylesheet"
      th:href="@{/css/bulma.min.css}"
    />

    <!-- customColors -->
    <link
      href="../../static/css/customColors.css"
      rel="stylesheet"
      th:href="@{/css/customColors.css}"
    />

    <script src="/js/jquery-3.7.1.min.js"></script>

    <!-- just-validate -->
    <script th:src="@{/js/just-validate.production.min.js}"></script>
    <script src="/js/just-validate.production.min.js"></script>

    <!-- FilePond CSS -->
    <link
      href="/css/filepond.css"
      rel="stylesheet"
      th:href="@{/css/filepond.css}"
    />
    <link
      href="/css/filepond-plugin-image-preview.css"
      rel="stylesheet"
      th:href="@{/css/filepond-plugin-image-preview.css}"
    />

    <!-- FilePond JS -->
    <!-- FilePond JS 및 플러그인 -->
    <script src="/js/filepond/filepond.min.js"></script>
    <script src="/js/filepond-plugin-file-encode.min.js"></script>
    <script src="/js/filepond-plugin-file-validate-type.min.js"></script>
    <script src="/js/filepond-plugin-image-preview.min.js"></script>
    <script src="/js/filepond-plugin-image-exif-orientation.min.js"></script>
    <script src="/js/filepond-plugin-image-resize.min.js"></script>
    <script src="/js/filepond-plugin-image-transform.min.js"></script>

    <!-- sweetalert2 -->
    <script
      src="../../static/js/sweetalert2.js"
      th:src="@{/js/sweetalert2.js}"
    ></script>

    <style>
      /* 전체 배경색 */
      body {
        margin: 0;
        background-color: #fdf5bf;
      }

      /* 왼쪽과 오른쪽 컬럼 크기 동일하게 조정 */
      .left-half,
      .right-half {
        flex-basis: 50%;
        max-width: 650px;
        max-height: 650px;
        padding: 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      /* 오른쪽 컬럼 배경색 적용 및 스크롤 추가 */
      .right-half {
        background-color: #fdf5bf;
        height: 100vh;
        overflow-y: auto;
        display: flex;
        align-items: flex-start;
        padding-top: 2rem;
      }

      /* 부모 컨테이너 높이 유지 */
      .columns {
        min-height: 100vh;
      }

      /* 반응형 조정 (태블릿 및 모바일) */
      @media (max-width: 1024px) {
        .left-half,
        .right-half {
          max-width: 100%;
          padding: 1.5rem;
          height: auto;
        }

        .regist-box {
          width: 90%;
          max-width: 400px;
          padding: 1.5rem;
        }

        /* 모바일에서는 높이 자동 조정 */
        .right-half {
          max-height: 80vh;
        }
      }

      /* 등록하기 버튼을 중앙 정렬 */
      .button-container {
        display: flex;
        justify-content: center;
        margin-top: 1.5rem;
      }

      .logo a {
        display: inline-block;
      }

      .logo img {
        cursor: pointer;
      }

      /* FilePond Custom Styles */
      .filepond--drop-label {
        color: #4c4e53;
      }

      .filepond--label-action {
        text-decoration-color: #babdc0;
      }

      .filepond--panel-root {
        background-color: #edf0f4;
      }

      /* Page Styles */
      .filepond--root {
        width: 170px;
        margin: 0 auto;
      }

      .filepond--file-action-button.filepond--action-process-item {
        display: none !important;
      }
    </style>

    <script>
      $(document).ready(function () {
        // 오늘 날짜의 23:59로 max값을 설정
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        const maxDateTime = `${year}-${month}-${day}`;
        document.getElementById('birth-date').setAttribute('max', maxDateTime);

        // FilePond 초기화
        FilePond.registerPlugin(
          FilePondPluginFileEncode,
          FilePondPluginImagePreview,
          FilePondPluginFileValidateType,
          FilePondPluginImageExifOrientation
        );

        const inputElement = document.querySelector(
          'input[type="file"].filepond'
        );
        const pond = FilePond.create(inputElement, {
          labelIdle: 'ファイルをドラッグまたは参照してください',
          imagePreviewHeight: 170,
          imageCropAspectRatio: '1:1',
          imageResizeTargetWidth: 200,
          imageResizeTargetHeight: 200,
          stylePanelLayout: 'compact circle',
          styleLoadIndicatorPosition: 'center bottom',
          styleProgressIndicatorPosition: 'right bottom',
          styleButtonRemoveItemPosition: 'left bottom',
          styleButtonProcessItemPosition: 'right bottom',
          acceptedFileTypes: ['image/*'],
          server: {
            process: (
              fieldName,
              file,
              metadata,
              load,
              error,
              progress,
              abort
            ) => {
              const reader = new FileReader();
              reader.onload = () => {
                load(reader.result);
              };
              reader.onerror = () => {
                error('ファイルの処理に失敗しました。');
              };
              reader.readAsDataURL(file);
            },
          },
          instantUpload: false,
          allowMultiple: false,
          required: false,
          allowRevert: false,
        });

        // JustValidate 설정
        const validation = new JustValidate('#registration-form', {
          errorLabelStyle: {
            color: '#f14668',
          },
          submitFormAutomatically: false,
        });

        validation
          .addField('#full-name', [
            {
              rule: 'required',
              errorMessage: '名前を入力してください。',
            },
          ])
          .addField('#birth-date', [
            {
              rule: 'required',
              errorMessage: '生年月日を入力してください。',
            },
          ])
          .addRequiredGroup('#gender', '性別を選択してください。')
          .addRequiredGroup(
            '#family-environment',
            '家庭環境を少なくとも1つ選択してください。'
          )
          .addField('#relationship', [
            {
              rule: 'required',
              errorMessage: 'お子様との関係を入力してください。',
            },
          ]);

        // 폼 제출 이벤트
        $('#registration-form').on('submit', function (event) {
          event.preventDefault();

          validation.revalidate().then((isValid) => {
            if (isValid) {
              let formData = new FormData();

              formData.append('name', $('#full-name').val());
              formData.append('birthDate', $('#birth-date').val());
              formData.append('birthLocation', $('#location').val());
              formData.append('note', $('#special-notes').val());
              formData.append(
                'gender',
                $("input[name='gender']:checked").val()
              );
              formData.append('callName', $('#relationship').val());

              const pondFiles = pond.getFiles();
              if (pondFiles.length > 0) {
                const file = pondFiles[0].file;
                if (file instanceof File) {
                  formData.append('profileImg', file, file.name);
                }
              }

              $("input[name='familyBackGrounds']:checked").each(function () {
                formData.append('familyBackGrounds', $(this).val());
              });

              $.ajax({
                url: '/children/new',
                type: 'POST',
                data: formData,
                processData: false,
                contentType: false,
                success: function (response) {
                  if (response.childId) {
                    window.location.href = `/children/${response.childId}/basicInfo`;
                  }
                },
                error: function (xhr, status, error) {
                  alert('登録中にエラーが発生しました。');
                },
              });
            }
          });
        });
      });

      /* 왼쪽 이미지 랜덤 변경(1~4) */
      $(document).ready(function () {
        function getRandomImage() {
          const images = [
            '/images/basicInfo1.png',
            '/images/basicInfo2.png',
            '/images/basicInfo3.png',
            '/images/basicInfo4.png',
          ];
          const randomIndex = Math.floor(Math.random() * images.length);
          return images[randomIndex];
        }

        const imgElement = $('#randomImage');
        let basePath = window.location.origin;
        if (window.location.protocol === 'file:') {
          basePath = '../../static';
        }

        const randomImage = getRandomImage();
        const timestamp = new Date().getTime();
        imgElement.attr('src', basePath + randomImage + '?t=' + timestamp);
      });
    </script>
  </head>

  <body>
    <section class="section">
      <!-- ロゴ + ダッシュボード -->
      <div class="logo">
        <a th:href="@{/dashboard}">
          <img
            alt="ロゴ"
            class="image"
            src="../../static/images/wilog.png"
            style="width: 100px; height: auto"
            th:src="@{/images/wilog.png}"
          />
        </a>
      </div>

      <!-- ページタイトル -->
      <h2 class="title has-text-centered mb-4">お子様 登録ページ</h2>

      <!-- 登録フォーム -->
      <div class="container regist-container">
        <div class="columns is-variable is-5 is-fullheight mt-4">
          <!-- 左側イメージ -->
          <div class="column is-half left-half">
            <figure>
              <img
                alt="ランダム画像"
                id="randomImage"
                src="../../static/images/basicInfo1.png"
                th:src="@{/images/basicInfo1.png}"
              />
            </figure>
          </div>

          <!-- 右側フォーム -->
          <div class="column is-half right-half">
            <form
              enctype="multipart/form-data"
              id="registration-form"
              method="post"
            >
              <!-- 写真アップロード -->
              <div class="field">
                <label class="label">お子様の写真をアップロード</label>
                <div class="file is-large has-name is-boxed">
                  <label class="file-label" id="file-label">
                    <input
                      accept="image/*"
                      class="filepond"
                      id="filepond"
                      name="profileImg"
                      type="file"
                      value="profileImg"
                    />
                  </label>
                </div>
              </div>

              <!-- 名前 -->
              <div class="field">
                <label class="label">名前</label>
                <input class="input" id="full-name" name="name" type="text" />
              </div>

              <!-- 性別 -->
              <div class="field">
                <label class="label">性別</label>
                <div class="control" id="gender">
                  <label class="checkbox">
                    <input name="gender" type="radio" value="WOMAN" /> 女の子
                  </label>
                  <label class="checkbox">
                    <input name="gender" type="radio" value="MAN" /> 男の子
                  </label>
                </div>
                <p
                  class="help is-danger"
                  id="gender-error"
                  style="display: none"
                >
                  性別を選択してください。
                </p>
              </div>

              <!-- 生年月日 -->
              <div class="field">
                <label class="label">生年月日</label>
                <input
                  class="input"
                  id="birth-date"
                  name="birthDate"
                  type="date"
                />
              </div>

              <!-- 出生地 -->
              <div class="field mb-4">
                <label class="label">出生地</label>
                <input
                  class="input"
                  id="location"
                  name="birthLocation"
                  type="text"
                />
              </div>

              <!-- 家庭環境 -->
              <label class="label">家庭環境（複数選択可）</label>
              <span style="color: gray; font-size: 12px">
                お子様の心理状態をより詳細に把握できます。
              </span>
              <p class="help is-danger" id="family-error" style="display: none">
                少なくとも1つの家庭環境を選択してください。
              </p>
              <div class="checkboxes mt-1">
                <div
                  class="buttons are-small"
                  id="family-environment"
                  name="familyBackGrounds"
                >
                  <label class="checkbox">
                    <input
                      name="familyBackGrounds"
                      type="checkbox"
                      value="DUAL_INCOME"
                    />
                    共働き家庭
                  </label>
                  <label class="checkbox">
                    <input
                      name="familyBackGrounds"
                      type="checkbox"
                      value="SINGLE_INCOME_DAD"
                    />
                    父の単独収入
                  </label>
                  <label class="checkbox">
                    <input
                      name="familyBackGrounds"
                      type="checkbox"
                      value="SINGLE_INCOME_MOM"
                    />
                    母の単独収入
                  </label>
                  <label class="checkbox">
                    <input
                      name="familyBackGrounds"
                      type="checkbox"
                      value="SINGLE_PARENT"
                    />
                    ひとり親家庭
                  </label>
                  <label class="checkbox">
                    <input
                      name="familyBackGrounds"
                      type="checkbox"
                      value="GRANDPARENTING"
                    />
                    祖父母と同居
                  </label>
                  <label class="checkbox">
                    <input
                      name="familyBackGrounds"
                      type="checkbox"
                      value="MULTICULTURAL"
                    />
                    多文化家庭
                  </label>
                  <label class="checkbox">
                    <input
                      name="familyBackGrounds"
                      type="checkbox"
                      value="SIBLINGS"
                    />
                    兄弟姉妹あり
                  </label>
                  <label class="checkbox">
                    <input
                      name="familyBackGrounds"
                      type="checkbox"
                      value="ONLY_CHILD"
                    />
                    一人っ子
                  </label>
                  <label class="checkbox">
                    <input
                      name="familyBackGrounds"
                      type="checkbox"
                      value="SPECIAL_NEEDS"
                    />
                    特別支援児
                  </label>
                  <label class="checkbox">
                    <input
                      name="familyBackGrounds"
                      type="checkbox"
                      value="COUNSELING_EXPERIENCE"
                    />
                    カウンセリング経験あり
                  </label>
                </div>
              </div>
              <br />

              <!-- 特記事項 -->
              <div class="field">
                <label class="label">
                  特記事項
                  <span style="color: gray; font-size: 12px">
                    遺伝や環境の情報を入力すると、分析の精度が向上します。
                  </span>
                </label>
                <input
                  class="input"
                  id="special-notes"
                  name="note"
                  placeholder="アレルギー、発達の遅れ、療育経験、祖父母宅によく行くなど"
                  type="text"
                />
              </div>

              <!-- 呼び名 -->
              <div class="field">
                <label class="label">お子様との関係（呼び名）</label>
                <input
                  class="input"
                  id="relationship"
                  name="callName"
                  placeholder="パパ、ママ、お父さん、お母さん、おじいちゃん、保育士など"
                  type="text"
                />
              </div>

              <!-- 登録ボタン -->
              <div class="field button-container">
                <button class="button is-primary" id="submitBtn" type="submit">
                  登録する
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>
    <div th:replace="fragments/footer :: ilogFooter"></div>
  </body>
</html>
