<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no"
      name="viewport"
    />
    <title>분석 데이터 업로드 - iLog</title>
    <!-- Bulma CSS -->
    <link
      href="../../../static/css/bulma.min.css"
      rel="stylesheet"
      th:href="@{/css/bulma.min.css}"
    />
    <!-- FilePond CSS -->
    <link
      href="../../../static/css/filepond.css"
      rel="stylesheet"
      th:href="@{/css/filepond.css}"
    />
    <!-- FilePond Image Preview CSS -->
    <link
      href="../../../static/css/filepond-plugin-image-preview.css"
      rel="stylesheet"
      th:href="@{/css/filepond-plugin-image-preview.css}"
    />
    <!-- customColors -->
    <link
      href="../../static/css/customColors.css"
      rel="stylesheet"
      th:href="@{/css/customColors.css}"
    />
    <link
      href="../../static/css/footer.css"
      rel="stylesheet"
      th:href="@{/css/footer.css}"
    />

    <style>
      body {
        background-color: var(--primary);
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
      }

      #analysisInsertForm {
        padding-bottom: 20px;
      }

      .title {
        font-size: 1.5rem;
        margin-bottom: 1rem;
      }

      .filepond--root {
        margin-bottom: 1rem;
      }

      #naverMap {
        width: 100%;
        height: 200px;
        background-color: #f0f0f0;
        margin-bottom: 1rem;
      }

      #naverMap:hover {
        cursor: crosshair;
      }

      .analysis-types {
        display: flex;
        justify-content: space-between;
        margin-bottom: 1rem;
      }

      .analysis-types label {
        flex: 1;
        text-align: center;
      }

      #weatherBtn {
        background-color: var(--secondary);
      }

      p#weatherInfo {
        border: 2px solid black;
        border-radius: 5px;
        margin: 5px 0;
        padding: 1rem;
        font-weight: bold;
      }

      #submitBtn {
        background-color: var(--third);
      }

      #naverMap {
        width: 100%;
        height: auto;
        aspect-ratio: 16 / 9;
      }

      #loadingIndicator {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: rgba(255, 255, 255, 0.8);
        z-index: 1000;
        place-items: center;
      }

      #requestLoader {
        width: 100px;
        height: 75px;
        margin: 0 auto;
        background: #fff;
        position: relative;
        border-radius: 100%;
      }

      #requestLoader:before {
        content: '';
        position: absolute;
        box-sizing: border-box;
        border: 15px solid transparent;
        border-top: 25px solid #fff;
        transform: rotate(45deg);
        top: 50px;
        left: -15px;
      }

      #requestLoader:after {
        content: '';
        width: 12px;
        height: 12px;
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        background-color: #ff3d00;
        box-shadow: 20px 0 #ff3d00, -20px 0 #ff3d00;
        animation: flash 0.5s ease-out infinite alternate;
      }

      @keyframes flash {
        0% {
          background-color: rgba(255, 60, 0, 0.25);
          box-shadow: 20px 0 rgba(255, 60, 0, 0.25), -20px 0 #ff3d00;
        }
        50% {
          background-color: #ff3d00;
          box-shadow: 20px 0 rgba(255, 60, 0, 0.25),
            -20px 0 rgba(255, 60, 0, 0.25);
        }
        100% {
          background-color: rgba(255, 60, 0, 0.25);
          box-shadow: 20px 0 #ff3d00, -20px 0 rgba(255, 60, 0, 0.25);
        }
      }

      #weatherLoadingIndicator {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: rgba(255, 255, 255, 0.8);
        z-index: 10001;
        place-items: center;
      }

      #weatherLoader {
        width: 175px;
        height: 80px;
        display: block;
        margin: auto;
        background-image: radial-gradient(
            circle 25px at 25px 25px,
            #fff 100%,
            transparent 0
          ),
          radial-gradient(circle 50px at 50px 50px, #fff 100%, transparent 0),
          radial-gradient(circle 25px at 25px 25px, #fff 100%, transparent 0),
          linear-gradient(#fff 50px, transparent 0);
        background-size: 50px 50px, 100px 76px, 50px 50px, 120px 40px;
        background-position: 0px 30px, 37px 0px, 122px 30px, 25px 40px;
        background-repeat: no-repeat;
        position: relative;
        box-sizing: border-box;
      }
      #weatherLoader::after {
        content: '';
        left: 0;
        right: 0;
        margin: auto;
        bottom: 20px;
        position: absolute;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 5px solid transparent;
        border-color: #ff3d00 transparent;
        box-sizing: border-box;
        animation: rotation 1s linear infinite;
      }

      @keyframes rotation {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
    <script src="/js/jquery-3.7.1.min.js"></script>
    <!-- FilePond JS -->
    <script src="/js/filepond/filepond.min.js"></script>
    <script src="/js/filepond-plugin-file-validate-type.min.js"></script>
    <script src="/js/filepond/filepond-plugin-file-validate-size.js"></script>
    <script src="/js/filepond-plugin-image-preview.min.js"></script>
    <script src="/js/filepond-plugin-image-exif-orientation.min.js"></script>
    <script src="/js/filepond-plugin-image-resize.min.js"></script>
    <script src="/js/filepond-plugin-image-transform.min.js"></script>
    <script src="/js/filepond/filepond-plugin-image-edit.js"></script>

    <script src="/js/sweetalert2.js"></script>
    <script src="/js/just-validate.production.min.js"></script>
    <!-- 네이버 지도 API (클라이언트 ID 필요) -->
    <script
      src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=rjbh1smfnw&callback=onNaverMapLoad&submodules=geocoder&language=ja"
      type="text/javascript"
    ></script>
    <script>
      function getCurrentLocation() {
        return new Promise((resolve, reject) => {
          if ('geolocation' in navigator) {
            navigator.geolocation.getCurrentPosition(
              (position) => {
                const { latitude, longitude } = position.coords;
                resolve({ latitude, longitude });
              },
              (error) => {
                reject(
                  new Error('位置情報の取得に失敗しました: ' + error.message)
                );
              }
            );
          } else {
            reject(new Error('このブラウザは位置情報をサポートしていません。'));
          }
        });
      }

      // Naverマップの読み込みとクリックイベントの処理
      async function onNaverMapLoad() {
        const position = await getCurrentLocation();
        var mapOptions = {
          // 初期位置: 自分の位置
          center: new naver.maps.LatLng(position.latitude, position.longitude),
          zoom: 10,
          zoomControl: true,
          zoomControlOptions: {
            position: naver.maps.Position.TOP_RIGHT,
          },
        };
        var map = new naver.maps.Map('naverMap', mapOptions);
        map.setCursor('crosshair');

        // 地図クリック時に座標を取得し、逆ジオコーディングを実行
        naver.maps.Event.addListener(map, 'click', function (e) {
          var latlng = e.coord;
          document.getElementById('latitude').value = latlng.y;
          document.getElementById('longitude').value = latlng.x;

          naver.maps.Service.reverseGeocode(
            {
              location: latlng,
            },
            function (status, response) {
              if (status === naver.maps.Service.Status.OK) {
                var items = response.result.items;
                if (items.length > 0) {
                  var address = items[0].address;
                  document.getElementById('locationName').value = address;
                  document.getElementById('selectedLocation').innerText =
                    address +
                    '（緯度: ' +
                    latlng.y +
                    '、経度: ' +
                    latlng.x +
                    '）';
                }
              } else {
                Swal.fire('逆ジオコーディングに失敗しました。');
              }
            }
          );
        });
      }

      document.addEventListener('DOMContentLoaded', function () {
        // 今日の日付の23:59をmaxとして設定
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        const maxDateTime = `${year}-${month}-${day}T23:59`;
        document
          .getElementById('analysisDatetime')
          .setAttribute('max', maxDateTime);

        var weatherJsonString;

        // FilePondの初期化：1枚のみアップロード可能
        FilePond.registerPlugin(
          FilePondPluginFileValidateSize,
          FilePondPluginImagePreview,
          FilePondPluginImageExifOrientation,
          FilePondPluginFileValidateType
        );
        const fileInput = document.querySelector('#fileInput');
        if (fileInput) {
          const pond = FilePond.create(fileInput, {
            allowMultiple: false,
            maxFileSize: '20MB',
            acceptedFileTypes: ['image/*'],
            labelIdle:
              "ここにファイルをドラッグまたは<span class='filepond--label-action'>ブラウズ</span>",
            credits: false,
          });
        } else {
          console.error('ファイル入力要素（#fileInput）が見つかりません。');
        }

        // just-validateの設定
        const validation = new JustValidate('#analysisInsertForm');
        validation
          .addField('#fileInput', [
            {
              rule: 'required',
              errorMessage: '画像をアップロードしてください。',
            },
          ])
          .addField('input[type="datetime-local"]#analysisDatetime', [
            {
              rule: 'required',
              errorMessage: '日時を入力してください。',
            },
          ])
          .addField('input[name="locationName"]#locationName', [
            {
              rule: 'required',
              errorMessage: '分析対象の位置を選択してください。',
            },
          ])
          .addField('input[name="companion"]', [
            {
              rule: 'required',
              errorMessage: '誰と一緒にいたか入力してください。',
            },
          ])
          .addRequiredGroup(
            '#analysis-types',
            '分析タイプを1つ以上選択してください。'
          );

        // 天気取得ボタンのクリック処理
        document
          .getElementById('weatherBtn')
          .addEventListener('click', function () {
            const datetimeInput =
              document.getElementById('analysisDatetime').value;
            const locationName = document.getElementById('locationName').value;
            if (!datetimeInput || !locationName) {
              Swal.fire('日時と位置情報を入力してください。');
              return;
            }

            $('#weatherLoadingIndicator').css('display', 'grid');

            const lat = document.getElementById('latitude').value;
            const lon = document.getElementById('longitude').value;

            $.ajax({
              url: '/weather',
              method: 'GET',
              data: {
                lat: lat,
                lon: lon,
                dt: datetimeInput,
              },
              success: function (res) {
                $('#weatherLoadingIndicator').css('display', 'none');
                const weather = res.data[0].weather[0].description;
                const temperature = res.data[0].temp;

                document.getElementById('weatherInfo').textContent =
                  '天気: ' + weather + ', 気温: ' + temperature + '℃';
                weatherJsonString = JSON.stringify(res);
              },
              error: function () {
                $('#weatherLoadingIndicator').css('display', 'none');
                Swal.fire('天気情報の取得に失敗しました。');
              },
            });
          });

        // フォーム送信処理
        document
          .getElementById('submitBtn')
          .addEventListener('click', function (e) {
            e.preventDefault();
            $('#loadingIndicator').css('display', 'grid');

            const analysisTypes = document.querySelectorAll(
              'input[name="analysisTypes"]:checked'
            );
            if (analysisTypes.length === 0) {
              Swal.fire('分析タイプを選択してください。');
              $('#loadingIndicator').css('display', 'none');
              return;
            }

            const formData = new FormData();
            let pondInstance = FilePond.find(
              document.querySelector('#fileInput')
            );
            let files = pondInstance.getFiles();

            if (files.length > 0) {
              formData.append('analysisTargetFile', files[0].file);
              console.log('📌 ファイル追加完了:', files[0].file.name);
            } else {
              console.warn('❌ ファイルがアップロードされていません。');
            }

            formData.append(
              'targetDate',
              document.getElementById('analysisDatetime').value
            );
            formData.append(
              'locationName',
              document.getElementById('locationName').value
            );
            formData.append(
              'latitude',
              document.getElementById('latitude').value
            );
            formData.append(
              'longitude',
              document.getElementById('longitude').value
            );
            formData.append('weatherResponse', weatherJsonString);
            formData.append(
              'companion',
              document.querySelector('input[name="companion"]').value || ''
            );
            formData.append(
              'supplementaryComment',
              document.querySelector('textarea[name="supplementaryComment"]')
                .value || ''
            );
            analysisTypes.forEach((type) => {
              formData.append('analysisTypes', type.value);
            });

            $.ajax({
              url: `/children/${getChildIdFromUrl()}/analysis/new`,
              type: 'POST',
              data: formData,
              contentType: false,
              processData: false,
              dataType: 'json',
              success: function (response) {
                $('#loadingIndicator').css('display', 'none');
                if (response.success) {
                  console.log(
                    '✅ アップロード成功! 移動先URL:',
                    response.redirectUrl
                  );
                  window.location.href = response.redirectUrl;
                } else {
                  $('#loadingIndicator').css('display', 'none');
                  console.error(
                    '❌ アップロード失敗: サーバーから success=false'
                  );
                  Swal.fire(
                    '感情分析に失敗しました。しばらくしてから再試行してください。'
                  );
                }
              },
              error: function (xhr) {
                console.error('❌ AJAXエラー:', xhr.responseText);
                Swal.fire('分析中にエラーが発生しました。再試行してください。');
              },
            });
          });
      });

      window.navermap_authFailure = function () {
        Swal.fire('地図APIの認証に失敗しました。');
      };

      function getChildIdFromUrl() {
        const pathParts = window.location.pathname.split('/');
        if (pathParts.length > 2 && pathParts[1] === 'children') {
          return pathParts[2];
        }
        return null;
      }
    </script>
  </head>

  <body>
    <nav aria-label="main navigation" class="navbar" role="navigation">
      <!-- ロゴ + ダッシュボードへのリンク -->
      <div class="logo">
        <a th:href="@{/dashboard}">
          <img
            alt="ロゴ"
            class="image"
            src="../../static/images/wilog.png"
            style="width: 100px; height: auto"
            th:src="@{/images/wilog.png}"
          />
        </a>
      </div>
      <div class="navbar-end">
        <div class="navbar-item">
          <div class="buttons">
            <a
              class="button is-light"
              th:href="@{/children/{childId}/analysis/resultList(childId=${childId})}"
            >
              <span>感情分析結果一覧を見る</span>
            </a>
          </div>
        </div>
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/guides"
              ><span>ご利用案内</span></a
            >
          </div>
        </div>
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/claims"
              ><span>カスタマーセンター</span></a
            >
          </div>
        </div>
      </div>
    </nav>

    <div class="container">
      <h1 class="title has-text-centered">
        <span th:text="${childName}">000</span>
        <br />絵・写真の分析ページ
      </h1>
      <form
        enctype="multipart/form-data"
        id="analysisInsertForm"
        method="post"
        th:action="@{/children/{childId}/analysis/new(childId=${childId})}"
      >
        <!-- FilePondエリア：1つのファイルのみアップロード -->
        <div class="box">
          <input
            class="filepond"
            data-allow-reorder="false"
            data-max-file-size="50MB"
            data-max-files="1"
            id="fileInput"
            name="analysisTargetFile"
            type="file"
          />
        </div>

        <!-- 日時入力 -->
        <div class="field">
          <label class="label">日時入力</label>
          <div class="control">
            <input
              class="input"
              id="analysisDatetime"
              name="targetDate"
              placeholder="2020-01-01T13:59"
              type="datetime-local"
            />
          </div>
        </div>

        <!-- 分析対象の位置 -->
        <div class="field">
          <label class="label">分析対象の位置</label>
          <div id="naverMap"></div>
          <!-- 選択された位置を表示 -->
          <p id="selectedLocation" style="font-weight: bold"></p>
          <!-- hiddenフィールド：位置名、緯度、経度 -->
          <input id="locationName" name="locationName" type="hidden" />
          <input id="latitude" name="latitude" type="hidden" />
          <input id="longitude" name="longitude" type="hidden" />
        </div>

        <!-- 天気情報取得 -->
        <div class="field">
          <label class="label">天気を取得</label>
          <div class="control">
            <button
              class="button is-info is-fullwidth"
              id="weatherBtn"
              type="button"
            >
              選択した日時と場所の天気を取得
            </button>
          </div>
          <!-- 天気情報の表示エリア -->
          <p id="weatherInfo" style="margin-top: 0.5rem; font-weight: bold"></p>
          <!-- hiddenフィールド：天気データ保存 -->
          <input id="weatherData" name="weatherResponse" type="hidden" />
        </div>

        <!-- 一緒にいた人 -->
        <div class="field">
          <label class="label">誰と一緒にいましたか？</label>
          <div class="control">
            <input
              class="input"
              name="companion"
              placeholder="例: お母さん、お父さん、友達"
              type="text"
            />
          </div>
        </div>

        <!-- データ補足説明 -->
        <div class="field">
          <label class="label">データに関する補足説明をご記入ください</label>
          <div class="control">
            <textarea
              class="textarea"
              name="supplementaryComment"
              placeholder="補足説明を入力してください"
            ></textarea>
          </div>
        </div>

        <!-- 分析タイプ -->
        <div class="field">
          <label class="label">分析タイプ</label>
          <div class="control analysis-types" id="analysis-types">
            <label class="checkbox">
              <input name="analysisTypes" type="checkbox" value="WRITING" />
              文章分析
            </label>
            <label class="checkbox">
              <input name="analysisTypes" type="checkbox" value="DRAWING" />
              絵の分析
            </label>
            <label class="checkbox">
              <input name="analysisTypes" type="checkbox" value="PHOTO" />
              表情分析
            </label>
          </div>
        </div>

        <!-- 送信ボタン -->
        <div class="field">
          <div class="control">
            <button class="button is-fullwidth" id="submitBtn" type="submit">
              分析する
            </button>
          </div>
        </div>
      </form>
    </div>

    <!-- ローディングインジケーター（初期は非表示） -->
    <div id="loadingIndicator">
      <span id="requestLoader"></span>
    </div>

    <div id="weatherLoadingIndicator">
      <span id="weatherLoader"></span>
    </div>
    <div th:replace="fragments/footer :: ilogFooter"></div>
  </body>
</html>
