<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>글 분석 결과 컨펌 페이지</title>
    <link
      href="../../../static/css/bulma.min.css"
      rel="stylesheet"
      th:href="@{/css/bulma.min.css}"
    />
    <link
      href="../../../static/css/customColors.css"
      rel="stylesheet"
      th:href="@{/css/customColors.css}"
    />
    <style>
      body {
        background-color: var(--primary-color);
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 1rem;
      }
      .title {
        font-size: 1.5rem;
        margin-bottom: 1rem;
        text-align: center;
      }
      .field:not(:last-child) {
        margin-bottom: 1rem;
      }
      .file-preview {
        width: 100%;
        height: 200px;
        background-color: #f0f0f0;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 1rem;
      }
      .analysis-result {
        background-color: #f5f5f5;
        padding: 1rem;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="title">000 君<br />文章分析結果確認ページ</h1>

      <div class="field">
        <label class="label">登録された文章画像のプレビュー</label>
        <div class="file-preview">
          <p>登録された文章画像のプレビュー</p>
        </div>
      </div>

      <div class="field">
        <label class="label">日時入力</label>
        <div class="control">
          <input class="input" type="datetime-local" value="2020-01-01T13:59" />
        </div>
      </div>

      <div class="field">
        <label class="label">天気を選択しますか？</label>
        <div class="control">
          <div class="select is-fullwidth">
            <select>
              <option>天気を選択</option>
              <option>晴れ</option>
              <option>くもり</option>
              <option>雨</option>
              <option>雪</option>
            </select>
          </div>
        </div>
      </div>

      <div class="field">
        <label class="label"
          >誰と一緒にいましたか？：（お母さん／先生／その他）</label
        >
        <div class="control">
          <div class="select is-fullwidth">
            <select>
              <option>選択してください</option>
              <option>お母さん</option>
              <option>先生</option>
              <option>その他</option>
            </select>
          </div>
        </div>
      </div>

      <div class="field">
        <label class="label">データに関する補足説明をご記入ください</label>
        <div class="control">
          <textarea
            class="textarea"
            placeholder="補足説明を入力してください"
          ></textarea>
        </div>
      </div>

      <div class="field">
        <label class="label">抽出された文章（修正可能）</label>
        <div class="control">
          <textarea
            class="textarea"
            placeholder="抽出された文章がここに表示されます。修正できます。"
            rows="10"
          ></textarea>
        </div>
      </div>

      <div class="field">
        <label class="label">文章分析結果</label>
        <div class="analysis-result">
          <p>文章分析結果がここに表示されます。</p>
        </div>
      </div>

      <div class="field is-grouped is-grouped-centered">
        <div class="control">
          <button class="button is-primary">分析を実行</button>
        </div>
      </div>
    </div>
  </body>
</html>
