<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>분석 결과 확인 - iLog</title>
    <link
      href="../../../static/css/bulma.min.css"
      rel="stylesheet"
      th:href="@{/css/bulma.min.css}"
    />
    <!-- FilePond CSS -->
    <link
      href="../../../static/css/filepond.css"
      rel="stylesheet"
      th:href="@{/css/filepond.css}"
    />
    <!-- FilePond Image Preview CSS -->
    <link
      href="../../../static/css/filepond-plugin-image-preview.css"
      rel="stylesheet"
      th:href="@{/css/filepond-plugin-image-preview.css}"
    />
    <!-- customColors -->
    <link
      href="../../static/css/customColors.css"
      rel="stylesheet"
      th:href="@{/css/customColors.css}"
    />
    <link
      href="../../static/css/footer.css"
      rel="stylesheet"
      th:href="@{/css/footer.css}"
    />
    <style>
      body {
        background-color: var(--primary);
      }
      .container {
        max-width: 700px;
        margin: 0 auto;
        padding: 1rem;
      }
      .title {
        font-size: 1.5rem;
        margin-bottom: 1rem;
        text-align: center;
      }
      .subtitle {
        font-size: 1.2rem;
        margin-bottom: 0.5rem;
      }
      .field:not(:last-child) {
        margin-bottom: 1rem;
      }
      .file-preview {
        width: 100%;
        background-color: var(--primary);
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 1rem;
      }
      .satisfaction-rating {
        display: flex;
        justify-content: center;
        margin-top: 1rem;
      }
      .satisfaction-rating .button {
        margin: 0 0.25rem;
      }
      .ajax-save-btn {
        margin-top: 0.5rem;
      }
      .separator {
        margin: 1rem 0;
        border-bottom: 1px solid #ccc;
      }
      #naverMap {
        width: 100%;
        height: 300px;
        aspect-ratio: 16 / 9;
        background-color: #f0f0f0;
        margin-bottom: 1rem;
      }
      #naverMap:hover {
        cursor: crosshair;
      }
      .analysis-types {
        display: flex;
        justify-content: space-between;
        margin-bottom: 1rem;
      }
      .analysis-types label {
        flex: 1;
        text-align: center;
      }
      #preview-img {
        width: 300px;
        height: auto;
        border-radius: 5px;
      }
      #weatherInfo {
        font-weight: bold;
        font-size: larger;
        border: 3px solid black;
        border-radius: 5px;
        padding: 10px;
        margin-top: 10px;
      }

      #reanalyzeLoader {
        width: 100px;
        height: 75px;
        margin: 0 auto;
        background: #fff;
        position: relative;
        border-radius: 100%;
      }
      #reanalyzeLoader:before {
        content: '';
        position: absolute;
        box-sizing: border-box;
        border: 15px solid transparent;
        border-top: 25px solid #fff;
        transform: rotate(45deg);
        top: 50px;
        left: -15px;
      }

      #reanalyzeLoader:after {
        content: '';
        width: 12px;
        height: 12px;
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        background-color: #ff3d00;
        box-shadow: 20px 0 #ff3d00, -20px 0 #ff3d00;
        animation: flash 0.5s ease-out infinite alternate;
      }

      @keyframes flash {
        0% {
          background-color: rgba(255, 60, 0, 0.25);
          box-shadow: 20px 0 rgba(255, 60, 0, 0.25), -20px 0 #ff3d00;
        }
        50% {
          background-color: #ff3d00;
          box-shadow: 20px 0 rgba(255, 60, 0, 0.25),
            -20px 0 rgba(255, 60, 0, 0.25);
        }
        100% {
          background-color: rgba(255, 60, 0, 0.25);
          box-shadow: 20px 0 #ff3d00, -20px 0 rgba(255, 60, 0, 0.25);
        }
      }

      #reanalyzeLoadingIndicator {
        display: none;
        position: fixed;
        width: 100vw;
        height: 100vh;
        top: 0;
        left: 0;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        place-items: center;
      }
    </style>
    <script
      src="../../../static/js/jquery-3.7.1.min.js"
      th:src="@{/js/jquery-3.7.1.min.js}"
    ></script>
    <script src="/js/sweetalert2.js"></script>
    <script src="/js/just-validate.production.min.js"></script>

    <script
      src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=rjbh1smfnw&callback=onNaverMapLoad&submodules=geocoder&language=ja"
      type="text/javascript"
    ></script>
    <script>
      function getCurrentLocation() {
        return new Promise((resolve, reject) => {
          if ('geolocation' in navigator) {
            navigator.geolocation.getCurrentPosition(
              (position) => {
                const { latitude, longitude } = position.coords;
                resolve({ latitude, longitude });
              },
              (error) => {
                reject(
                  new Error('位置情報の取得に失敗しました: ' + error.message)
                );
              }
            );
          } else {
            reject(new Error('このブラウザは位置情報をサポートしていません。'));
          }
        });
      }

      async function onNaverMapLoad() {
        const position = await getCurrentLocation();
        const latitude =
          document.getElementById('latitude').value || position.latitude;
        const longitude =
          document.getElementById('longitude').value || position.longitude;
        var mapOptions = {
          center: new naver.maps.LatLng(latitude, longitude),
          zoom: 10,
          zoomControl: true,
          zoomControlOptions: {
            position: naver.maps.Position.TOP_RIGHT,
          },
        };

        var map = new naver.maps.Map('naverMap', mapOptions);
        map.setCursor('crosshair');

        naver.maps.Event.addListener(map, 'click', function (e) {
          var latlng = e.coord;
          document.getElementById('latitude').value = latlng.y;
          document.getElementById('longitude').value = latlng.x;

          naver.maps.Service.reverseGeocode(
            {
              location: latlng,
            },
            function (status, response) {
              if (status === naver.maps.Service.Status.OK) {
                var items = response.result.items;
                if (items.length > 0) {
                  var address = items[0].address;
                  document.getElementById('locationName').value = address;
                  document.getElementById('selectedLocation').innerText =
                    address +
                    '（緯度: ' +
                    latlng.y +
                    '、経度: ' +
                    latlng.x +
                    '）';
                  $('#weatherBtn').prop('disabled', false);
                }
              } else {
                Swal.fire('逆ジオコーディングに失敗しました。');
              }
            }
          );
        });
      }

      window.navermap_authFailure = function () {
        Swal.fire('地図APIの認証に失敗しました。');
      };

      $(document).ready(function () {
        var originalTitle = $('#titleInput').val();
        var originalDatetime = $('#analysisDatetime').val();
        var originalLocationName = $('#locationName').val();
        var originalCompanion = $('#companionInput').val();
        var originalSupplement = $('#supplementTextarea').val();
        var originalExtractedText = $('#extractedText').length
          ? $('#extractedText').val()
          : null;
        var originalMemo = $('#analysisMemo').val();
        var originalSatisfaction = $('#satisfactionScore').val();

        var weatherJsonString;

        $('#titleInput').on('input', function () {
          $('#saveTitleBtn').prop('disabled', $(this).val() === originalTitle);
        });

        $('#analysisDatetime').on('input', function () {
          const currentDatetime = $('#analysisDatetime').val();
          $('#weatherBtn').prop(
            'disabled',
            currentDatetime === originalDatetime
          );
        });

        $(
          '#analysisDatetime, #locationName, #companionInput, #supplementTextarea, #extractedText'
        ).on('input', function () {
          const currentDatetime = $('#analysisDatetime').val();
          const currentLocation = $('#locationName').val();
          const currentCompanion = $('#companionInput').val();
          const currentSupplement = $('#supplementTextarea').val();
          let currentExtractedText = $('#extractedText').length
            ? $('#extractedText').val()
            : '';

          const isDateChanged = currentDatetime !== originalDatetime;
          const isLocationChanged = currentLocation !== originalLocationName;
          const dateOrLocationChanged = isDateChanged || isLocationChanged;
          const isWeatherRetrieved =
            typeof weatherJsonString !== 'undefined' &&
            weatherJsonString !== null &&
            weatherJsonString.trim() !== '';
          const condition1 = dateOrLocationChanged && isWeatherRetrieved;
          const condition2 = currentCompanion !== originalCompanion;
          const condition3 = currentSupplement !== originalSupplement;
          let condition4 = false;
          if (originalExtractedText) {
            condition4 = currentExtractedText !== originalExtractedText;
          }

          $('#reanalyzeBtn').prop(
            'disabled',
            !(condition1 || condition2 || condition3 || condition4)
          );
        });

        $('#analysisMemo').on('input', function () {
          $('#saveMemoBtn').prop('disabled', $(this).val() === originalMemo);
        });

        const stars = document.querySelectorAll('.satisfaction-rating .button');
        const satisfactionScoreInput =
          document.getElementById('satisfactionScore');
        const initialScore = Number(satisfactionScoreInput.value);

        stars.forEach((star, index) => {
          star.textContent = index < initialScore ? '⭐' : '☆';
        });

        stars.forEach((star, index) => {
          star.addEventListener('click', () => {
            stars.forEach((s, i) => {
              s.textContent = i <= index ? '⭐' : '☆';
            });
            satisfactionScoreInput.value = index + 1;
            $('#saveSatisfactionBtn').prop(
              'disabled',
              satisfactionScoreInput.value == originalSatisfaction
            );
          });
        });

        const analysisUrl = `/children/${getChildIdFromUrl()}/analysis`;
        const analysisResultId = $('#analysisResultId').val();

        $('#weatherBtn').click(function () {
          const datetimeInput = $('#analysisDatetime').val();
          const locationName = $('#locationName').val();
          if (!datetimeInput || !locationName) {
            Swal.fire('日時と場所の情報を入力してください。');
            return;
          }
          const lat = $('#latitude').val();
          const lon = $('#longitude').val();
          $.ajax({
            url: '/weather',
            method: 'GET',
            data: {
              lat: lat,
              lon: lon,
              dt: datetimeInput,
            },
            success: function (res) {
              const weather = res.data[0].weather[0].description;
              const temperature = res.data[0].temp;
              $('#weatherInfo').text(
                '天気: ' + weather + ', 気温: ' + temperature + '℃'
              );
              weatherJsonString = JSON.stringify(res);
            },
            error: function () {
              Swal.fire('天気情報の取得に失敗しました。');
            },
          });
        });

        $('#saveTitleBtn').click(function () {
          const newTitle = $('#titleInput').val();
          $.ajax({
            url: `${analysisUrl}/${getAnalysisTargetIdFromUrl()}/results/${analysisResultId}/title`,
            method: 'PUT',
            data: { title: newTitle },
            success: function () {
              Swal.fire('タイトルが保存されました。');
            },
            error: function () {
              Swal.fire('タイトルの保存中にエラーが発生しました。');
            },
          });
        });

        $('#saveMemoBtn').click(function () {
          const noteId = $('#analysisResultNoteId').val();
          const content = $('#analysisMemo').val();
          $.ajax({
            url: `${analysisUrl}/${getAnalysisTargetIdFromUrl()}/results/${analysisResultId}/note`,
            method: 'PUT',
            data: { content: content },
            success: function () {
              Swal.fire('メモが保存されました。');
            },
            error: function () {
              Swal.fire('メモの保存中にエラーが発生しました。');
            },
          });
        });

        $('#saveSatisfactionBtn').click(function () {
          const satisfactionId = $('#analysisResultSatisfactionId').val();
          const score = $('#satisfactionScore').val();
          $.ajax({
            url: `${analysisUrl}/${getAnalysisTargetIdFromUrl()}/results/${analysisResultId}/satisfaction`,
            method: 'PUT',
            data: { score: score },
            success: function () {
              Swal.fire('満足度が保存されました。');
            },
            error: function () {
              Swal.fire('満足度の保存中にエラーが発生しました。');
            },
          });
        });

        $('#reanalyzeBtn').click(function () {
          $('#reanalyzeLoadingIndicator').css('display', 'grid');
          const datetime = $('#analysisDatetime').val();
          const locationName = $('#locationName').val();
          const longitude = $('#longitude').val();
          const latitude = $('#latitude').val();
          const companion = $('#companionInput').val();
          const supplement = $('#supplementTextarea').val();

          const data = {};
          if (datetime) data.datetime = datetime;
          if (
            typeof weatherJsonString !== 'undefined' &&
            weatherJsonString.trim() !== ''
          )
            data.weather = weatherJsonString;
          if (locationName) data.locationName = locationName;
          if (longitude) data.longitude = longitude;
          if (latitude) data.latitude = latitude;
          if (companion) data.companion = companion;
          if (supplement) data.supplement = supplement;

          $.ajax({
            url: `${analysisUrl}/${getAnalysisTargetIdFromUrl()}/results/${analysisResultId}/reanalyze`,
            method: 'POST',
            data: data,
            success: function () {
              $('#reanalyzeLoadingIndicator').css('display', 'none');
              Swal.fire('再分析のリクエストが完了しました。');
              setTimeout(() => {
                window.location.reload();
              }, 1000);
            },
            error: function () {
              $('#reanalyzeLoadingIndicator').css('display', 'none');
              Swal.fire('再分析のリクエスト中にエラーが発生しました。');
            },
          });
        });

        $('#deleteBtn').click(function () {
          Swal.fire({
            title: '本当に削除しますか？',
            text: 'この操作は元に戻せません！',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#3085d6',
            cancelButtonColor: '#d33',
            confirmButtonText: '削除する',
            cancelButtonText: 'キャンセル',
          }).then((result) => {
            if (result.isConfirmed) {
              $.ajax({
                url: `${analysisUrl}/${getAnalysisTargetIdFromUrl()}/results/${analysisResultId}`,
                method: 'DELETE',
                success: function () {
                  Swal.fire({
                    title: '削除されました！',
                    text: '正常に削除されました。',
                    icon: 'success',
                  });
                  setTimeout(() => {
                    window.location.href = `${analysisUrl}/resultList`;
                  }, 1000);
                },
                error: function () {
                  Swal.fire('削除中にエラーが発生しました。');
                },
              });
            }
          });
        });
      });

      function getChildIdFromUrl() {
        const pathParts = window.location.pathname.split('/');
        if (pathParts.length > 2 && pathParts[1] === 'children') {
          return pathParts[2];
        }
        return null;
      }

      function getAnalysisTargetIdFromUrl() {
        const pathParts = window.location.pathname.split('/');
        if (pathParts.length > 4 && pathParts[3] === 'analysis') {
          return pathParts[4];
        }
        return null;
      }
    </script>
  </head>
  <body>
    <nav aria-label="main navigation" class="navbar" role="navigation">
      <!-- ロゴ + ダッシュボードへのリンク -->
      <div class="logo">
        <a th:href="@{/dashboard}">
          <img
            alt="ロゴ"
            class="image"
            src="../../static/images/wilog.png"
            style="width: 100px; height: auto"
            th:src="@{/images/wilog.png}"
          />
        </a>
      </div>
      <div class="navbar-end">
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/guides"
              ><span>ご利用案内</span></a
            >
          </div>
        </div>
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/claims"
              ><span>カスタマーセンター</span></a
            >
          </div>
        </div>
      </div>
    </nav>

    <div class="container">
      <!-- ページヘッダー -->
      <h2 class="subtitle">
        [[${analysisResultDetails.childName}]]の投稿分析結果の表示・修正ページ
      </h2>

      <!-- hiddenフィールド：分析結果IDなど -->
      <input
        id="analysisResultId"
        th:value="${analysisResultDetails.analysisResultId}"
        type="hidden"
      />

      <!-- タイトル入力 -->
      <div class="field">
        <label class="label">タイトル</label>
        <div class="control">
          <input
            class="input"
            id="titleInput"
            placeholder="タイトルを入力してください"
            th:value="${analysisResultDetails.analysisResultTitle}"
            type="text"
          />
        </div>
        <button class="button is-info ajax-save-btn" disabled id="saveTitleBtn">
          タイトル保存
        </button>
      </div>

      <!-- 分析タイプ -->
      <div class="field">
        <label class="label">分析タイプ</label>
        <div class="control">
          <th:block th:each="type : ${analysisResultDetails.analysisTypes}">
            <label class="checkbox">
              <input
                checked="checked"
                disabled="disabled"
                th:value="${type.name()}"
                type="checkbox"
              />
              <span th:text="${type.krName}"></span>
            </label>
          </th:block>
        </div>
      </div>

      <div class="separator"></div>

      <!-- 登録ファイルプレビュー -->
      <div class="field">
        <label class="label">登録ファイルプレビュー</label>
        <div class="file-preview">
          <img
            id="preview-img"
            th:src="${analysisResultDetails.targetFileSrc}"
          />
        </div>
      </div>

      <!-- 感情スコア・タイプ -->
      <div class="field">
        <label class="label">感情スコア</label>
        <div class="control">
          <input
            class="input"
            readonly
            th:value="|${analysisResultDetails.emotionScore}点|"
            type="text"
          />
        </div>
      </div>
      <div class="field">
        <label class="label">感情タイプ</label>
        <div class="control">
          <input
            class="input"
            readonly
            th:value="${analysisResultDetails.emotionDescription}"
            type="text"
          />
        </div>
      </div>
      <div class="separator"></div>

      <!-- 日時 -->
      <div class="field">
        <label class="label">日時</label>
        <div class="control">
          <input
            class="input"
            id="analysisDatetime"
            th:value="${#temporals.format(analysisResultDetails.targetDateTime, 'yyyy-MM-dd''T''HH:mm:ss')}"
            type="datetime-local"
          />
        </div>
      </div>

      <!-- 分析対象の位置 -->
      <div class="field">
        <label class="label">分析対象の位置</label>
        <div id="naverMap"></div>
        <p
          id="selectedLocation"
          style="font-weight: bold"
          th:text="${analysisResultDetails.locationName}"
        ></p>
        <input
          id="locationName"
          name="locationName"
          th:value="${analysisResultDetails.locationName}"
          type="hidden"
        />
        <input
          id="latitude"
          name="latitude"
          th:value="${analysisResultDetails.latitude}"
          type="hidden"
        />
        <input
          id="longitude"
          name="longitude"
          th:value="${analysisResultDetails.longitude}"
          type="hidden"
        />
      </div>

      <!-- 天気取得 -->
      <div class="field">
        <label class="label">天気の取得</label>
        <div class="control">
          <button
            class="button is-info is-fullwidth"
            disabled
            id="weatherBtn"
            type="button"
          >
            選択した日時と位置の天気を確認
          </button>
        </div>
        <p
          id="weatherInfo"
          style="margin-top: 0.5rem; font-weight: bold"
          th:text="${analysisResultDetails.weather}"
        ></p>
        <input id="weatherData" name="weatherResponse" type="hidden" />
      </div>

      <!-- 一緒にいた人 -->
      <div class="field">
        <label class="label">誰と一緒にいましたか？</label>
        <div class="control">
          <input
            class="input"
            id="companionInput"
            name="companion"
            placeholder="例: お母さん、お父さん、友達"
            th:value="${analysisResultDetails.companion}"
            type="text"
          />
        </div>
      </div>

      <!-- 補足説明 -->
      <div class="field">
        <label class="label">データに関する補足説明</label>
        <div class="control">
          <textarea
            class="textarea"
            id="supplementTextarea"
            placeholder="補足情報を入力してください"
            th:text="${analysisResultDetails.supplement}"
          ></textarea>
        </div>
      </div>

      <!-- 抽出されたテキスト -->
      <th:block
        th:if="${analysisResultDetails.extractedText != null and #strings.length(analysisResultDetails.extractedText) > 0}"
      >
        <div class="field">
          <label class="label">抽出されたテキスト</label>
          <div class="control">
            <textarea
              class="textarea"
              id="extractedText"
              th:text="${analysisResultDetails.extractedText}"
            ></textarea>
          </div>
        </div>
      </th:block>

      <!-- 再分析リクエストボタン -->
      <button class="button is-warning" disabled id="reanalyzeBtn">
        再分析をリクエスト
      </button>
      <div class="separator"></div>

      <!-- 分析結果 -->
      <div class="field">
        <label class="label">分析結果</label>
        <div class="control">
          <textarea
            class="textarea"
            readonly
            th:text="${analysisResultDetails.analysisResult}"
          ></textarea>
        </div>
      </div>

      <!-- ソリューション -->
      <div class="field">
        <label class="label">提案されたソリューション</label>
        <div class="control">
          <textarea
            class="textarea"
            readonly
            th:text="${analysisResultDetails.suggestedSolution}"
          ></textarea>
        </div>
      </div>
      <div class="separator"></div>

      <!-- 分析結果のメモ -->
      <div class="field">
        <label class="label">分析結果についてのメモ</label>
        <div class="control">
          <textarea
            class="textarea"
            id="analysisMemo"
            placeholder="メモを入力してください"
            th:text="${analysisResultDetails.analysisResultNote != null ? analysisResultDetails.analysisResultNote.content : ''}"
          ></textarea>
        </div>
        <button class="button is-info ajax-save-btn" disabled id="saveMemoBtn">
          メモ保存
        </button>
      </div>
      <input
        id="analysisResultNoteId"
        th:value="${analysisResultDetails.analysisResultNote != null ? analysisResultDetails.analysisResultNote.id : ''}"
        type="hidden"
      />
      <div class="separator"></div>

      <!-- 満足度評価 -->
      <label class="label">分析結果の満足度</label>
      <div class="satisfaction-rating">
        <button class="button is-small">☆</button>
        <button class="button is-small">☆</button>
        <button class="button is-small">☆</button>
        <button class="button is-small">☆</button>
        <button class="button is-small">☆</button>
      </div>
      <input
        id="satisfactionScore"
        th:value="${analysisResultDetails.analysisResultSatisfaction != null ? analysisResultDetails.analysisResultSatisfaction.satisfactionScore : 0}"
        type="hidden"
      />
      <input
        id="analysisResultSatisfactionId"
        th:value="${analysisResultDetails.analysisResultSatisfaction != null ? analysisResultDetails.analysisResultSatisfaction.id : ''}"
        type="hidden"
      />
      <button
        class="button is-info ajax-save-btn"
        disabled
        id="saveSatisfactionBtn"
      >
        満足度保存
      </button>

      <div class="separator"></div>

      <!-- 削除ボタン -->
      <div class="field is-grouped is-grouped-centered">
        <div class="control">
          <button class="button is-danger" id="deleteBtn">削除する</button>
        </div>
