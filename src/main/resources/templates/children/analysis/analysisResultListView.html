<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>감정 분석 결과 목록 - iLog</title>
    <link
      rel="stylesheet"
      th:href="@{/css/bulma.min.css}"
      href="../../../static/css/bulma.min.css"
    />
    <link
      rel="stylesheet"
      th:href="@{/css/customColors.css}"
      href="../../../static/css/customColors.css"
    />
    <link
      rel="stylesheet"
      th:href="@{/css/all.min.css}"
      href="../../../static/css/all.min.css"
    />
    <style>
      .view-toggle {
        margin-bottom: 1rem;
      }

      .preview-image {
        background-color: #ffb6c1;
        aspect-ratio: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
      }

      .pagination-link.is-current {
        background-color: #ffb6c1;
        border-color: #ffb6c1;
      }

      .delete-button {
        background-color: #f5f5f5;
        border: none;
        padding: 0.5em 1em;
        cursor: pointer;
      }

      .details-button {
        background-color: var(--primary-color);
        border: none;
        padding: 0.5em 1em;
        cursor: pointer;
      }

      .delete-button:hover {
        background-color: #e8e8e8;
      }

      .card {
        min-height: 500px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
    </style>
    <script
      th:src="@{/js/jquery-3.7.1.min.js}"
      src="../../../static/js/jquery-3.7.1.min.js"
    ></script>
    <script th:src="@{/js/sweetalert2.js}"></script>
    <script>
      var analysisUrl = `/children/${getChildIdFromUrl()}/analysis`;
      function deleteItem(event) {
        event.preventDefault();
        event.stopPropagation();
        const analysisResultId = event.target.getAttribute(
          'data-analysisResultId'
        );
        const analysisTargetId = event.target.getAttribute(
          'data-analysisTargetId'
        );
        Swal.fire({
          title: '정말 삭제하시겠어요?',
          text: '복원할 수 없습니다!',
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#3085d6',
          cancelButtonColor: '#d33',
          confirmButtonText: '삭제할게요',
          cancelButtonText: '아니요',
        }).then((result) => {
          if (result.isConfirmed) {
            $.ajax({
              url: `${analysisUrl}/${analysisTargetId}/results/${analysisResultId}`,
              method: 'DELETE',
              success: function (res) {
                if (res) {
                  Swal.fire({
                    title: '삭제되었습니다!',
                    text: '성공적으로 삭제되었습니다.',
                    icon: 'success',
                  });
                  setTimeout(() => {
                    window.location.href = `${analysisUrl}/resultList`;
                  }, 1000);
                } else {
                  Swal.fire('삭제 중 오류가 발생했습니다.');
                }
              },
              error: function (err) {
                Swal.fire('삭제 중 오류가 발생했습니다.');
              },
            });
          }
        });
      }

      document.addEventListener('DOMContentLoaded', function () {
        const viewType = document.getElementById('viewType');
        const gridView = document.getElementById('gridView');
        const listView = document.getElementById('listView');

        viewType.addEventListener('change', function () {
          if (this.value === 'grid') {
            gridView.classList.remove('is-hidden');
            listView.classList.add('is-hidden');
          } else {
            gridView.classList.add('is-hidden');
            listView.classList.remove('is-hidden');
          }
        });

        getPagedAnalysisResultList(1);

        // Pagination handler
        document.querySelectorAll('.pagination-link').forEach((link) => {
          link.addEventListener('click', function () {
            // 페이지 이동 처리
            const pageNumber = this.innerText;
            getPagedAnalysisResultList(pageNumber);
          });
        });
      });

      function getPagedAnalysisResultList(pageNumber) {
        // 페이지 번호에 해당하는 목록을 가져오는 ajax 요청
        console.log('Getting page:', pageNumber);
        const offset = pageNumber - 1;
        $.ajax({
          url: `/children/${getChildIdFromUrl()}/analysis/results?offset=${offset}&limit=10`,
          type: 'GET',
          success: function (data) {
            // data.content에 목록이 들어있음
            // 목록을 그리는 코드
            const pageNumber = data.pageNumber;
            const totalPages = data.totalPages;
            const content = data.content;
            console.log(content);
            const totalElements = data.totalElements;
            const pageSize = data.pageSize;
            const last = data.last;
            var pageResponse = {};
            pageResponse['pageNumber'] = pageNumber;
            pageResponse['totalPages'] = totalPages;
            pageResponse['content'] = content;
            pageResponse['totalElements'] = totalElements;
            pageResponse['pageSize'] = pageSize;
            pageResponse['last'] = last;

            // Grid View
            const gridView = document.getElementById('gridView');
            gridView.innerHTML = '';
            content.forEach((item) => {
              const card = document.createElement('div');
              card.classList.add('column', 'is-one-fifth');
              card.innerHTML = `
                <div class="card">
                  <div class="card-image">
                    <figure class="image preview-image">
                      <img src="${item.analysisTargetFileSrcUri}" />
                    </figure>
                  </div>
                  <div class="card-content">
                    <div class="content">
                      <p class="has-text-grey">분석일시: ${new Date(
                        item.analysisDate
                      ).toLocaleString()}</p>
                      <p class="has-text-grey">등록일시: ${new Date(
                        item.createdAt
                      ).toLocaleDateString()}</p>
                      <p>${item.analysisResultTitle}</p>
                    </div>
                  </div>
                  <footer class="card-footer">
                    <a href="/children/${getChildIdFromUrl()}/analysis/${
                item.analysisTargetId
              }/results/${
                item.analysisResultId
              }/details"><button class="card-footer-item">상세보기</button></a>
                    <button data-analysisTargetId="${
                      item.analysisTargetId
                    }" data-analysisResultId="${
                item.analysisResultId
              }" class="delete-button card-footer-item" onclick="deleteItem(event)">삭제</button>
                  </footer>
                </div>
              `;
              gridView.appendChild(card);
            });

            // List View
            const listTableBody = document.getElementById('listTableBody');
            listTableBody.innerHTML = '';
            content.forEach((item) => {
              const row = document.createElement('tr');
              const icons = item.analysisTypes
                .map((analysisType) => {
                  if (analysisType === 'WRITING') {
                    return '📖';
                  } else if (analysisType === 'DRAWING') {
                    return '🖼️';
                  } else if (analysisType === 'PHOTO') {
                    return '📸';
                  }
                })
                .join(', ');
              row.innerHTML = `
                <td>${item.analysisResultId}</td>
                <td>${new Date(item.createdAt).toLocaleDateString()}</td>
                <td>${new Date(item.analysisDate).toLocaleDateString()}</td>
                <td><a href="/children/${getChildIdFromUrl()}/analysis/${
                item.analysisTargetId
              }/results/${item.analysisResultId}/details">${
                item.analysisResultTitle
              }</a></td>
                <td>${icons}</td>
                <td class="has-text-right">
                  <button data-analysisTargetId="${
                    item.analysisTargetId
                  }" data-analysisResultId="${
                item.analysisResultId
              }" class="delete-button button is-danger is-small" onclick="deleteItem(event)">삭제</button>
                </td>
              `;
              listTableBody.appendChild(row);
            });

            // 페이징 인터페이스 업데이트
            updatePagination(pageNumber, totalPages);
          },
          error: function (error) {
            console.error(error);
          },
        });
      }

      function updatePagination(currentPage, totalPages) {
        // currentPage는 0부터 시작하는 인덱스
        var paginationList = $('.pagination-list');
        paginationList.empty();

        // 페이지 번호 버튼 생성
        for (var i = 0; i < totalPages; i++) {
          var pageLabel = i + 1;
          var isCurrentPage = i === currentPage;

          var link = $('<a>', {
            class: 'pagination-link' + (isCurrentPage ? ' is-current' : ''),
            'aria-label': 'Goto page ' + pageLabel,
            text: pageLabel,
          });

          link.on('click', function () {
            var selectedPage = parseInt($(this).text());
            getPagedAnalysisResultList(selectedPage);
          });

          var li = $('<li>').append(link);
          paginationList.append(li);
        }

        // 이전 버튼 업데이트
        $('.pagination-previous')
          .off('click')
          .on('click', function (e) {
            e.preventDefault();
            if (currentPage > 0) {
              getPagedAnalysisResultList(currentPage);
            }
          });

        // 다음 버튼 업데이트
        $('.pagination-next')
          .off('click')
          .on('click', function (e) {
            e.preventDefault();
            if (currentPage < totalPages - 1) {
              getPagedAnalysisResultList(currentPage + 2);
            }
          });
      }

      function getChildIdFromUrl() {
        // 예: URL 형식 - /children/{childId}/mentalsurveys/surveyStats
        const pathParts = window.location.pathname.split('/');
        // pathParts 예시: ["", "children", "{childId}", "mentalsurveys", "surveyStats"]
        if (pathParts.length > 2 && pathParts[1] === 'children') {
          return pathParts[2]; // 인덱스 2가 childId입니다.
        }
        return null;
      }

      function formatLocalDateTime(dateTimeString) {
        // dateTimeString이 "2025-03-01T15:18:57"와 같은 형식이라고 가정
        const dateObj = new Date(dateTimeString);
        const year = dateObj.getFullYear();
        const month = ('0' + (dateObj.getMonth() + 1)).slice(-2);
        const day = ('0' + dateObj.getDate()).slice(-2);
        const hours = ('0' + dateObj.getHours()).slice(-2);
        const minutes = ('0' + dateObj.getMinutes()).slice(-2);
        const seconds = ('0' + dateObj.getSeconds()).slice(-2);
        return `${year}년 ${month}월 ${day}일 ${hours}시${minutes}분`;
      }
    </script>
  </head>
  <body>
    <nav class="navbar" role="navigation" aria-label="main navigation">
      <!-- 로고 + dashboard 바로가기 -->
      <div class="logo">
        <a th:href="@{/dashboard}">
          <img
            src="../../static/images/wilog.png"
            th:src="@{/images/wilog.png}"
            alt="로고"
            class="image"
            style="width: 100px; height: auto"
          />
        </a>
      </div>
      <div class="navbar-end">
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/guides"><span>이용안내</span></a>
          </div>
        </div>
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/claims"><span>고객센터</span></a>
          </div>
        </div>
      </div>
    </nav>

    <section class="section">
      <div class="container">
        <h1 class="title has-text-centered mb-6">
          [[${childName}]] 감정 분석 결과 목록
        </h1>

        <div class="columns is-mobile is-vcentered mb-4">
          <div class="column is-narrow">
            <div class="select">
              <select id="viewType">
                <option value="grid">그리드</option>
                <option value="list">리스트</option>
              </select>
            </div>
          </div>
          <div class="column">
            <a
              th:href="@{/children/{childId}/analysis/new(childId=${childId})}"
            >
              <button class="button is-link is-light is-pulled-right">
                감정 분석하기
              </button>
            </a>
          </div>
        </div>

        <!-- Grid View -->
        <div id="gridView" class="columns is-multiline">
          <!-- 동적으로 PageResponse를 받아와서 렌더링 -->
          <div
            class="column is-one-fifth"
            th:each="i : ${#numbers.sequence(1, 10)}"
          >
            <div class="card">
              <div class="card-image">
                <figure class="image preview-image">이미지 미리보기</figure>
              </div>
              <div class="card-content">
                <div class="content">
                  <p class="has-text-grey">2025.02.10</p>
                  <p>제목</p>
                </div>
              </div>
              <footer class="card-footer">
                <button class="delete-button card-footer-item">삭제</button>
              </footer>
            </div>
          </div>
        </div>

        <!-- List View -->
        <div id="listView" class="is-hidden">
          <!-- 동적으로 PageResponse를 받아와서 렌더링 -->
          <table id="listTable" class="table is-fullwidth">
            <thead>
              <tr>
                <th>번호</th>
                <th>등록 일시</th>
                <th>분석 일시</th>
                <th>제목</th>
                <th>분석 유형</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="listTableBody">
              <tr th:each="i : ${#numbers.sequence(1, 5)}">
                <td>1</td>
                <td>2025.01.24</td>
                <td>2025.01.24</td>
                <td>사용자가 입력한 제목</td>
                <td>분석 유형</td>
                <td class="has-text-right">
                  <button class="delete-button">삭제</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <!-- 동적으로 자바 Page 객체를 받아서 페이징 인터페이스 생성 -->
        <!-- private List<AnalysisResultListItemDTO> content;
          private int pageNumber;
          private int pageSize;
          private long totalElements;
          private int totalPages;
          private boolean last; -->
        <!-- public record AnalysisResultListItemDTO(
            String analysisTargetFileSrcUri,
            String analysisResultTitle,
            LocalDateTime analysisDate
    ) {
    } -->
        <nav
          class="pagination is-centered mt-6"
          role="navigation"
          aria-label="pagination"
        >
          <a class="pagination-previous">&lt;&lt;</a>
          <a class="pagination-next">&gt;&gt;</a>
          <ul class="pagination-list">
            <!-- Pagination links will be dynamically generated here -->
          </ul>
        </nav>
      </div>
    </section>
  </body>
</html>
