<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>아동 기본정보 조회 페이지</title>

    <!-- jquery -->
    <script
      src="../../static/js/jquery-3.7.1.min.js"
      th:src="@{/js/jquery-3.7.1.min.js}"
    ></script>
    <script src="/js/sweetalert2.js"></script>

    <!-- bulma -->
    <link
      href="../../static/css/bulma.min.css"
      rel="stylesheet"
      th:href="@{/css/bulma.min.css}"
    />

    <!-- customColors -->
    <link
      href="../../static/css/customColors.css"
      rel="stylesheet"
      th:href="@{/css/customColors.css}"
    />

    <style>
      /* 전체 배경색 */
      body {
        margin: 0;
        background-color: #fdf5bf;
      }

      /* 좌우 div 간격 유지 */
      .columns {
        gap: 1rem;
      }

      /* 좌측 상단(프로필 박스)과 하단(정보 박스)의 간격 줄이기 */
      .column > .columns {
        gap: 0.5rem;
        margin-bottom: 0.5rem;
      }

      /* 기본 박스 간격 줄이기 */
      .column.box {
        margin-bottom: 0.5rem;
      }

      /* 반응형 컬럼 정렬 */
      @media (max-width: 1024px) {
        .columns {
          flex-direction: column;
          align-items: center;
        }
        .column {
          width: 90%;
          margin-bottom: 1.5rem;
        }
      }

      .column {
        flex-basis: 50%;
        min-width: 300px;
      }

      /* 프로필사진 등록 배경 설정 */
      .profile-background {
        background-image: url('/images/bb.png');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      /* 로고 설정 */
      .logo a {
        display: inline-block;
      }
      .logo img {
        cursor: pointer;
      }

      .profile-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
      }
      .profile-container {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        overflow: hidden;
        margin: 0 auto;
        position: relative;
      }
      .profile-container img {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        min-width: 100%;
        min-height: 100%;
      }

      /* 새로 추가한 CSS 클래스 (인라인 스타일 대체) */
      .logo-image {
        width: 100px;
        height: auto;
      }
      .custom-container {
        max-width: 1200px;
        margin: auto;
      }
      .min-height-300 {
        min-height: 300px;
      }
      .profile-background-box {
        border-radius: 15px;
        padding: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
      }
      .profile-box-custom {
        border-radius: 50%;
        width: 220px;
        height: 220px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: white;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      .button-gap {
        gap: 5rem;
      }
    </style>

    <!-- FilePond CSS -->
    <link
      href="/css/filepond.css"
      rel="stylesheet"
      th:href="@{/css/filepond.css}"
    />
    <link
      href="/css/filepond-plugin-image-preview.css"
      rel="stylesheet"
      th:href="@{/css/filepond-plugin-image-preview.css}"
    />
    <!-- FilePond JS 및 플러그인 -->
    <script src="/js/filepond/filepond.min.js"></script>
    <script src="/js/filepond-plugin-file-encode.min.js"></script>
    <script src="/js/filepond-plugin-file-validate-type.min.js"></script>
    <script src="/js/filepond-plugin-image-preview.min.js"></script>
    <script src="/js/filepond-plugin-image-exif-orientation.min.js"></script>
    <script src="/js/filepond-plugin-image-resize.min.js"></script>
    <script src="/js/filepond-plugin-image-transform.min.js"></script>

    <script>
      // お子様削除機能
      function deleteChild(childId) {
        if (!confirm('本当に削除しますか？')) return;
        fetch(`/children/${childId}`, {
          method: 'DELETE',
        })
          .then((response) => {
            if (!response.ok) {
              return response.text().then((errMsg) => {
                throw new Error(errMsg);
              });
            }
            alert('削除が完了しました。');
            window.location.href = '/dashboard/guardian';
          })
          .catch((error) => {
            console.error('削除エラー:', error);
            alert('削除に失敗しました: ' + error.message);
          });
      }
    </script>
  </head>

  <body>
    <section class="section">
      <!-- ロゴ + ダッシュボードへ -->
      <div class="logo">
        <a th:href="@{/dashboard}">
          <img
            alt="ロゴ"
            class="image logo-image"
            src="../../static/images/wilog.png"
            th:src="@{/images/wilog.png}"
          />
        </a>
      </div>

      <!-- 基本情報表示ページ -->
      <div class="container custom-container">
        <h1 class="title is-3 has-text-centered mb-6">
          お子様の基本情報の確認
        </h1>
        <div class="columns is-align-items-center mt-6">
          <!-- 左カラム -->
          <div class="column">
            <div class="columns is-flex-direction-column">
              <!-- プロフィール画像 -->
              <div class="column box has-text-centered min-height-300">
                <div class="box profile-background profile-background-box">
                  <div class="profile-box-custom">
                    <div class="field">
                      <div class="file is-large has-name is-boxed">
                        <div class="profile-container">
                          <img
                            alt="プロフィール画像"
                            class="profile-image"
                            th:src="${childBasicInfo.profileImgSrcUri}"
                          />
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- 名前、性別、生年月日 -->
              <div class="column box">
                <div class="field">
                  <label class="label">名前</label>
                  <div class="control">
                    <input
                      class="input"
                      readonly
                      th:value="${childBasicInfo.name}"
                      type="text"
                    />
                  </div>
                </div>

                <div class="field">
                  <label class="label">性別</label>
                  <div class="control">
                    <input
                      class="input"
                      readonly
                      th:value="${childBasicInfo.gender.name() == 'MAN' ? '男の子' : '女の子'}"
                      type="text"
                    />
                  </div>
                </div>

                <div class="field">
                  <label class="label">生年月日</label>
                  <div class="control">
                    <input
                      class="input"
                      readonly
                      th:value="${#temporals.format(childBasicInfo.birthDate, 'yyyy年 MM月 dd日')}"
                      type="text"
                    />
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- 右カラム -->
          <div class="column">
            <div class="columns is-flex-direction-column">
              <div class="column box">
                <div class="field">
                  <label class="label">関係</label>
                  <div class="control">
                    <input
                      class="input"
                      readonly
                      th:value="${childBasicInfo.callName}"
                      type="text"
                    />
                  </div>
                </div>

                <div class="field">
                  <label class="label">出生地</label>
                  <div class="control">
                    <input
                      class="input"
                      readonly
                      th:value="${childBasicInfo.birthLocation}"
                      type="text"
                    />
                  </div>
                </div>

                <div class="field">
                  <label class="label">家庭環境</label>
                  <div class="control">
                    <textarea
                      class="textarea"
                      readonly
                      th:text="${childBasicInfo.familyBackGrounds != null ?
                        #strings.listJoin(childBasicInfo.familyBackGrounds.![description], ', ') :
                        '選択された家庭環境はありません'}"
                    ></textarea>
                  </div>
                </div>

                <div class="field">
                  <label class="label">特記事項</label>
                  <div class="control">
                    <textarea
                      class="textarea"
                      readonly
                      th:text="${childBasicInfo.note}"
                    ></textarea>
                  </div>
                </div>

                <!-- 成長記録/心理アンケート -->
                <div class="buttons is-centered mt-4">
                  <a
                    class="button is-info"
                    th:href="@{/children/{childId}/records/new(childId=${childBasicInfo.id})}"
                    >成長記録を書く</a
                  >
                  <a
                    class="button is-info"
                    th:href="@{/children/{childId}/mentalSurveys/selects(childId=${childBasicInfo.id})}"
                    >心理アンケートを書く</a
                  >
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 編集 / 削除ボタン -->
        <div
          class="
            buttons
            is-centered is-flex is-justify-content-center
            mt-3
            button-gap
          "
        >
          <a
            class="button is-primary"
            th:href="@{/children/{childId}/basicInfo/edit(childId=${childBasicInfo.id})}"
            >編集する</a
          >
          <a
            class="button is-danger"
            href="javascript:void(0);"
            th:onclick="|deleteChild(${childBasicInfo.id})|"
            >削除する</a
          >
        </div>
      </div>
    </section>
    <div th:replace="fragments/footer :: ilogFooter"></div>
  </body>
</html>
