<!-- footer.html -->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head> </head>
  <body>
    <!-- ilogFooter 프래그먼트 정의 -->
    <div th:fragment="ilogFooter">
      <style>
        footer {
          background-color: #fdf5bf;
          color: #333;
          padding: 20px;
          border-top: 5px solid #bee6d9;
          font-family: Arial, sans-serif;
          margin-top: 10px;
        }
        .footer-wrapper {
          max-width: 1200px;
          margin: 0 auto;
          display: flex;
          flex-wrap: wrap;
          justify-content: space-between;
        }
        .footer-section {
          flex: 1;
          min-width: 250px;
          margin-bottom: 20px;
        }
        .logo-container {
          display: flex;
          align-items: center;
          margin-bottom: 10px;
        }
        .footer-logo {
          height: 40px;
          margin-right: 10px;
        }
        .footer-title {
          font-size: 1.2rem;
          font-weight: bold;
        }
        .contact-info p {
          margin: 5px 0;
        }
        .footer-links a {
          color: #333;
          margin-right: 15px;
          text-decoration: none;
        }
        .footer-links a:hover {
          color: #3273dc;
        }
        .footer-bottom {
          text-align: center;
          border-top: 1px solid #ddd;
          padding-top: 10px;
          font-size: 0.9rem;
        }
        .social-icons a {
          color: #333;
          margin-right: 10px;
          text-decoration: none;
        }
        .social-icons a:hover {
          color: #3273dc;
        }
      </style>
      <footer>
        <div class="footer-wrapper">
          <div class="footer-section">
            <div class="logo-container">
              <img
                class="footer-logo"
                src="../../static/images/wilog.png"
                th:src="@{/images/wilog.png}"
                alt="iLog 로고"
              />
              <span class="footer-title">iLog</span>
            </div>
            <p>
              아이의 감정과 발달을 체계적으로 기록하고 분석하여 건강한 성장을
              돕는 서비스입니다.
            </p>
          </div>
          <div class="footer-section">
            <h3 style="font-size: 1rem; font-weight: bold; margin-bottom: 10px">
              연락처
            </h3>
            <div class="contact-info">
              <p>서울특별시 강남구 테헤란로 123</p>
              <p>02-123-4567</p>
              <p>support@ilog.co.kr</p>
              <p>평일 09:00 - 18:00 (공휴일 제외)</p>
            </div>
          </div>
        </div>
        <div class="footer-bottom">
          <p>
            <a href="/terms">이용약관</a> |
            <a href="/privacy"><strong>개인정보처리방침</strong></a> |
            <a href="/youth-policy">청소년보호정책</a>
          </p>
          <p>&copy; 2025 iLog. All rights reserved.</p>
        </div>
      </footer>
    </div>
  </body>
</html>
