<!DOCTYPE html>
<html lang="ja" xmlns:th="http://thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>ログインページ</title>
    <script
      src="../../static/js/jquery-3.7.1.min.js"
      th:src="@{/js/jquery-3.7.1.min.js}"
    ></script>
    <link
      href="/css/bulma.min.css"
      rel="stylesheet"
      th:href="@{/css/bulma.min.css}"
    />
    <link
      href="../../static/css/customColors.css"
      rel="stylesheet"
      th:href="@{/css/customColors.css}"
    />
    <script
      src="../../static/js/just-validate.production.min.js"
      th:src="@{/js/just-validate.production.min.js}"
    ></script>
    <style>
      body {
        margin: 0;
        background-color: #fdf5bf;
      }

      section.section {
        padding: 0;
      }

      .login-container {
        height: 100vh;
      }

      .columns.is-fullheight {
        min-height: 100%;
        margin: 0;
      }

      .left-half,
      .right-half {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .left-half {
        background-color: #fdf5bf;
      }

      .login-box {
        box-shadow: none !important;
        border: none !important;
        background-color: #fdf5bf !important;
        width: 500px;
      }

      .login-box img {
        width: 200px;
        height: auto;
        display: block;
        margin: 0 auto;
      }

      .right-half figure {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      .right-half figure img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>

    <script defer>
      document.addEventListener('DOMContentLoaded', function () {
        const loginForm = document.getElementById('loginForm');
        if (!loginForm) {
          console.error(
            '❌ loginFormが存在しません！HTMLのIDを確認してください。'
          );
          return;
        }

        const validator = new JustValidate('#loginForm', {
          validateBeforeSubmitting: true,
        });

        const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[\W_]).*$/;

        validator
          .addField('#signInId', [
            {
              rule: 'required',
              errorMessage: 'ユーザーIDを入力してください',
            },
            {
              rule: 'minLength',
              value: 5,
              errorMessage: 'ユーザーIDは5〜12文字で入力してください',
            },
            {
              rule: 'maxLength',
              value: 12,
              errorMessage: 'ユーザーIDは5〜12文字で入力してください',
            },
          ])
          .addField('#userPwd', [
            {
              rule: 'required',
              errorMessage: 'パスワードを入力してください',
            },
            {
              rule: 'minLength',
              value: 5,
              errorMessage: 'パスワードは5〜12文字で入力してください',
            },
            {
              rule: 'maxLength',
              value: 12,
              errorMessage: 'パスワードは5〜12文字で入力してください',
            },
            {
              rule: 'customRegexp',
              value: passwordRegex,
              errorMessage:
                'パスワードには英字・数字・記号を含める必要があります。',
            },
          ])
          .onSuccess((event) => {
            event.preventDefault();
            document.getElementById('loginForm').submit();
          });
      });
    </script>
  </head>

  <body>
    <section class="section">
      <div class="container login-container">
        <div class="columns is-gapless is-fullheight">
          <!-- 左側 ログインフォーム -->
          <div class="column is-half left-half">
            <form
              class="box login-box"
              id="loginForm"
              method="POST"
              name="loginForm"
              th:action="@{/auth/signIn/proc}"
            >
              <!-- ロゴ -->
              <div>
                <a th:href="@{/}">
                  <img
                    alt="ロゴ"
                    class="image mb-4"
                    src="../../static/images/ilog.png"
                    th:src="@{/images/ilog.png}"
                  />
                </a>
              </div>

              <!-- ログインタイトル -->
              <h2 class="title has-text-centered mb-5">ログイン</h2>

              <!-- ユーザーID入力 -->
              <div class="field mb-2">
                <label class="label">ユーザーID</label>
                <div class="control">
                  <input
                    autocomplete="username"
                    class="input"
                    id="signInId"
                    name="signInId"
                    placeholder="ユーザーIDを入力してください"
                    required
                    type="text"
                  />
                </div>
              </div>

              <!-- パスワード入力 -->
              <div class="field mb-2">
                <label class="label">パスワード</label>
                <div class="control">
                  <input
                    autocomplete="current-password"
                    class="input"
                    id="userPwd"
                    name="userPwd"
                    placeholder="パスワードを入力してください"
                    required
                    type="password"
                  />
                </div>
              </div>

              <!-- ID/PW忘れた場合 -->
              <div class="has-text-right">
                <p>
                  <a class="has-text-link" th:href="@{/auth/idPwFind}"
                    >ID・パスワードをお忘れですか？</a
                  >
                </p>
              </div>

              <!-- エラーメッセージ -->
              <div
                class="error-message has-text-centered mt-2"
                th:if="${param.error}"
              >
                <p
                  class="is-size-5"
                  style="color: red; font-weight: bold"
                  th:text="${param.errMessage}"
                ></p>
              </div>

              <!-- ログインボタン -->
              <div class="field mt-4">
                <button
                  class="button is-primary is-fullwidth is-medium"
                  id="loginBtn"
                  name="loginBtn"
                  type="submit"
                  value="ログイン"
                >
                  ログイン
                </button>
              </div>

              <!-- 新規登録案内 -->
              <p class="has-text-centered mt-4">
                まだアカウントをお持ちでない方はこちら：
                <a class="has-text-link" th:href="@{/auth/signUp}">新規登録</a>
              </p>
            </form>
          </div>

          <!-- 右側 イメージ -->
          <div class="column is-half right-half">
            <figure>
              <img
                alt="サイドイメージ"
                src="../../static/images/A1.jpg"
                th:src="@{/images/A1.jpg}"
              />
            </figure>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
