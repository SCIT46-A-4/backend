<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>내 문의 조회하기</title>

    <link rel="stylesheet" href="/css/bulma.min.css" />

    <!-- customColors.css 추가 -->
    <link rel="stylesheet" th:href="@{/css/customColors.css}" />

    <!-- SweetAlert (알림창) 추가 -->
    <script src="/js/sweetalert2.js"></script>

    <style>
      /* ✅ 디테일뷰 배경색 적용 */
      body {
        background-color: var(--primary);
        /* #FDF5BF */
      }
    </style>
  </head>

  <body>
    <section class="section">
      <div class="container">
        <h2 class="title is-4 has-text-centered">내 문의 조회하기</h2>

        <div class="columns is-centered">
          <div class="column is-two-thirds">
            <p class="notification is-light has-text-centered">
              ※ iLog 고객센터는 산업안전보건법을 준수하여 고객응대근로자를
              보호하고 있습니다. <br />
              성희롱, 욕설 등의 폭언을 하지 말아주세요. 폭언 시 상담이 제한되고
              법령에 따라 조치될 수 있습니다.
            </p>

            <div class="box">
              <!-- 📌 제목 추가 -->
              <div class="field">
                <label class="label">문의 제목</label>
                <div class="control">
                  <input
                    class="input"
                    type="text"
                    th:value="${claimDetails.title}"
                    readonly
                  />
                </div>
              </div>

              <!-- 📌 문의 유형 추가 -->
              <div class="field">
                <label class="label">문의 유형</label>
                <div class="control">
                  <input
                    class="input"
                    type="text"
                    th:value="${claimDetails.type}"
                    readonly
                  />
                </div>
              </div>

              <!-- 📌 등록 날짜 추가 -->
              <div class="field">
                <label class="label">등록 날짜</label>
                <div class="control">
                  <span
                    th:text="${#temporals.format(claimDetails.createdAt, 'yyyy-MM-dd HH:mm')}"
                  ></span>
                </div>
              </div>

              <!-- 📌 문의 내용 -->
              <div class="field">
                <label class="label">문의 내용</label>
                <div class="control">
                  <textarea
                    class="textarea"
                    th:text="${claimDetails.content}"
                    readonly
                  ></textarea>
                </div>
              </div>

              <!-- 📌 답변 목록 -->
              <div class="field">
                <label class="label">답변</label>
                <div class="control">
                  <div th:if="${claimDetails.claimAnswers.size() > 0}">
                    <div
                      th:each="answer : ${claimDetails.claimAnswers}"
                      class="box"
                    >
                      <p>
                        <strong>내용:</strong>
                        <span th:text="${answer.content}"></span>
                      </p>
                      <p>
                        <strong>작성자:</strong>
                        <span th:text="${answer.authorName}"></span>
                      </p>
                      <p>
                        <strong>작성일:</strong>
                        <span
                          th:text="${#temporals.format(answer.createdAt, 'yyyy-MM-dd HH:mm')}"
                        ></span>
                      </p>
                    </div>
                  </div>
                  <div th:if="${claimDetails.claimAnswers.size() == 0}">
                    <p class="has-text-grey">아직 등록된 답변이 없습니다.</p>
                  </div>
                </div>
              </div>

              <!-- 📌 관리자만 답변 작성 가능 -->
              <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                <!-- <h2 class="title is-5">답변 작성</h2> -->
                <form
                  th:action="@{/claims/{claimId}/answer(claimId=${claimDetails.claimId})}"
                  method="post"
                >
                  <div class="field">
                    <label class="label">답변 내용</label>
                    <div class="control">
                      <textarea
                        class="textarea"
                        name="content"
                        required
                      ></textarea>
                    </div>
                  </div>
                  <button class="button is-primary" type="submit">
                    답변 등록
                  </button>
                </form>
              </div>

              <!-- 📌 버튼 그룹 -->
              <div class="has-text-centered mt-4">
                <a th:href="@{/claims/claimsList}" class="button is-light"
                  >목록으로</a
                >
                <button
                  class="button is-danger"
                  th:data-claim-id="${claimDetails.claimId}"
                  onclick="confirmDelete(this)"
                >
                  삭제하기
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <div th:replace="fragments/footer :: ilogFooter"></div>
    <!-- 📌 삭제 확인 알림창 (SweetAlert) -->
    <script>
      function confirmDelete(buttonElement) {
        let claimId = buttonElement.getAttribute('data-claim-id');
        console.log('📌 삭제 요청 claimId:', claimId); // ✅ claimId 확인 로그

        if (!claimId || isNaN(Number(claimId))) {
          console.error(
            '❌ 삭제 요청 실패: claimId가 올바르지 않습니다.',
            claimId
          );
          Swal.fire(
            '오류',
            '삭제 요청에 문제가 발생했습니다. 다시 시도해주세요.',
            'error'
          );
          return;
        }

        Swal.fire({
          title: '정말 삭제하시겠습니까?',
          text: '삭제 후 복구할 수 없습니다.',
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#d33',
          cancelButtonColor: '#3085d6',
          confirmButtonText: '삭제하기',
          cancelButtonText: '취소',
        }).then((result) => {
          if (result.isConfirmed) {
            let deleteUrl = `/claims/${Number(claimId)}`; // ✅ URL이 올바르게 생성되는지 확인
            console.log('📌 DELETE 요청 URL:', deleteUrl);

            fetch(deleteUrl, {
              method: 'DELETE',
              headers: {
                'X-CSRF-TOKEN':
                  document
                    .querySelector("meta[name='_csrf']")
                    ?.getAttribute('content') || '',
                'Content-Type': 'application/json',
              },
            })
              .then((response) => {
                console.log('삭제 요청 응답 상태 코드:', response.status); // ✅ 응답 코드 확인
                return response.text().then((text) => {
                  console.log('📌 응답 본문:', text); // ✅ 응답 내용을 확인하기 위해 추가
                  if (response.ok) {
                    Swal.fire(
                      '삭제 완료!',
                      '문의가 삭제되었습니다.',
                      'success'
                    ).then(() => {
                      window.location.href = '/claims/claimsList';
                    });
                  } else {
                    Swal.fire('삭제 실패', '삭제에 실패했습니다.', 'error');
                  }
                });
              })
              .catch((error) => {
                console.error('삭제 요청 중 오류 발생:', error);
                Swal.fire('오류', '삭제 요청 중 문제가 발생했습니다.', 'error');
              });
          }
        });
      }
    </script>
  </body>
</html>
