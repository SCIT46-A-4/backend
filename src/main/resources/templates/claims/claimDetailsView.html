<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>내 문의 조회하기</title>

    <link href="/css/bulma.min.css" rel="stylesheet" />

    <!-- customColors.css 추가 -->
    <link rel="stylesheet" th:href="@{/css/customColors.css}" />

    <!-- SweetAlert (알림창) 추가 -->
    <script src="/js/sweetalert2.js"></script>

    <style>
      /* ✅ 디테일뷰 배경색 적용 */
      body {
        background-color: var(--primary);
        /* #FDF5BF */
      }
    </style>
  </head>

  <body>
    <section class="section">
      <div class="container">
        <h2 class="title is-4 has-text-centered">お問い合わせ内容の確認</h2>

        <div class="columns is-centered">
          <div class="column is-two-thirds">
            <p class="notification is-light has-text-centered">
              ※ iLog カスタマーセンターは、産業安全保健法に基づき<br />
              顧客対応スタッフを保護しています。<br />
              セクハラや暴言などの不適切な言動はご遠慮ください。<br />
              暴言があった場合、対応が制限され、法令に基づき対応されることがあります。
            </p>

            <div class="box">
              <!-- 件名 -->
              <div class="field">
                <label class="label">件名</label>
                <div class="control">
                  <input
                    class="input"
                    readonly
                    th:value="${claimDetails.title}"
                    type="text"
                  />
                </div>
              </div>

              <!-- お問い合わせ種別 -->
              <div class="field">
                <label class="label">お問い合わせの種類</label>
                <div class="control">
                  <input
                    class="input"
                    readonly
                    th:value="${claimDetails.type.typeNameKr}"
                    type="text"
                  />
                </div>
              </div>

              <!-- 登録日時 -->
              <div class="field">
                <label class="label">登録日時</label>
                <div class="control">
                  <span
                    th:text="${#temporals.format(claimDetails.createdAt, 'yyyy-MM-dd HH:mm')}"
                  ></span>
                </div>
              </div>

              <!-- 内容 -->
              <div class="field">
                <label class="label">お問い合わせ内容</label>
                <div class="control">
                  <textarea
                    class="textarea"
                    readonly
                    th:text="${claimDetails.content}"
                  ></textarea>
                </div>
              </div>

              <!-- 回答一覧 -->
              <div class="field">
                <label class="label">回答</label>
                <div class="control">
                  <div th:if="${claimDetails.claimAnswers.size() > 0}">
                    <div
                      class="box"
                      th:each="answer : ${claimDetails.claimAnswers}"
                    >
                      <p>
                        <strong>内容：</strong>
                        <span th:text="${answer.content}"></span>
                      </p>
                      <p>
                        <strong>回答者：</strong>
                        <span th:text="${answer.authorName}"></span>
                      </p>
                      <p>
                        <strong>作成日：</strong>
                        <span
                          th:text="${#temporals.format(answer.createdAt, 'yyyy-MM-dd HH:mm')}"
                        ></span>
                      </p>
                    </div>
                  </div>
                  <div th:if="${claimDetails.claimAnswers.size() == 0}">
                    <p class="has-text-grey">まだ回答が登録されていません。</p>
                  </div>
                </div>
              </div>

              <!-- 管理者のみ回答可能 -->
              <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                <form
                  method="post"
                  th:action="@{/claims/{claimId}/answer(claimId=${claimDetails.claimId})}"
                >
                  <div class="field">
                    <label class="label">回答内容</label>
                    <div class="control">
                      <textarea
                        class="textarea"
                        name="content"
                        required
                      ></textarea>
                    </div>
                  </div>
                  <button class="button is-primary" type="submit">
                    回答を登録する
                  </button>
                </form>
              </div>

              <!-- ボタン -->
              <div class="has-text-centered mt-4">
                <a class="button is-light" th:href="@{/claims/claimsList}">
                  一覧へ戻る
                </a>
                <button
                  class="button is-danger"
                  onclick="confirmDelete(this)"
                  th:data-claim-id="${claimDetails.claimId}"
                >
                  削除する
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div th:replace="fragments/footer :: ilogFooter"></div>

    <!-- 削除確認ダイアログ -->
    <script>
      function confirmDelete(buttonElement) {
        let claimId = buttonElement.getAttribute('data-claim-id');
        console.log('📌 削除対象 claimId:', claimId);

        if (!claimId || isNaN(Number(claimId))) {
          console.error('❌ claimId が不正です:', claimId);
          Swal.fire(
            'エラー',
            '削除に失敗しました。もう一度お試しください。',
            'error'
          );
          return;
        }

        Swal.fire({
          title: '本当に削除しますか？',
          text: '削除後は復元できません。',
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#d33',
          cancelButtonColor: '#3085d6',
          confirmButtonText: '削除する',
          cancelButtonText: 'キャンセル',
        }).then((result) => {
          if (result.isConfirmed) {
            let deleteUrl = `/claims/${Number(claimId)}`;
            console.log('📌 削除URL:', deleteUrl);

            fetch(deleteUrl, {
              method: 'DELETE',
              headers: {
                'X-CSRF-TOKEN':
                  document
                    .querySelector("meta[name='_csrf']")
                    ?.getAttribute('content') || '',
                'Content-Type': 'application/json',
              },
            })
              .then((response) => {
                console.log('削除レスポンスコード:', response.status);
                return response.text().then((text) => {
                  console.log('📌 レスポンステキスト:', text);
                  if (response.ok) {
                    Swal.fire(
                      '削除完了',
                      'お問い合わせが削除されました。',
                      'success'
                    ).then(() => {
                      window.location.href = '/claims/claimsList';
                    });
                  } else {
                    Swal.fire('削除失敗', '削除に失敗しました。', 'error');
                  }
                });
              })
              .catch((error) => {
                console.error('削除エラー:', error);
                Swal.fire('エラー', '削除中に問題が発生しました。', 'error');
              });
          }
        });
      }
    </script>
  </body>
</html>
