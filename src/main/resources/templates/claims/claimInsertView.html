<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>문의 쓰기 페이지</title>

    <!-- Bulma CSS -->
    <link rel="stylesheet" href="/css/bulma.min.css" />
    <!-- <link rel="stylesheet" href="/css/footer.css" /> -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- customColors.css 추가 -->
    <link rel="stylesheet" th:href="@{/css/customColors.css}" />

    <!-- jQuery -->
    <script src="/js/jquery-3.7.1.min.js"></script>

    <script>
      function updateCharCount() {
        let content = document.getElementById('content');
        let counter = document.getElementById('charCounter');
        counter.textContent = content.value.length + '자 입력 / 최대 1000자';
      }
    </script>

    <style>
      /* 페이지 전체를 세로 중앙 정렬 */

      /* 컨테이너 크기 조정 */
      .container {
        width: 50vw;
        min-width: 400px;
        max-width: 600px;
        padding: 30px;
        border-radius: 8px;
        background-color: #ffffff;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
      }

      /* 문의하기 제목 스타일 */
      .inquiry-header {
        text-align: center;
        margin-bottom: 20px;
      }

      .inquiry-header h2 {
        font-size: 1.8rem;
        font-weight: bold;
      }

      .inquiry-header p {
        font-size: 0.9rem;
        color: gray;
      }

      /* 안내 문구 스타일 */
      .info-text {
        font-size: 0.8rem;
        color: gray;
        text-align: center;
        margin-top: 10px;
        line-height: 1.4;
      }

      /* 글자 수 표시 */
      .char-counter {
        font-size: 0.8rem;
        color: gray;
        text-align: left;
        margin-top: 5px;
      }
      #mainContainer {
        margin: 10px;
      }
      nav#mainNav {
        background-color: var(--primary);
        margin-bottom: 10px;
      }
    </style>
  </head>

  <body>
    <nav
      id="mainNav"
      class="navbar"
      role="navigation"
      aria-label="main navigation"
    >
      <div class="navbar-brand">
        <a class="navbar-item" href="/dashboard">
          <img
            id="logo"
            src="../../static/images/wilog.png"
            th:src="@{/images/wilog.png}"
            alt="iLog 로고"
          />
        </a>
      </div>
      <div class="navbar-end">
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/guides"><span>이용안내</span></a>
          </div>
        </div>
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/claims"><span>고객센터</span></a>
          </div>
        </div>
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/auth/logout"
              ><span>로그아웃</span></a
            >
          </div>
        </div>
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" th:href="@{/members/myDetails}">
              <span class="icon"><i class="fas fa-user"></i></span>
              <span th:text="|${memberName}(${relationType})|"
                >김미영(부모)</span
              >
            </a>
          </div>
        </div>
      </div>
    </nav>
    <div id="mainConatiner">
      <div class="container">
        <!-- 문의하기 제목 및 설명 -->
        <div class="inquiry-header">
          <h2>문의 하기</h2>
          <p>궁금하신 점을 남겨주시면 접수 순서대로 답변 드리겠습니다.</p>
        </div>

        <!-- 안내 문구 -->
        <p class="info-text">
          * iLog 고객센터는 산업안전보건법을 준수하여 고객응대근로자를 보호하고
          있습니다.<br />
          성희롱, 욕설 등의 폭언을 하지 말아주세요. 폭언 시 상담이 제한되고
          법령에 따라 조치될 수 있습니다.
        </p>

        <form th:action="@{/claims/new}" method="post" th:object="${claimsDTO}">
          <!-- 제목 입력 -->
          <div class="field">
            <label class="label" for="title">제목</label>
            <div class="control">
              <input
                class="input"
                type="text"
                id="title"
                name="title"
                th:field="*{title}"
                required
              />
            </div>
          </div>

          <!-- 문의 유형 선택 (ClaimType Enum 활용) -->
          <div class="field">
            <label class="label" for="type">문의 유형</label>
            <div class="control">
              <div class="select is-fullwidth">
                <select id="type" name="type" th:field="*{type}" required>
                  <option value="">문의 유형 선택</option>
                  <option
                    th:each="claimType : ${T(com.scit.iLog.domain.claim.ClaimType).values()}"
                    th:value="${claimType}"
                    th:text="${claimType.typeNameKr}"
                  ></option>
                </select>
              </div>
            </div>
          </div>

          <!-- 문의 내용 -->
          <div class="field">
            <label class="label" for="content">문의 내용</label>
            <div class="control">
              <textarea
                class="textarea"
                id="content"
                name="content"
                th:field="*{content}"
                rows="5"
                maxlength="1000"
                oninput="updateCharCount()"
                placeholder="구체적인 내용을 기재해 주세요."
              ></textarea>
            </div>
            <p class="char-counter" id="charCounter">0자 입력 / 최대 1000자</p>
          </div>

          <!-- 제출 버튼 -->
          <div class="field">
            <div class="control has-text-centered">
              <button
                class="button is-primary"
                style="width: 100%"
                type="submit"
              >
                문의 등록하기
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
    <div th:replace="fragments/footer :: ilogFooter"></div>
  </body>
</html>
