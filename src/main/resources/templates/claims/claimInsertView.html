<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>문의 쓰기 페이지</title>

    <!-- Bulma CSS -->
    <link href="/css/bulma.min.css" rel="stylesheet" />
    <!-- <link rel="stylesheet" href="/css/footer.css" /> -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />

    <!-- customColors.css 추가 -->
    <link rel="stylesheet" th:href="@{/css/customColors.css}" />

    <!-- jQuery -->
    <script src="/js/jquery-3.7.1.min.js"></script>

    <script>
      function updateCharCount() {
        let content = document.getElementById('content');
        let counter = document.getElementById('charCounter');
        counter.textContent = content.value.length + '자 입력 / 최대 1000자';
      }
    </script>

    <style>
      /* 페이지 전체를 세로 중앙 정렬 */

      /* 컨테이너 크기 조정 */
      .container {
        width: 50vw;
        min-width: 400px;
        max-width: 600px;
        padding: 30px;
        border-radius: 8px;
        background-color: #ffffff;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
      }

      /* 문의하기 제목 스타일 */
      .inquiry-header {
        text-align: center;
        margin-bottom: 20px;
      }

      .inquiry-header h2 {
        font-size: 1.8rem;
        font-weight: bold;
      }

      .inquiry-header p {
        font-size: 0.9rem;
        color: gray;
      }

      /* 안내 문구 스타일 */
      .info-text {
        font-size: 0.8rem;
        color: gray;
        text-align: center;
        margin-top: 10px;
        line-height: 1.4;
      }

      /* 글자 수 표시 */
      .char-counter {
        font-size: 0.8rem;
        color: gray;
        text-align: left;
        margin-top: 5px;
      }
      #mainContainer {
        margin: 10px;
      }
      nav#mainNav {
        background-color: var(--primary);
        margin-bottom: 10px;
      }
    </style>
  </head>

  <body>
    <nav
      aria-label="main navigation"
      class="navbar"
      id="mainNav"
      role="navigation"
    >
      <div class="navbar-brand">
        <a class="navbar-item" href="/dashboard">
          <img
            alt="iLog ロゴ"
            id="logo"
            src="../../static/images/wilog.png"
            th:src="@{/images/wilog.png}"
          />
        </a>
      </div>
      <div class="navbar-end">
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/guides"
              ><span>ご利用案内</span></a
            >
          </div>
        </div>
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/claims"
              ><span>カスタマーセンター</span></a
            >
          </div>
        </div>
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/auth/logout"
              ><span>ログアウト</span></a
            >
          </div>
        </div>
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" th:href="@{/members/myDetails}">
              <span class="icon"><i class="fas fa-user"></i></span>
              <span th:text="|${memberName}(${relationType})|"
                >김미영(保護者)</span
              >
            </a>
          </div>
        </div>
      </div>
    </nav>

    <div id="mainConatiner">
      <div class="container">
        <!-- タイトルおよび説明 -->
        <div class="inquiry-header">
          <h2>お問い合わせ</h2>
          <p>
            ご不明な点がございましたら、お気軽にお問い合わせください。順次ご返信いたします。
          </p>
        </div>

        <!-- 案内メッセージ -->
        <p class="info-text">
          ※ iLog
          カスタマーセンターでは産業安全保健法に基づき、相談スタッフの保護に努めています。<br />
          セクハラ、暴言、侮辱的な発言はお控えください。<br />
          暴言があった場合、対応を中止し、法的措置が取られる可能性があります。
        </p>

        <form method="post" th:action="@{/claims/new}" th:object="${claimsDTO}">
          <!-- タイトル入力 -->
          <div class="field">
            <label class="label" for="title">件名</label>
            <div class="control">
              <input
                class="input"
                id="title"
                name="title"
                required
                th:field="*{title}"
                type="text"
              />
            </div>
          </div>

          <!-- お問い合わせ種別 -->
          <div class="field">
            <label class="label" for="type">お問い合わせの種類</label>
            <div class="control">
              <div class="select is-fullwidth">
                <select id="type" name="type" required th:field="*{type}">
                  <option value="">種類を選択してください</option>
                  <option
                    th:each="claimType : ${T(com.scit.iLog.domain.claim.ClaimType).values()}"
                    th:text="${claimType.typeNameKr}"
                    th:value="${claimType}"
                  ></option>
                </select>
              </div>
            </div>
          </div>

          <!-- 内容 -->
          <div class="field">
            <label class="label" for="content">お問い合わせ内容</label>
            <div class="control">
              <textarea
                class="textarea"
                id="content"
                maxlength="1000"
                name="content"
                oninput="updateCharCount()"
                placeholder="できるだけ具体的にご記入ください。"
                rows="5"
                th:field="*{content}"
              ></textarea>
            </div>
            <p class="char-counter" id="charCounter">
              0文字入力 / 最大 1000文字
            </p>
          </div>

          <!-- 送信ボタン -->
          <div class="field">
            <div class="control has-text-centered">
              <button
                class="button is-primary"
                style="width: 100%"
                type="submit"
              >
                お問い合わせを送信する
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <div th:replace="fragments/footer :: ilogFooter"></div>
  </body>
</html>
