<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>고객 센터 페이지</title>

    <!-- Bulma CSS -->
    <link
            href="../../static/css/bulma.min.css"
            rel="stylesheet"
            th:href="@{/css/bulma.min.css}"
    />
    <!-- customColors -->
    <link
            href="../../static/css/customColors.css"
            rel="stylesheet"
            th:href="@{/css/customColors.css}"
    />

    <!-- jQuery -->
    <script src="/js/jquery-3.7.1.min.js"></script>

    <link
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
            rel="stylesheet"
    />

    <style>
        /* ✅ 배경색 적용 */
        nav#mainNav {
          background-color: var(--primary);
          /* #FDF5BF */
        }

        #logo {
          width: 100px;
          height: auto;
          min-height: 50px;
        }

        .custom-container {
          width: 1000px;
          max-width: 1000px;
          margin: 0 auto;
          text-align: center;
          display: flex;
          align-items: stretch;
          justify-content: space-between;
          flex-direction: column;
        }

        .claim-list {
          min-height: 60vh;
        }

        /* ✅ 기존 스타일 유지, 색상은 customColors.css 활용 */
        .claim-box {
          background-color: var(--secondary);
          /* ✅ customColors.css의 변수 사용 */
          padding: 15px;
          border-radius: 8px;
          margin-bottom: 10px;
          cursor: pointer;
          box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
          transition: transform 0.2s ease-in-out, box-shadow 0.2s;
        }

        /* ✅ 호버 효과 */
        .claim-box:hover {
          transform: scale(1.02);
          box-shadow: 3px 3px 15px rgba(0, 0, 0, 0.15);
        }

        .button-container {
          display: flex;
          justify-content: space-between;
          width: 100%;
        }

        .write-btn {
          text-align: right;
          margin-bottom: 10px;
        }

        .logo {
          font-size: 24px;
          font-weight: bold;
          color: red;
          margin-bottom: 20px;
        }

        .claim-box .columns {
          align-items: center;
          text-align: left;
        }

        .claim-box .column {
          font-weight: bold;
        }

        /* 중앙 정렬 */
        .text-center {
          text-align: center;
        }

        /* 오른쪽 정렬 */
        .text-right {
          text-align: right;
        }

        #noClaimContainer {
          padding: 20px;
          background-color: var(--primary);
          color: black;
          font-weight: bold;
          min-height: 60vh;
        }
    </style>
</head>
<body>
<nav
        aria-label="main navigation"
        class="navbar"
        id="mainNav"
        role="navigation"
>
    <div class="navbar-brand">
        <a class="navbar-item" href="/">
            <img
                    alt="iLog 로고"
                    id="logo"
                    src="../../static/images/wilog.png"
                    th:src="@{/images/wilog.png}"
            />
        </a>
    </div>
    <div class="navbar-end">
        <div class="navbar-item">
            <div class="buttons">
                <a class="button is-light" href="/guides"><span>이용안내</span></a>
            </div>
        </div>
        <div class="navbar-item">
            <div class="buttons">
                <a class="button is-light" href="/claims"><span>고객센터</span></a>
            </div>
        </div>
        <div class="navbar-item">
            <div class="buttons">
                <a class="button is-light" href="/auth/logout"
                ><span>로그아웃</span></a
                >
            </div>
        </div>
        <div class="navbar-item">
            <div class="buttons">
                <a class="button is-light" th:href="@{/members/myDetails}">
                    <span class="icon"><i class="fas fa-user"></i></span>
                    <span th:text="|${memberName}(${relationType})|"
                    >김미영(부모)</span
                    >
                </a>
            </div>
        </div>
    </div>
</nav>
<section class="section">
    <div class="container custom-container">
        <h2 class="title is-4">내 문의 목록 페이지</h2>

        <div class="button-container">
            <div class="write-btn">
                <a class="button is-light" th:href="@{/claims}">고객센터로 이동</a>
            </div>
            <div class="write-btn">
                <a class="button is-light" th:href="@{/claims/new}">문의 하기</a>
            </div>
        </div>

        <!-- claim이 없을 경우 -->
        <div
                class="box claim-box is-secondary"
                id="noClaimContainer"
                th:if="${claimsPage.empty}"
        >
            <h1>문의 내역이 없습니다.</h1>
        </div>
        <th:block th:unless="${claimsPage.empty}">
            <div class="claim-list">
                <!-- claim이 있을 경우 -->
                <div
                        class="box claim-box is-secondary"
                        th:attr="onclick=|location.href='/claims/${claim.claimId}'|"
                        th:each="claim : ${claimsPage.content}"
                >
                    <div class="columns is-vcentered">
                        <!-- 문의 유형 + 제목 -->
                        <div class="column is-9">
                  <span
                          class="has-text-weight-bold"
                          th:text="'[' + ${claim.type} + ']'"
                  >[이용방법]</span
                  >
                            <span class="ml-2" th:text="${claim.title}">문의 제목</span>
                        </div>

                        <!-- 등록 날짜 -->
                        <div class="column is-3 text-right">
                            <!-- ✅ 답변이 1개 이상이면 체크 아이콘 표시 -->
                            <span class="icon" th:if="${claim.hasAnswers()}">
                    ✅
                                <!-- ✅ 이모지 또는 FontAwesome 아이콘 사용 가능 -->
                  </span>
                            <span
                                    th:text="${#temporals.format(claim.createdDate, 'yyyy-MM-dd')}"
                            >2025-01-24</span
                            >
                        </div>
                    </div>
                </div>
            </div>
        </th:block>

        <!-- 페이지네이션 -->
        <nav class="pagination is-centered mt-5">
            <a
                    class="pagination-previous"
                    th:classappend="${currentPage == 0} ? 'is-disabled'"
                    th:href="@{|/claims/claimsList?page=0|}"
            >≪ 처음</a
            >
            <a
                    class="pagination-previous"
                    th:classappend="${currentPage == 0} ? 'is-disabled'"
                    th:href="@{|/claims/claimsList?page=${currentPage - 1}|}"
            >＜ 이전</a
            >

            <ul class="pagination-list">
                <th:block th:if="${claimsPage.empty}">
                    <li>
                        <a
                                aria-current="page"
                                aria-label="Page 1"
                                class="pagination-link is-current"
                        >1</a
                        >
                    </li>
                </th:block>
                <th:block th:unless="${claimsPage.empty}">
                    <li th:each="pageIndex : ${#numbers.sequence(0, totalPages - 1)}">
                        <a
                                class="pagination-link"
                                th:classappend="${currentPage == pageIndex} ? 'is-current'"
                                th:href="@{|/claims/claimsList?page=${pageIndex}|}"
                                th:text="${pageIndex + 1}"
                        ></a>
                    </li>
                </th:block>
            </ul>

            <a
                    class="pagination-next"
                    th:classappend="${currentPage == totalPages - 1} ? 'is-disabled'"
                    th:href="@{|/claims/claimsList?page=${currentPage + 1}|}"
            >다음 ＞</a
            >
            <a
                    class="pagination-next"
                    th:classappend="${currentPage == totalPages - 1} ? 'is-disabled'"
                    th:href="@{|/claims/claimsList?page=${totalPages - 1}|}"
            >끝 ≫</a
            >
        </nav>
    </div>
</section>
<div th:replace="fragments/footer :: ilogFooter"></div>
</body>
</html>
