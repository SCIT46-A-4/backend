<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>고객 센터 페이지</title>

    <!-- Bulma CSS -->
    <link
      href="../../static/css/bulma.min.css"
      rel="stylesheet"
      th:href="@{/css/bulma.min.css}"
    />
    <!-- customColors -->
    <link
      href="../../static/css/customColors.css"
      rel="stylesheet"
      th:href="@{/css/customColors.css}"
    />

    <!-- jQuery -->
    <script src="/js/jquery-3.7.1.min.js"></script>

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      /* ✅ 배경색 적용 */
      nav#mainNav {
        background-color: var(--primary);
        /* #FDF5BF */
      }

      #logo {
        width: 100px;
        height: auto;
        min-height: 50px;
      }

      .custom-container {
        width: 1000px;
        max-width: 1000px;
        margin: 0 auto;
        text-align: center;
        display: flex;
        align-items: stretch;
        justify-content: space-between;
        flex-direction: column;
      }

      .claim-list {
        min-height: 60vh;
      }

      /* ✅ 기존 스타일 유지, 색상은 customColors.css 활용 */
      .claim-box {
        background-color: var(--secondary);
        /* ✅ customColors.css의 변수 사용 */
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 10px;
        cursor: pointer;
        box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        transition: transform 0.2s ease-in-out, box-shadow 0.2s;
      }

      /* ✅ 호버 효과 */
      .claim-box:hover {
        transform: scale(1.02);
        box-shadow: 3px 3px 15px rgba(0, 0, 0, 0.15);
      }

      .button-container {
        display: flex;
        justify-content: space-between;
        width: 100%;
      }

      .write-btn {
        text-align: right;
        margin-bottom: 10px;
      }

      .logo {
        font-size: 24px;
        font-weight: bold;
        color: red;
        margin-bottom: 20px;
      }

      .claim-box .columns {
        align-items: center;
        text-align: left;
      }

      .claim-box .column {
        font-weight: bold;
      }

      /* 중앙 정렬 */
      .text-center {
        text-align: center;
      }

      /* 오른쪽 정렬 */
      .text-right {
        text-align: right;
      }

      #noClaimContainer {
        padding: 20px;
        background-color: var(--primary);
        color: black;
        font-weight: bold;
        min-height: 60vh;
      }
    </style>
  </head>
  <body>
    <nav
      aria-label="main navigation"
      class="navbar"
      id="mainNav"
      role="navigation"
    >
      <div class="navbar-brand">
        <a class="navbar-item" href="/">
          <img
            alt="iLog ロゴ"
            id="logo"
            src="../../static/images/wilog.png"
            th:src="@{/images/wilog.png}"
          />
        </a>
      </div>
      <div class="navbar-end">
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/guides"
              ><span>ご利用案内</span></a
            >
          </div>
        </div>
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/claims"
              ><span>カスタマーセンター</span></a
            >
          </div>
        </div>
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/auth/logout"
              ><span>ログアウト</span></a
            >
          </div>
        </div>
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" th:href="@{/members/myDetails}">
              <span class="icon"><i class="fas fa-user"></i></span>
              <span th:text="|${memberName}(${relationType})|"
                >김미영(保護者)</span
              >
            </a>
          </div>
        </div>
      </div>
    </nav>

    <section class="section">
      <div class="container custom-container">
        <h2 class="title is-4">お問い合わせ履歴一覧</h2>

        <div class="button-container">
          <div class="write-btn">
            <a class="button is-light" th:href="@{/claims}"
              >カスタマーセンターへ</a
            >
          </div>
          <div class="write-btn">
            <a class="button is-light" th:href="@{/claims/new}">お問い合わせ</a>
          </div>
        </div>

        <!-- 問い合わせがない場合 -->
        <div
          class="box claim-box is-secondary"
          id="noClaimContainer"
          th:if="${claimsPage.empty}"
        >
          <h1>お問い合わせ履歴がありません。</h1>
        </div>

        <!-- 問い合わせがある場合 -->
        <th:block th:unless="${claimsPage.empty}">
          <div class="claim-list">
            <div
              class="box claim-box is-secondary"
              th:attr="onclick=|location.href='/claims/${claim.claimId}'|"
              th:each="claim : ${claimsPage.content}"
            >
              <div class="columns is-vcentered">
                <!-- タイプ＋タイトル -->
                <div class="column is-9">
                  <span
                    class="has-text-weight-bold"
                    th:text="'[' + ${claim.type} + ']'"
                    >[利用方法]</span
                  >
                  <span class="ml-2" th:text="${claim.title}"
                    >お問い合わせタイトル</span
                  >
                </div>

                <!-- 作成日 -->
                <div class="column is-3 text-right">
                  <span class="icon" th:if="${claim.hasAnswers()}">✅</span>
                  <span
                    th:text="${#temporals.format(claim.createdDate, 'yyyy-MM-dd')}"
                    >2025-01-24</span
                  >
                </div>
              </div>
            </div>
          </div>
        </th:block>

        <!-- ページネーション -->
        <nav class="pagination is-centered mt-5">
          <a
            class="pagination-previous"
            th:classappend="${currentPage == 0} ? 'is-disabled'"
            th:href="@{|/claims/claimsList?page=0|}"
            >≪ 最初</a
          >
          <a
            class="pagination-previous"
            th:classappend="${currentPage == 0} ? 'is-disabled'"
            th:href="@{|/claims/claimsList?page=${currentPage - 1}|}"
            >＜ 前へ</a
          >

          <ul class="pagination-list">
            <th:block th:if="${claimsPage.empty}">
              <li>
                <a
                  aria-current="page"
                  aria-label="Page 1"
                  class="pagination-link is-current"
                  >1</a
                >
              </li>
            </th:block>
            <th:block th:unless="${claimsPage.empty}">
              <li th:each="pageIndex : ${#numbers.sequence(0, totalPages - 1)}">
                <a
                  class="pagination-link"
                  th:classappend="${currentPage == pageIndex} ? 'is-current'"
                  th:href="@{|/claims/claimsList?page=${pageIndex}|}"
                  th:text="${pageIndex + 1}"
                ></a>
              </li>
            </th:block>
          </ul>

          <a
            class="pagination-next"
            th:classappend="${currentPage == totalPages - 1} ? 'is-disabled'"
            th:href="@{|/claims/claimsList?page=${currentPage + 1}|}"
            >次へ ＞</a
          >
          <a
            class="pagination-next"
            th:classappend="${currentPage == totalPages - 1} ? 'is-disabled'"
            th:href="@{|/claims/claimsList?page=${totalPages - 1}|}"
            >最後 ≫</a
          >
        </nav>
      </div>
    </section>

    <div th:replace="fragments/footer :: ilogFooter"></div>
  </body>
</html>
