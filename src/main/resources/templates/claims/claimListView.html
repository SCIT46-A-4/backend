<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>кі к°қ м„јн„° нҺҳмқҙм§Җ</title>

    <!-- Bulma CSS -->
    <link
      rel="stylesheet"
      href="../../static/css/bulma.min.css"
      th:href="@{/css/bulma.min.css}"
    />
    <!-- customColors -->
    <link
      rel="stylesheet"
      href="../../static/css/customColors.css"
      th:href="@{/css/customColors.css}"
    />

    <!-- jQuery -->
    <script src="/js/jquery-3.7.1.min.js"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />

    <style>
      /* вң… л°°кІҪмғү м Ғмҡ© */
      nav#mainNav {
        background-color: var(--primary);
        /* #FDF5BF */
      }

      #logo {
        width: 100px;
        height: auto;
        min-height: 50px;
      }

      .custom-container {
        width: 1000px;
        max-width: 1000px;
        margin: 0 auto;
        text-align: center;
        display: flex;
        align-items: stretch;
        justify-content: space-between;
        flex-direction: column;
      }

      .claim-list {
        min-height: 60vh;
      }

      /* вң… кё°мЎҙ мҠӨнғҖмқј мң м§Җ, мғүмғҒмқҖ customColors.css нҷңмҡ© */
      .claim-box {
        background-color: var(--secondary);
        /* вң… customColors.cssмқҳ ліҖмҲҳ мӮ¬мҡ© */
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 10px;
        cursor: pointer;
        box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        transition: transform 0.2s ease-in-out, box-shadow 0.2s;
      }

      /* вң… нҳёлІ„ нҡЁкіј */
      .claim-box:hover {
        transform: scale(1.02);
        box-shadow: 3px 3px 15px rgba(0, 0, 0, 0.15);
      }

      .button-container {
        display: flex;
        justify-content: space-between;
        width: 100%;
      }

      .write-btn {
        text-align: right;
        margin-bottom: 10px;
      }

      .logo {
        font-size: 24px;
        font-weight: bold;
        color: red;
        margin-bottom: 20px;
      }

      .claim-box .columns {
        align-items: center;
        text-align: left;
      }

      .claim-box .column {
        font-weight: bold;
      }

      /* мӨ‘м•ҷ м •л ¬ */
      .text-center {
        text-align: center;
      }

      /* мҳӨлҘёмӘҪ м •л ¬ */
      .text-right {
        text-align: right;
      }

      #noClaimContainer {
        padding: 20px;
        background-color: var(--primary);
        color: black;
        font-weight: bold;
        min-height: 60vh;
      }
    </style>
  </head>
  <body>
    <nav
      id="mainNav"
      class="navbar"
      role="navigation"
      aria-label="main navigation"
    >
      <div class="navbar-brand">
        <a class="navbar-item" href="/">
          <img
            id="logo"
            src="../../static/images/wilog.png"
            th:src="@{/images/wilog.png}"
            alt="iLog лЎңкі "
          />
        </a>
      </div>
      <div class="navbar-end">
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/guides"><span>мқҙмҡ©м•ҲлӮҙ</span></a>
          </div>
        </div>
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/claims"><span>кі к°қм„јн„°</span></a>
          </div>
        </div>
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" href="/auth/logout"
              ><span>лЎңк·ём•„мӣғ</span></a
            >
          </div>
        </div>
        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light" th:href="@{/members/myDetails}">
              <span class="icon"><i class="fas fa-user"></i></span>
              <span th:text="|${memberName}(${relationType})|"
                >к№ҖлҜёмҳҒ(л¶ҖлӘЁ)</span
              >
            </a>
          </div>
        </div>
      </div>
    </nav>
    <section class="section">
      <div class="container custom-container">
        <h2 class="title is-4">лӮҙ л¬ёмқҳ лӘ©лЎқ нҺҳмқҙм§Җ</h2>

        <div class="button-container">
          <div class="write-btn">
            <a th:href="@{/claims}" class="button is-light">кі к°қм„јн„°лЎң мқҙлҸҷ</a>
          </div>
          <div class="write-btn">
            <a th:href="@{/claims/new}" class="button is-light">л¬ёмқҳ н•ҳкё°</a>
          </div>
        </div>

        <!-- claimмқҙ м—Ҷмқ„ кІҪмҡ° -->
        <div
          th:if="${claimsPage.empty}"
          id="noClaimContainer"
          class="box claim-box is-secondary"
        >
          <h1>л¬ёмқҳ лӮҙм—ӯмқҙ м—ҶмҠөлӢҲлӢӨ.</h1>
        </div>
        <th:block th:unless="${claimsPage.empty}">
          <div class="claim-list">
            <!-- claimмқҙ мһҲмқ„ кІҪмҡ° -->
            <div
              th:each="claim : ${claimsPage.content}"
              class="box claim-box is-secondary"
              th:attr="onclick=|location.href='/claims/${claim.claimId}'|"
            >
              <div class="columns is-vcentered">
                <!-- л¬ёмқҳ мң нҳ• + м ңлӘ© -->
                <div class="column is-9">
                  <span
                    class="has-text-weight-bold"
                    th:text="'[' + ${claim.type} + ']'"
                    >[мқҙмҡ©л°©лІ•]</span
                  >
                  <span class="ml-2" th:text="${claim.title}">л¬ёмқҳ м ңлӘ©</span>
                </div>

                <!-- л“ұлЎқ лӮ м§ң -->
                <div class="column is-3 text-right">
                  <!-- вң… лӢөліҖмқҙ 1к°ң мқҙмғҒмқҙл©ҙ мІҙнҒ¬ м•„мқҙмҪҳ н‘ңмӢң -->
                  <span th:if="${claim.hasAnswers()}" class="icon">
                    вң…
                    <!-- вң… мқҙлӘЁм§Җ лҳҗлҠ” FontAwesome м•„мқҙмҪҳ мӮ¬мҡ© к°ҖлҠҘ -->
                  </span>
                  <span
                    th:text="${#temporals.format(claim.createdDate, 'yyyy-MM-dd')}"
                    >2025-01-24</span
                  >
                </div>
              </div>
            </div>
          </div>
        </th:block>

        <!-- нҺҳмқҙм§Җл„Өмқҙм…ҳ -->
        <nav class="pagination is-centered mt-5">
          <a
            class="pagination-previous"
            th:href="@{|/claims/claimsList?page=0|}"
            th:classappend="${currentPage == 0} ? 'is-disabled'"
            >вүӘ мІҳмқҢ</a
          >
          <a
            class="pagination-previous"
            th:href="@{|/claims/claimsList?page=${currentPage - 1}|}"
            th:classappend="${currentPage == 0} ? 'is-disabled'"
            >пјң мқҙм „</a
          >

          <ul class="pagination-list">
            <th:block th:if="${claimsPage.empty}">
              <li>
                <a
                  class="pagination-link is-current"
                  aria-label="Page 1"
                  aria-current="page"
                  >1</a
                >
              </li>
            </th:block>
            <th:block th:unless="${claimsPage.empty}">
              <li th:each="pageIndex : ${#numbers.sequence(0, totalPages - 1)}">
                <a
                  class="pagination-link"
                  th:href="@{|/claims/claimsList?page=${pageIndex}|}"
                  th:text="${pageIndex + 1}"
                  th:classappend="${currentPage == pageIndex} ? 'is-current'"
                ></a>
              </li>
            </th:block>
          </ul>

          <a
            class="pagination-next"
            th:href="@{|/claims/claimsList?page=${currentPage + 1}|}"
            th:classappend="${currentPage == totalPages - 1} ? 'is-disabled'"
            >лӢӨмқҢ пјһ</a
          >
          <a
            class="pagination-next"
            th:href="@{|/claims/claimsList?page=${totalPages - 1}|}"
            th:classappend="${currentPage == totalPages - 1} ? 'is-disabled'"
            >лҒқ вү«</a
          >
        </nav>
      </div>
    </section>
    <div th:replace="fragments/footer :: ilogFooter"></div>
  </body>
</html>
